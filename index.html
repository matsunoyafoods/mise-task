function PrepView({allTasks, setAllTasks, currentUserId, recipes, notify, setInventory, storeFilter}) {
  const [activeStore, setActiveStore] = useState(storeFilter || 1);
  const [historyDays, setHistoryDays] = useState(0);
  const [verifyTask, setVerifyTask] = useState(null);
  const [showRecipe, setShowRecipe] = useState(null);
  const [staffPickPrep, setStaffPickPrep] = useState(null); // {task} 完了前スタッフ選択
  const [showAdd, setShowAdd] = useState(false);
  const [addName, setAddName] = useState("");
  const [addRecipeId, setAddRecipeId] = useState("");
  const [addDeadline, setAddDeadline] = useState("10:00");
  const addPrep = () => {
    if (!addName.trim()) { notify("タスク名を入力してください","warn"); return; }
    setAllTasks(p=>[...p,{
      id:"pt"+Date.now(), name:addName.trim(), recipeId:addRecipeId||null,
      deadline:addDeadline, store:activeStore, assignedTo:null,
      date:dateStr(0), completedAt:null, completedBy:null, amountVerified:false, amountLog:[]
    }]);
    setAddName(""); setAddRecipeId(""); setAddDeadline("10:00"); setShowAdd(false);
    setHistoryDays(0);
    notify("✓ 仕込みタスクを追加しました");
  };

  const viewDate = dateStr(historyDays);
  const isToday = historyDays === 0;
  const tasks = allTasks.filter(t=>t.store===activeStore && t.date===viewDate);
  const recipe = recipes.find(r=>r.id===showRecipe);

  const confirmComplete = (task, amountLog, staffIds) => {
    const now = nowTime();
    const ids = (staffIds && staffIds.length>0 && staffIds[0]!==null) ? staffIds : (currentUserId ? [currentUserId] : []);
    setAllTasks(prev=>prev.map(t=>t.id===task.id ? {...t,completedAt:now,completedBy:ids,amountVerified:true,amountLog} : t));
    if (task.recipeId) {
      const rec = recipes.find(r=>r.id===task.recipeId);
      if (rec) setInventory(prev=>prev.map(item=>{
        const ing = rec.ingredients.find(i=>i.itemId===item.id);
        return ing ? {...item,stock:Math.max(0,item.stock-ing.amount)} : item;
      }));
    }
    setVerifyTask(null);
    const hasWarn = amountLog.some(l=>!l.ok);
    notify(hasWarn ? "⚠ 差異あり。完了記録しました" : "✓ 仕込み完了！在庫を更新しました", hasWarn?"warn":"success");
  };

  const dates = Array.from({length:7},(_,i)=>i).map(i=>({
    offset:i, label:i===0?"今日":i===1?"昨日":`${i}日前`, date:dateStr(i)
  }));

  return (
    <div>
      {/* 仕込み完了：スタッフ選択 */}
      {staffPickPrep && (
        <StaffMultiPickModal
          title="🔪 担当者を選択（複数可）"
          subtitle={"「"+staffPickPrep.task.name+"」"}
          storeId={staffPickPrep.task.store}
          onClose={()=>setStaffPickPrep(null)}
          onConfirm={ids=>{
            setStaffPickPrep(null);
            setVerifyTask({task:staffPickPrep.task, recipe:recipes.find(r=>r.id===staffPickPrep.task.recipeId), staffIds:ids});
          }}
        />
      )}

      {verifyTask && (
        <AmountVerifyModal
          task={verifyTask.task}
          recipe={verifyTask.recipe}
          onConfirm={log=>confirmComplete(verifyTask.task,log,verifyTask.staffIds)}
          onCancel={()=>setVerifyTask(null)}
        />
      )}
      {recipe && (
        <Modal onClose={()=>setShowRecipe(null)}>
          <div style={{fontSize:36,marginBottom:8}}>{recipe.image}</div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",marginBottom:4}}>{recipe.name}</div>
          <div style={{fontSize:12,color:"#8b95a1",marginBottom:16}}>出来高: {recipe.yield}</div>
          {recipe.ingredients.map((ing,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #1a1a2a"}}>
              <span style={{fontSize:13,color:"#ccc"}}>{ing.name}</span>
              <span style={{fontSize:16,fontWeight:800,color:"#E85D04",fontFamily:"monospace"}}>{ing.amount}{ing.unit}</span>
            </div>
          ))}
        </Modal>
      )}

      {showAdd && (
        <Modal onClose={()=>setShowAdd(false)} width={400}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:16}}>🔪 仕込みタスクを追加</div>
          <Select label="レシピから選ぶ（任意）" value={addRecipeId}
            onChange={e=>{const id=e.target.value;const r=recipes.find(x=>x.id===id);setAddRecipeId(id);if(r)setAddName(r.name);}}
            options={[{value:"",label:"-- レシピなし --"},...recipes.map(r=>({value:r.id,label:r.name}))]}/>
          <Input label="タスク名 *" value={addName} onChange={e=>setAddName(e.target.value)} placeholder="例: 醤油ダレ仕込み"/>
          <Input label="締切時刻" type="time" value={addDeadline} onChange={e=>setAddDeadline(e.target.value)}/>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:8}}>※「今日」のタスクとして追加されます</div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setShowAdd(false)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={addPrep} color="#E85D04" style={{flex:1}}>追加する</Btn>
          </div>
        </Modal>
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>仕込み管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>担当割当・分量チェック・1週間履歴</p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {!storeFilter && currentUserId !== null && INITIAL_STORES.map(s=>(
            <button key={s.id} onClick={()=>setActiveStore(s.id)}
              style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:activeStore===s.id?"#E85D04":"#1a1a2a",color:activeStore===s.id?"#fff":"#8b95a1"}}>
              {s.name}
            </button>
          ))}
          {currentUserId !== null && (
            <Btn onClick={()=>setShowAdd(true)} color="#E85D04">＋ タスクを追加</Btn>
          )}
        </div>
      </div>

      <div style={{display:"flex",gap:5,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
        {dates.map(d=>{
          const dt = allTasks.filter(t=>t.store===activeStore&&t.date===d.date);
          const dd = dt.filter(t=>t.completedAt).length;
          const isA = historyDays===d.offset;
          return (
            <button key={d.offset} onClick={()=>setHistoryDays(d.offset)}
              style={{padding:"7px 14px",borderRadius:10,border:`1px solid ${isA?"#E85D04":"#1e1e2e"}`,cursor:"pointer",background:isA?"#1a0a00":"#0c0c18",color:isA?"#E85D04":"#8b95a1",fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>
              <div style={{fontWeight:700}}>{d.label}</div>
              <div style={{fontSize:10,marginTop:2}}>{dd}/{dt.length}完了</div>
            </button>
          );
        })}
      </div>

      {!currentUserId && isToday && (
        <div style={{background:"#0a1020",border:"1px solid #1a3060",borderRadius:10,padding:"10px 16px",marginBottom:16,fontSize:12,color:"#60a0ff"}}>
          💡 右上でスタッフを選択すると自分のタスクの「完了」ボタンが押せます
        </div>
      )}

      {tasks.map(task => {
        const done = !!task.completedAt;
        const completedStaffNames = Array.isArray(task.completedBy) ? task.completedBy.map(id=>INITIAL_USERS.find(u=>u.id===id)?.name).filter(Boolean).join('・') : (task.completedBy ? INITIAL_USERS.find(u=>u.id===task.completedBy)?.name : null);
        const isMyTask = currentUserId != null && task.assignedTo===currentUserId;
        const taskRecipe = recipes.find(r=>r.id===task.recipeId);
        const hasWarn = task.amountLog?.some(l=>!l.ok);
        const isCarried = !!task.carriedFrom;
        return (
          <div key={task.id}
            style={{background:done?(hasWarn?"#120e08":"#080f0a"):isCarried&&!done?"#130808":"#0c0c18",border:`1px solid ${done?(hasWarn?"#78350f":"#14532d"):isCarried&&!done?"#7f1d1d":isMyTask?"#E85D0433":"#1e1e2e"}`,borderRadius:14,padding:18,marginBottom:10,borderLeft:`4px solid ${done?(hasWarn?"#d97706":"#16a34a"):isCarried&&!done?"#ef4444":isMyTask?"#E85D04":"#2a2a3a"}`}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6,flexWrap:"wrap"}}>
                  {done && <span style={{fontSize:18,color:hasWarn?"#fbbf24":"#4ade80"}}>✓</span>}
                  <span style={{fontSize:14,fontWeight:700,color:done?(hasWarn?"#fbbf24":"#4ade80"):"#eee"}}>{task.name}</span>
                  {task.amountVerified && !hasWarn && <Chip label="分量✓" color="#4ade80" bg="#052e16"/>}
                  {hasWarn && <Chip label="⚠ 差異記録" color="#fbbf24" bg="#1a0e00"/>}
                  {isMyTask && !done && <Chip label="自分のタスク" color="#E85D04" bg="#1a0a00"/>}
                  {isCarried && !done && <Chip label={`⚠ 要対応 (${task.carriedDate}から繰越)`} color="#ef4444" bg="#1a0808"/>}
                </div>
                <div style={{fontSize:12,display:"flex",gap:14,flexWrap:"wrap"}}>
                  <span style={{color:"#E85D04"}}>〆 {task.deadline}</span>
                  {done && <span style={{color:hasWarn?"#fbbf24":"#4ade80"}}>完了 {task.completedAt}・{completedStaffNames}</span>}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
                {taskRecipe && (
                  <button onClick={()=>setShowRecipe(task.recipeId)}
                    style={{padding:"6px 12px",background:"#0a1a2a",border:"1px solid #0077B644",color:"#38bdf8",borderRadius:8,cursor:"pointer",fontSize:11}}>
                    📋 レシピ
                  </button>
                )}
                {isToday && (
                  <StaffPicker value={task.assignedTo}
                    onChange={id=>setAllTasks(prev=>prev.map(t=>t.id===task.id?{...t,assignedTo:id}:t))}
                    storeFilter={task.store}/>
                )}
                {isToday && !done && (
                  isMyTask
                    ? <Btn onClick={()=>setStaffPickPrep({task})}>完了</Btn>
                    : <Btn onClick={()=>setStaffPickPrep({task})}
                        color="#E85D04" style={{color:"#fff"}}>
                        完了
                      </Btn>
                )}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── CLEAN VIEW ───
function CleanView({tasks, setTasks, currentUserId, notify, storeFilter}) {
  const [activeStore, setActiveStore] = useState(storeFilter || 1);
  const [staffPickClean, setStaffPickClean] = useState(null); // {task}
  const [showAdd, setShowAdd] = useState(false);
  const [addName, setAddName] = useState("");
  const [addArea, setAddArea] = useState("");
  const [addDeadline, setAddDeadline] = useState("12:00");
  const filtered = tasks.filter(t=>t.store===activeStore);
  const complete = (task, staffIds) => {
    setTasks(p=>p.map(t=>t.id===task.id?{...t,completedAt:nowTime(),completedBy:staffIds}:t));
    setStaffPickClean(null);
    notify("✓ クリーン完了！ポイント獲得！（"+staffIds.length+"名で分担）");
  };
  const addClean = () => {
    if (!addName.trim()) { notify("タスク名を入力してください","warn"); return; }
    setTasks(p=>[...p,{id:"ct"+Date.now(),name:addName.trim(),area:addArea.trim()||"その他",deadline:addDeadline,store:activeStore,assignedTo:null,completedAt:null,completedBy:null,points:2}]);
    setAddName(""); setAddArea(""); setAddDeadline("12:00"); setShowAdd(false);
    notify("✓ クリーンタスクを追加しました");
  };
  return (
    <div>
      {showAdd && (
        <Modal onClose={()=>setShowAdd(false)} width={380}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:16}}>✦ クリーンタスクを追加</div>
          <Input label="タスク名 *" value={addName} onChange={e=>setAddName(e.target.value)} placeholder="例: 冷蔵庫の清掃"/>
          <Input label="エリア（任意）" value={addArea} onChange={e=>setAddArea(e.target.value)} placeholder="例: キッチン"/>
          <Input label="締切時刻" type="time" value={addDeadline} onChange={e=>setAddDeadline(e.target.value)}/>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <Btn onClick={()=>setShowAdd(false)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={addClean} color="#C9184A" style={{flex:1}}>追加する</Btn>
          </div>
        </Modal>
      )}
      {staffPickClean && (
        <StaffMultiPickModal
          title={"✦ 担当者を選択（複数可）"}
          subtitle={"「"+staffPickClean.task.name+"」 +"+staffPickClean.task.points+"pt"}
          storeId={staffPickClean.task.store}
          onClose={()=>setStaffPickClean(null)}
          onConfirm={ids=>complete(staffPickClean.task, ids)}
        />
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>クリーン管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>清掃完了は評価ポイントに直結します</p>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {!storeFilter && currentUserId !== null && INITIAL_STORES.map(s=>(
            <button key={s.id} onClick={()=>setActiveStore(s.id)}
              style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:activeStore===s.id?"#C9184A":"#1a1a2a",color:activeStore===s.id?"#fff":"#8b95a1"}}>
              {s.name}
            </button>
          ))}
          {currentUserId !== null && (
            <Btn onClick={()=>setShowAdd(true)} color="#C9184A">＋ タスクを追加</Btn>
          )}
        </div>
      </div>
      {filtered.map(task => {
        const done = !!task.completedAt;
        const cs = INITIAL_USERS.find(u=>u.id===task.completedBy);
        const isMyTask = currentUserId != null && task.assignedTo===currentUserId;
        const isCarriedClean = !!task.carriedOver && !done;
        return (
          <div key={task.id}
            style={{background:done?"#080f0a":isCarriedClean?"#130808":"#0c0c18",border:`1px solid ${done?"#14532d":isCarriedClean?"#7f1d1d":"#1e1e2e"}`,borderRadius:14,padding:18,marginBottom:10,borderLeft:`4px solid ${done?"#16a34a":isCarriedClean?"#ef4444":"#C9184A"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  {done && <span style={{fontSize:18,color:"#4ade80"}}>✓</span>}
                  <span style={{fontSize:14,fontWeight:700,color:done?"#4ade80":"#eee"}}>{task.name}</span>
                  <Chip label={task.area} color="#C9184A" bg="#1a0818"/>
                  {isCarriedClean && <Chip label="⚠ 要対応" color="#ef4444" bg="#1a0808"/>}
                  <span style={{fontSize:12,color:"#F48C06",fontWeight:700}}>+{task.points}pt</span>
                </div>
                <div style={{fontSize:12,color:"#E85D04"}}>
                  〆 {task.deadline}
                  {done && <span style={{color:"#4ade80",marginLeft:12}}>完了 {task.completedAt}・{Array.isArray(task.completedBy)?task.completedBy.map(id=>INITIAL_USERS.find(u=>u.id===id)?.name).filter(Boolean).join("・"):cs?.name}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <StaffPicker value={task.assignedTo} onChange={id=>setTasks(p=>p.map(t=>t.id===task.id?{...t,assignedTo:id}:t))}/>
                {!done && <Btn onClick={()=>setStaffPickClean({task})} color="#C9184A">完了</Btn>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── ORDER VIEW ───
function OrderView({inventory, setInventory, suppliers, setSuppliers, orders, setOrders, priceHistory, setPriceHistory, currentUserId, notify, storeFilter}) {
  const [confirmOrder, setConfirmOrder] = useState(null);
  const [tab, setTab] = useState("candidates");
  const [selectedItems, setSelectedItems] = useState({});
  const [editQty, setEditQty] = useState({});
  const [inspectOrder, setInspectOrder] = useState(null);
  const [showSupplierForm, setShowSupplierForm] = useState(false);
  const [showSupplierReg, setShowSupplierReg] = useState(null);
  const [newSupplier, setNewSupplier] = useState({name:"",contact:"",sendMethod:"email",lineId:"",fax:"",tel:""});

  const lowItems = inventory.filter(i=>i.stock<=i.minStock);
  const grouped = suppliers.reduce((a,s)=>{
    const items = lowItems.filter(i=>i.supplierId===s.id);
    if (items.length > 0) a[s.id] = items;
    return a;
  }, {});

  const getQty = item => editQty[item.id] ?? item.orderQty;

  const sendOrder = supplierId => {
    const sup = suppliers.find(s=>s.id===supplierId);
    const items = (grouped[supplierId]||[]).filter(i=>selectedItems[i.id]!==false);
    if (!items.length) { notify("発注商品を選択してください","warn"); return; }
    setConfirmOrder({supplierId, sup, items});
  };
  const executeSendOrder = async () => {
    if (!confirmOrder) return;
    const {supplierId, sup, items} = confirmOrder;
    const newOrder = {
      id:"o"+Date.now(), supplierId, storeId:storeFilter||1,
      items:items.map(i=>({itemId:i.id,name:i.name,qty:getQty(i),unit:i.unit,unitPrice:i.unitPrice})),
      status:"sent", sentAt:new Date().toISOString(), deliveredAt:null,
      sendMethod:sup.sendMethod || sup.orderMethods?.[0] || "other", inspected:false, inspectionLog:[],
    };
    setOrders(p=>[newOrder,...p]);

    // LINEのUser IDが登録されている場合はNetlify Function経由でPush送信
    const methods = sup.orderMethods?.length ? sup.orderMethods : [sup.sendMethod];
    if (methods.includes("line") && sup.lineId && sup.lineId.startsWith("U")) {
      const orderText = buildOrderText(sup, items);
      try {
        const res = await fetch("/.netlify/functions/send-line", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            userId: sup.lineId,
            orderText,
            supplierName: sup.name,
          }),
        });
        if (res.ok) {
          notify(`✓ ${sup.name} へ LINE で発注を送信しました！`);
        } else {
          notify(`⚠ LINE送信に失敗しました。手動で連絡してください。`, "warn");
        }
      } catch {
        notify(`⚠ LINE送信エラー。手動で連絡してください。`, "warn");
      }
    } else {
      const methodLabels = methods
        .map(m=>({email:"メール",line:"LINE",instagram:"Instagram",twitter:"X",other:"その他",fax:"FAX",sms:"SMS"})[m]||m).join(" / ");
      notify(`✓ ${sup.name} へ ${methodLabels} で発注しました！`);
    }

    setSelectedItems({});
    setConfirmOrder(null);
  };

  // 発注内容をテキスト化
  const buildOrderText = (sup, items) => {
    const lines = [`【発注書】${new Date().toLocaleDateString("ja-JP")}`, `${sup.name} 御中`, ""];
    items.forEach(i => lines.push(`・${i.name}  ${getQty(i).toLocaleString()}${i.unit}`));
    lines.push("", "以上、よろしくお願いいたします。");
    return lines.join("\n");
  };

  // 送信リンクを生成（登録されたorderMethodsから最初の有効な方法）
  const buildSendLinks = (sup, items) => {
    const methods = sup.orderMethods?.length ? sup.orderMethods : [sup.sendMethod];
    const text = buildOrderText(sup, items);
    const enc = encodeURIComponent(text);
    const subj = encodeURIComponent("【発注】" + new Date().toLocaleDateString("ja-JP"));
    return methods.map(m => {
      if (m==="email"     && sup.contact)     return {method:m, url:`mailto:${sup.contact}?subject=${subj}&body=${enc}`,       label:"メールを開く"};
      if (m==="line"      && sup.lineId)      return sup.lineId.startsWith("U") ? {method:m, url:null, label:"LINE自動送信", auto:true} : {method:m, url:`https://line.me/R/oaMessage/${sup.lineId.replace("@","")}/?text=${enc}`, label:"LINEで送る"};
      if (m==="instagram" && sup.instagramId) return {method:m, url:`https://www.instagram.com/${sup.instagramId.replace("@","")}/`, label:"Instagramを開く"};
      if (m==="twitter"   && sup.twitterId)   return {method:m, url:`https://x.com/${sup.twitterId.replace("@","")}/`, label:"X(Twitter)を開く"};
      if (m==="other"     && sup.otherDesc)   return {method:m, url:null, label:sup.otherDesc};
      return null;
    }).filter(Boolean);
  };

    const handleSupplierSelfReg = (token, data) => {
    const existing = suppliers.find(s=>s.token===token);
    if (existing && data.items) {
      data.items.forEach(newItem => {
        const invItem = inventory.find(i=>i.supplierId===existing.id&&i.name===newItem.name);
        if (invItem && invItem.unitPrice !== newItem.unitPrice) {
          setPriceHistory(p=>[...p,{id:"ph"+Date.now(),supplierId:existing.id,itemName:newItem.name,oldPrice:invItem.unitPrice,newPrice:newItem.unitPrice,changedAt:new Date().toISOString().slice(0,10),notifiedHonbu:true}]);
          setInventory(prev=>prev.map(i=>i.id===invItem.id?{...i,unitPrice:newItem.unitPrice}:i));
          notify(`⚠ ${newItem.name} の単価 ¥${invItem.unitPrice}→¥${newItem.unitPrice} に変更。本部通知済。`,"warn");
        }
      });
    }
    setShowSupplierReg(null);
  };

  const completeInspection = (orderId, log) => {
    setOrders(p=>p.map(o=>o.id===orderId?{...o,inspected:true,inspectionLog:log,status:"delivered",deliveredAt:todayStr}:o));
    const order = orders.find(o=>o.id===orderId);
    if (order) {
      setInventory(prev=>prev.map(item=>{
        const ol = order.items.find(i=>i.itemId===item.id);
        const received = log.find(l=>l.itemId===item.id)?.received || 0;
        return ol ? {...item,stock:item.stock+received} : item;
      }));
    }
    setInspectOrder(null);
    notify("✓ 検品完了！在庫に反映しました");
  };

  const myOrders = storeFilter ? orders.filter(o=>o.storeId===storeFilter) : orders;
  const pendingInspection = myOrders.filter(o=>o.status==="sent"&&!o.inspected);

  return (
    <div>
      {confirmOrder && (
        <Modal onClose={()=>setConfirmOrder(null)} width={440}>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",marginBottom:6}}>📮 発注確認</div>
          <div style={{marginBottom:18}}>
            <div style={{fontSize:13,color:"#aaa",marginBottom:10}}>
              <strong style={{color:"#eee"}}>{confirmOrder.sup.name}</strong> へ以下の方法で発注します
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {(confirmOrder.sup.orderMethods?.length ? confirmOrder.sup.orderMethods : [confirmOrder.sup.sendMethod]).map(m=>{
                const MICO={email:"📧",line:"💬",instagram:"📸",twitter:"✕",other:"📝",fax:"📠",sms:"📱"};
                const MLABEL={email:"メール",line:"LINE",instagram:"Instagram",twitter:"X",other:"その他",fax:"FAX",sms:"SMS"};
                const MCOL={email:"#0077B6",line:"#06C755",instagram:"#E1306C",twitter:"#555",other:"#6b7280",fax:"#9B2226",sms:"#6D28D9"};
                return (
                  <span key={m} style={{fontSize:12,padding:"4px 10px",borderRadius:20,background:(MCOL[m]||"#333")+"33",color:MCOL[m]||"#aaa",border:"1px solid "+(MCOL[m]||"#333")+"66",fontWeight:700}}>
                    {MICO[m]} {MLABEL[m]}
                  </span>
                );
              })}
            </div>
          </div>
          {confirmOrder.items.map(i=>(
            <div key={i.id} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #1a1a2a"}}>
              <span style={{fontSize:13,color:"#ccc"}}>{i.name}</span>
              <span style={{fontSize:14,fontWeight:700,color:"#E85D04",fontFamily:"monospace"}}>{getQty(i).toLocaleString()}{i.unit}</span>
            </div>
          ))}
          <div style={{marginTop:20}}>
            {(()=>{
              const links = buildSendLinks(confirmOrder.sup, confirmOrder.items);
              const MCOL={email:"#0077B6",line:"#06C755",instagram:"#E1306C",twitter:"#1a1a2a",other:"#6b7280"};
              return (
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {links.length>0 ? links.map(lk=>(
                    lk.auto
                      ? <button key={lk.method} onClick={executeSendOrder}
                          style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",
                            background:"linear-gradient(90deg,#06C755,#04a844)",
                            color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
                          💬 LINEに自動送信する
                        </button>
                      : lk.url
                      ? <a key={lk.method} href={lk.url} target="_blank" rel="noreferrer"
                          onClick={executeSendOrder}
                          style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",
                            background:`linear-gradient(90deg,${MCOL[lk.method]},${MCOL[lk.method]}cc)`,
                            color:"#fff",borderRadius:10,fontSize:14,fontWeight:800,textDecoration:"none",cursor:"pointer"}}>
                          {{email:"📧",line:"💬",instagram:"📸",twitter:"✕",other:"📝"}[lk.method]} {lk.label} で発注する
                        </a>
                      : <button key={lk.method} onClick={executeSendOrder}
                          style={{padding:"13px",background:"#1e1e2e",color:"#ccc",border:"1px solid #2a2a3a",borderRadius:10,fontSize:13,cursor:"pointer",fontWeight:700}}>
                          📝 {lk.label} で発注する
                        </button>
                  )) : (
                    <button onClick={executeSendOrder}
                      style={{padding:"13px",background:"linear-gradient(90deg,#059669,#10b981)",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
                      ✓ 発注する
                    </button>
                  )}
                  <button onClick={()=>setConfirmOrder(null)}
                    style={{padding:"10px",background:"transparent",color:"#f87171",border:"1px solid #7f1d1d44",borderRadius:8,fontSize:13,cursor:"pointer"}}>
                    ✕ キャンセル
                  </button>
                </div>
              );
            })()}
          </div>
        </Modal>
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>発注管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>在庫不足を自動検知 → 業者別一括発注 → 検品チェック</p>
        </div>
        <Btn onClick={()=>setShowSupplierForm(true)} color="#6D28D9">＋ 業者登録QR発行</Btn>
      </div>

      {pendingInspection.length > 0 && (
        <div style={{background:"#0a1020",border:"1px solid #1a4080",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:12,color:"#60a0ff",fontWeight:700,marginBottom:8}}>📦 検品待ち {pendingInspection.length}件</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {pendingInspection.map(o=>{
              const sup = suppliers.find(s=>s.id===o.supplierId);
              return (
                <button key={o.id} onClick={()=>setInspectOrder(o)}
                  style={{padding:"5px 12px",background:"#1a3a6a",border:"1px solid #2a5aaa",borderRadius:8,color:"#90c0ff",fontSize:11,cursor:"pointer"}}>
                  {sup?.name} 検品する →
                </button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
        {[["candidates","発注候補"],["history","発注履歴"],["priceHistory","価格変更履歴"],["suppliers","業者一覧"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:tab===id?"#E85D04":"#1a1a2a",color:tab===id?"#fff":"#8b95a1"}}>
            {label}
          </button>
        ))}
      </div>

      {tab==="candidates" && (
        <div>
          {Object.keys(grouped).length === 0
            ? <div style={{color:"#6b7280",fontSize:14,padding:24,textAlign:"center"}}>在庫不足の商品はありません 🎉</div>
            : Object.entries(grouped).map(([supplierId,items])=>{

                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                      {sup.contact && <Chip label={sup.contact} color="#8b95a1" bg="#1a1a2a"/>}
                      {sup.fax && <Chip label={`FAX: ${sup.fax}`} color="#8b95a1" bg="#1a1a2a"/>}
                      {sup.tel && <Chip label={`TEL: ${sup.tel}`} color="#8b95a1" bg="#1a1a2a"/>}

                    }

                      <button onClick={()=>setShowSupplierReg(sup.token)}

                      </button>
                      <button onClick={()=>{ if(window.confirm(`「${sup.name}」を削除しますか？\n※発注履歴は残ります`)){ setSuppliers(p=>p.filter(s=>s.id!==sup.id)); notify("業者を削除しました","warn"); } }}

      {showSupplierForm && <IssueSupplierModal onClose={()=>setShowSupplierForm(false)} setSuppliers={setSuppliers} notify={notify}/>}

      {showSupplierReg && (
        <SupplierSelfRegModal token={showSupplierReg} suppliers={suppliers} setSuppliers={setSuppliers}
          onClose={()=>setShowSupplierReg(null)}/>

    </div>
  );
}

// ─── COMMISSION VIEW ───
function CommissionView({allPrepTasks, cleanTasks, pointConfig, setPointConfig, currentUserId}) {
  const PC = { ...DEFAULT_POINT_CONFIG, ...(pointConfig||{}) };
  const isHonbu = INITIAL_USERS.find(u=>u.id===currentUserId)?.role === "本部";
  const isBy = (t,uid)=> Array.isArray(t.completedBy) ? t.completedBy.includes(uid) : t.completedBy===uid;
  const calcPts = uid => {
    let pts = 0;
    allPrepTasks.forEach(t=>{if(isBy(t,uid)){pts+=Number(PC.prepDone)||0;if(t.amountVerified)pts+=Number(PC.amountVerified)||0;if(t.amountLog?.some(l=>!l.ok))pts+=Number(PC.deviation)||0;}});
    cleanTasks.forEach(t=>{if(isBy(t,uid))pts+=(Number(t.points)||0)*(Number(PC.cleanMult)||1);});
    return Math.max(0,pts);
  };
  const setPC = (k,v)=> setPointConfig && setPointConfig({...PC,[k]:v===""?"":Number(v)});
  const ranked = [...INITIAL_USERS].filter(u=>u.role!=="本部").sort((a,b)=>calcPts(b.id)-calcPts(a.id));
  const medals = ["🥇","🥈","🥉","4位","5位","6位"];
  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>評価・コミッション</h2>
        <p style={{fontSize:12,color:"#8b95a1"}}>タスク完了・分量精度・清掃からコミッション率を算出</p>
      </div>
      <div style={{background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:12,padding:20,marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#aaa"}}>ポイント設定</div>
          {isHonbu ? <span style={{fontSize:10,color:"#E85D04"}}>本部のみ編集可</span> : <span style={{fontSize:10,color:"#6b7280"}}>本部のみ編集できます</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
          {[{k:"prepDone",l:"仕込み完了",suf:"pt",c:"#E85D04"},{k:"amountVerified",l:"分量確認済み",suf:"pt",c:"#2D9D78"},{k:"cleanMult",l:"クリーン完了（倍率）",suf:"×",c:"#C9184A"},{k:"deviation",l:"差異あり(5%超)",suf:"pt",c:"#f87171"}].map(r=>(
            <div key={r.k} style={{background:"#1a1a2a",borderRadius:8,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <span style={{fontSize:11,color:"#9ca3af"}}>{r.l}</span>
              {isHonbu ? (
                <span style={{display:"flex",alignItems:"center",gap:4}}>
                  {r.suf==="×" && <span style={{fontSize:12,color:r.c}}>×</span>}
                  <input type="number" value={PC[r.k]} onChange={e=>setPC(r.k,e.target.value)}
                    style={{width:60,background:"#0c0c18",border:"1px solid #2a2a3a",color:r.c,borderRadius:6,padding:"5px 8px",fontSize:13,fontWeight:800,textAlign:"right",fontFamily:"monospace"}}/>
                  {r.suf==="pt" && <span style={{fontSize:11,color:"#7c8794"}}>pt</span>}
                </span>
              ) : (
                <span style={{fontSize:13,fontWeight:800,color:r.c,fontFamily:"monospace"}}>{r.suf==="×"?"×"+PC[r.k]:(PC[r.k]>0?"+":"")+PC[r.k]+"pt"}</span>
              )}
            </div>
          ))}
        </div>
        {isHonbu && <div style={{fontSize:10,color:"#6b7280",marginTop:10}}>変更は自動保存され、全スタッフの集計に反映されます。</div>}
      </div>
      {ranked.map((u,idx)=>{
        const pts = calcPts(u.id);
        const warns = allPrepTasks.filter(t=>t.completedBy===u.id&&t.amountLog?.some(l=>!l.ok)).length;
        return (
          <div key={u.id} style={{background:"#0c0c18",border:`1px solid ${u.color}22`,borderRadius:14,padding:20,marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
              <span style={{fontSize:idx<3?24:13,width:36,textAlign:"center",color:"#8b95a1"}}>{medals[idx]}</span>
              <Av u={u} size={46}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:"#eee"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#7c8794"}}>{u.role} · {INITIAL_STORES.find(s=>s.id===u.store)?.name}</div>
                    {warns > 0 && <div style={{fontSize:10,color:"#fb923c",marginTop:3}}>⚠ 分量差異 {warns}件</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:30,fontWeight:800,color:u.color,fontFamily:"monospace",lineHeight:1}}>{pts}</div>
                    <div style={{fontSize:10,color:"#7c8794"}}>ポイント</div>
                  </div>
                </div>
              </div>
            </div>
            <Bar v={pts} max={150} color={u.color} h={6}/>
          </div>
        );
      })}
    </div>
  );
}

// ─── INVENTORY VIEW (simplified) ───
function InventoryView({inventory, setInventory, notify, storeFilter, currentUserId, stores}) {
  const [activeStore, setActiveStore] = useState(storeFilter || 1);
  const [tab, setTab] = useState("stock");
  const [showForm, setShowForm] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [form, setForm] = useState({
    name:"", category:"調味料", storageGroup:"ドライ棚A", unit:"g",
    customUnit:"", stock:"0", minStock:"500", orderQty:"1000",
    supplierId:"s1", unitPrice:"0", bagSize:"", bagUnit:"袋"
  });
  const [stocktake, setStocktake] = useState({});
  const lowStock = inventory.filter(i=>i.stock<=i.minStock);
  const cats = [...new Set(inventory.map(i=>i.category))];
  const allStorageGroups = [...new Set((stores || []).flatMap(s => s.storageGroups || []))];
  const storageGroups = (stores || []).find(s => s.id === activeStore)?.storageGroups || allStorageGroups;
  const storageGroupOptions = allStorageGroups.length ? allStorageGroups : ["未設定"];

  const openNew = () => {
    setEditItem(null);
    setForm({name:"",category:"調味料",storageGroup:storageGroupOptions[0],unit:"g",customUnit:"",stock:"0",minStock:"500",orderQty:"1000",supplierId:"s1",unitPrice:"0",bagSize:"",bagUnit:"袋"});
    setShowForm(true);
  };
  const openEdit = (item) => {
    setEditItem(item);
    setForm({
      name:item.name, category:item.category, storageGroup:item.storageGroup,
      unit:ALL_UNITS.includes(item.unit)?item.unit:"その他",
      customUnit:ALL_UNITS.includes(item.unit)?"":item.unit,
      stock:String(item.stock), minStock:String(item.minStock),
      orderQty:String(item.orderQty), supplierId:item.supplierId||"s1",
      unitPrice:String(item.unitPrice),
      bagSize:String(item.bagSize||""), bagUnit:item.bagUnit||"袋"
    });
    setShowForm(true);
  };
  const saveItem = () => {
    if (!form.name.trim()) { notify("商品名を入力してください","warn"); return; }
    const unit = form.unit==="その他" ? form.customUnit : form.unit;
    const payload = {
      name:form.name.trim(), category:form.category, storageGroup:form.storageGroup,
      unit, stock:Number(form.stock), minStock:Number(form.minStock),
      orderQty:Number(form.orderQty), supplierId:form.supplierId,
      unitPrice:Number(form.unitPrice),
      bagSize: form.bagSize ? Number(form.bagSize) : null,
      bagUnit: form.bagSize ? form.bagUnit : null,
    };
    if (editItem) {
      setInventory(p=>p.map(i=>i.id===editItem.id ? {...i,...payload} : i));
      notify("✓ 商品情報を更新しました");
    } else {
      setInventory(p=>[...p, {...payload, id:"inv"+Date.now(), lastOrder:dateStr(0)}]);
      notify("✓ 商品を登録しました");
    }
    setShowForm(false);
  };

  const renderCard = (item) => {
    const isLow = item.stock <= item.minStock;
    return (
      <div key={item.id} style={{background:isLow?"#130808":"#0c0c18",border:`1px solid ${isLow?"#7f1d1d":"#1e1e2e"}`,borderRadius:12,padding:16,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div>
            <span style={{fontSize:14,fontWeight:700,color:"#eee"}}>{item.name}</span>
            <button onClick={()=>openEdit(item)} style={{marginLeft:8,padding:"1px 7px",fontSize:10,background:"#1a1a2a",border:"1px solid #2a2a3a",color:"#8b95a1",borderRadius:5,cursor:"pointer"}}>編集</button>
          </div>
          <div style={{textAlign:"right"}}>
            <span style={{fontSize:20,fontWeight:800,color:isLow?"#f87171":"#38bdf8",fontFamily:"monospace"}}>
              {item.bagSize ? fmtStock(item) : `${item.stock.toLocaleString()}${item.unit}`}
            </span>
            {item.bagSize && <div style={{fontSize:10,color:"#7c8794"}}>{item.stock.toLocaleString()}{item.unit}</div>}
          </div>
        </div>
        <Bar v={item.stock} max={item.minStock*3} color={isLow?"#ef4444":"#0077B6"} h={5}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:10,color:"#6b7280"}}>最低: {item.minStock.toLocaleString()}{item.unit}{item.bagSize?` (${Math.floor(item.minStock/item.bagSize)}${item.bagUnit})`:""}</span>
          <span style={{fontSize:10,color:"#6b7280"}}>¥{item.unitPrice}/100{item.unit}</span>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>在庫管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>在庫残量・カテゴリー別確認・商品登録</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!storeFilter && currentUserId !== null && <div style={{display:"flex",gap:6}}>{INITIAL_STORES.map(s=><button key={s.id} onClick={()=>setActiveStore(s.id)} style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:activeStore===s.id?"#0077B6":"#1a1a2a",color:activeStore===s.id?"#fff":"#8b95a1"}}>{s.name}</button>)}</div>}
          <Btn onClick={openNew} color="#0077B6">＋ 商品登録</Btn>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:18}}>
        {[["stock","在庫一覧"],["stocktake","棚卸し"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:tab===id?"#0077B6":"#1a1a2a",color:tab===id?"#fff":"#8b95a1"}}>{label}</button>
        ))}
      </div>

      {/* 商品登録/編集フォーム */}
      {showForm && (
        <Modal onClose={()=>setShowForm(false)} width={520}>
          <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:20}}>{editItem?"✏ 商品編集":"＋ 商品登録"}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div style={{gridColumn:"1 / -1"}}>
              <Input label="商品名 *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例: 醤油"/>
            </div>
            <Input label="カテゴリー" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} placeholder="例: 調味料"/>
            <Select label="保管場所" value={form.storageGroup} onChange={e=>setForm(p=>({...p,storageGroup:e.target.value}))}
              options={storageGroupOptions.map(g=>({value:g,label:g}))}/>
          </div>

          {/* 単位セクション */}
          <div style={{background:"#0a0a16",border:"1px solid #1e1e2e",borderRadius:10,padding:14,marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:10,fontWeight:700}}>📐 単位設定</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <div style={{fontSize:11,color:"#8b95a1",marginBottom:5}}>基本単位</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {ALL_UNITS.map(u=>(
                    <button key={u} onClick={()=>setForm(p=>({...p,unit:u}))}
                      style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,background:form.unit===u?"#E85D04":"#1a1a2a",color:form.unit===u?"#fff":"#9ca3af"}}>
                      {u}
                    </button>
                  ))}
                </div>
                {form.unit==="その他" && (
                  <input value={form.customUnit} onChange={e=>setForm(p=>({...p,customUnit:e.target.value}))}
                    placeholder="単位を入力（例: 束）"
                    style={{marginTop:8,width:"100%",padding:"7px",background:"#0c0c18",border:"1px solid #2a2a3a",color:"#eee",borderRadius:7,fontSize:12}}/>
                )}
              </div>
              <div>
                <div style={{fontSize:11,color:"#8b95a1",marginBottom:5}}>袋/ケース換算（任意）</div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                  <input type="number" value={form.bagSize} onChange={e=>setForm(p=>({...p,bagSize:e.target.value}))}
                    placeholder="例: 1800"
                    style={{width:"80px",padding:"7px",background:"#0c0c18",border:"1px solid #2a2a3a",color:"#eee",borderRadius:7,fontSize:12}}/>
                  <span style={{fontSize:11,color:"#7c8794"}}>{form.unit==="その他"?form.customUnit:form.unit}</span>
                  <span style={{fontSize:11,color:"#7c8794"}}>=</span>
                  <span style={{fontSize:11,color:"#7c8794"}}>1</span>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {COUNT_UNITS.map(u=>(
                      <button key={u} onClick={()=>setForm(p=>({...p,bagUnit:u}))}
                        style={{padding:"3px 8px",borderRadius:5,border:"none",cursor:"pointer",fontSize:10,background:form.bagUnit===u?"#0077B6":"#1a1a2a",color:form.bagUnit===u?"#fff":"#9ca3af"}}>
                        {u}
                      </button>
                    ))}
                  </div>
                </div>
                {form.bagSize && <div style={{fontSize:10,color:"#38bdf8"}}>例: {form.bagSize}{form.unit==="その他"?form.customUnit:form.unit} = 1{form.bagUnit}</div>}
              </div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <Input label="現在在庫" type="number" value={form.stock} onChange={e=>setForm(p=>({...p,stock:e.target.value}))}/>
            <Input label="最低在庫" type="number" value={form.minStock} onChange={e=>setForm(p=>({...p,minStock:e.target.value}))}/>
            <Input label="発注数量" type="number" value={form.orderQty} onChange={e=>setForm(p=>({...p,orderQty:e.target.value}))}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Select label="取引業者" value={form.supplierId} onChange={e=>setForm(p=>({...p,supplierId:e.target.value}))}
              options={[{value:"",label:"未設定"},...INITIAL_SUPPLIERS.map(s=>({value:s.id,label:s.name}))]}/>
            <Input label="単価 (¥)" type="number" value={form.unitPrice} onChange={e=>setForm(p=>({...p,unitPrice:e.target.value}))}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setShowForm(false)} color="#1a1a2e" style={{color:"#8b95a1"}}>キャンセル</Btn>
            <Btn onClick={saveItem} color="#0077B6">{editItem?"更新する":"登録する"}</Btn>
          </div>
        </Modal>
      )}

      {lowStock.length > 0 && (
        <div style={{background:"#130808",border:"1px solid #7f1d1d",borderRadius:12,padding:14,marginBottom:16}}>
          <div style={{fontSize:12,color:"#f87171",fontWeight:700,marginBottom:8}}>⚠ 在庫不足 {lowStock.length}件 → 発注管理から発注できます</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {lowStock.map(item=><Chip key={item.id} label={`${item.name}: ${fmtStock(item)}`} color="#f87171" bg="#1a0808"/>)}
          </div>
        </div>
      )}

      {tab==="stock" && cats.map(cat=>(
        <div key={cat} style={{marginBottom:20}}>
          <div style={{fontSize:11,color:"#7c8794",letterSpacing:".1em",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
            <span>{cat}</span><div style={{flex:1,height:1,background:"#1a1a2a"}}/>
          </div>
          {inventory.filter(i=>i.category===cat).map(renderCard)}
        </div>
      ))}

      {tab==="stocktake" && (
        <div>
          <div style={{background:"#0a0c18",border:"1px solid #1a2040",borderRadius:12,padding:14,marginBottom:16}}>
            <div style={{fontSize:12,color:"#9ca3af"}}>理論在庫が自動表示。実際の在庫数を入力してください。<span style={{color:"#fb923c"}}> ±10%超で本部報告。</span></div>
          </div>
          {cats.map(cat=>(
            <div key={cat} style={{marginBottom:20}}>
              <div style={{fontSize:11,color:"#7c8794",letterSpacing:".1em",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
                <span>{cat}</span><div style={{flex:1,height:1,background:"#1a1a2a"}}/>
              </div>
              {inventory.filter(i=>i.category===cat).map(item=>{
                const actual = stocktake[item.id] ?? "";
                const diff = actual !== "" ? Number(actual) - item.stock : null;
                const isAlert = diff !== null && item.stock > 0 && Math.abs(diff/item.stock) > 0.10;
                return (
                  <div key={item.id} style={{background:isAlert?"#130808":"#0c0c18",border:`1px solid ${isAlert?"#9a3412":"#1e1e2e"}`,borderRadius:12,padding:14,marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:120}}>
                        <div style={{fontSize:13,fontWeight:700,color:"#eee"}}>{item.name}</div>
                        <div style={{fontSize:11,color:"#38bdf8"}}>理論: {fmtStock(item)}</div>
                      </div>
                      <input type="number" placeholder="実数量" value={actual}
                        onChange={e=>setStocktake(p=>({...p,[item.id]:e.target.value}))}
                        style={{width:110,padding:"7px",background:"#0a0a16",border:`1px solid ${isAlert?"#9a3412":"#2a2a3a"}`,color:"#eee",borderRadius:8,fontSize:12}}/>
                      <span style={{fontSize:11,color:"#7c8794"}}>{item.unit}</span>
                      {diff !== null && <Chip label={`${diff>=0?"+":""}${diff}${item.unit}${isAlert?" ⚠本部報告":""}`} color={isAlert?"#f87171":"#4ade80"} bg={isAlert?"#1a0808":"#052e16"}/>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
          <Btn onClick={()=>notify("✓ 棚卸し完了・本部へ送信しました")} color="#0077B6" style={{width:"100%",padding:14,fontSize:14}}>棚卸し完了・本部へ提出</Btn>
        </div>
      )}
    </div>
  );
}


// ─── TASK MANAGER ─────────────────────────────────────────────────────────
// ルーティン定義: id, name, category(prep/clean), store, days(0-6 or "daily"),
//   deadline, assignedTo(null=未割当), order, recipeId
const DAYS_JA = ["日","月","火","水","木","金","土"];
const FREQ_OPTS = [
  {value:"daily",  label:"毎日"},
  {value:"weekday",label:"平日(月〜金)"},
  {value:"weekend",label:"週末(土日)"},
  {value:"custom", label:"曜日指定"},
  {value:"once",   label:"特定日付に1回"},
  {value:"free",   label:"フリー（日付を複数指定）"},
];

function TaskManagerView({routines, setRoutines, allPrepTasks, setAllPrepTasks, cleanTasks, setCleanTasks, notify, storeFilter, taskCats=DEFAULT_TASK_CATS, saveTaskCats}) {
  const [tab, setTab] = useState("routines");
  const [catEditForm, setCatEditForm] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [editRoutine, setEditRoutine] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [form, setForm] = useState({
    name:"", category:"prep", store:storeFilter||1,
    freq:"daily", customDays:[], onceDate:"", freeDates:[],
    deadline:"10:00", assignedTo:null, recipeId:""
  });
  // single task form
  const [showSingle, setShowSingle] = useState(false);
  const [singleForm, setSingleForm] = useState({
    name:"", category:"prep", store:storeFilter||1,
    date:dateStr(-1), deadline:"10:00", assignedTo:null
  });

  const myRoutines = storeFilter
    ? routines.filter(r=>r.store===storeFilter)
    : routines;

  // ── Drag & Drop ──
  const handleDragStart = (e, id) => { setDragId(id); e.dataTransfer.effectAllowed="move"; };
  const handleDragOver  = (e, id) => { e.preventDefault(); setDragOver(id); };
  const handleDrop      = (e, id) => {
    e.preventDefault();
    if (dragId === id) { setDragId(null); setDragOver(null); return; }
    setRoutines(prev => {
      const arr = [...prev];
      const fromIdx = arr.findIndex(r=>r.id===dragId);
      const toIdx   = arr.findIndex(r=>r.id===id);
      const [moved] = arr.splice(fromIdx, 1);
      arr.splice(toIdx, 0, moved);
      return arr.map((r,i)=>({...r,order:i}));
    });
    setDragId(null); setDragOver(null);
  };

  // ── Form helpers ──
  const openNew = () => {
    setEditRoutine(null);
    setForm({name:"",category:"prep",store:storeFilter||1,freq:"daily",customDays:[],onceDate:"",freeDates:[],deadline:"10:00",assignedTo:null,recipeId:""});
    setShowForm(true);
  };
  const openEdit = (r) => {
    setEditRoutine(r);
    setForm({name:r.name,category:r.category,store:r.store,freq:r.freq,customDays:r.customDays||[],onceDate:r.onceDate||"",freeDates:r.freeDates||[],deadline:r.deadline,assignedTo:r.assignedTo,recipeId:r.recipeId||""});
    setShowForm(true);
  };
  const saveRoutine = () => {
    if (!form.name.trim()) { notify("タスク名を入力してください","warn"); return; }
    if (editRoutine) {
      setRoutines(p=>p.map(r=>r.id===editRoutine.id ? {...r,...form} : r));
      notify("✓ ルーティンを更新しました");
    } else {
      setRoutines(p=>[...p,{...form,id:"rt"+Date.now(),order:p.length,active:true}]);
      notify("✓ ルーティンを登録しました");
    }
    setShowForm(false);
  };
  const toggleRoutine = (id) => setRoutines(p=>p.map(r=>r.id===id?{...r,active:!r.active}:r));
  const deleteRoutine = (id) => { setRoutines(p=>p.filter(r=>r.id!==id)); notify("ルーティンを削除しました","warn"); };

  // ── 手動タスク登録 ──
  const addSingleTask = () => {
    if (!singleForm.name.trim()) { notify("タスク名を入力してください","warn"); return; }
    if (singleForm.category==="prep") {
      setAllPrepTasks(p=>[...p,{id:"pt"+Date.now(),name:singleForm.name,recipeId:null,deadline:singleForm.deadline,store:singleForm.store,assignedTo:singleForm.assignedTo,date:singleForm.date,completedAt:null,completedBy:null,amountVerified:false,amountLog:[]}]);
    } else {
      setCleanTasks(p=>[...p,{id:"ct"+Date.now(),name:singleForm.name,area:"その他",deadline:singleForm.deadline,store:singleForm.store,assignedTo:singleForm.assignedTo,completedAt:null,completedBy:null,points:2}]);
    }
    setShowSingle(false);
    notify("✓ タスクを追加しました");
  };

  const freqLabel = (r) => {
    if (r.freq==="daily")   return "毎日";
    if (r.freq==="weekday") return "月〜金";
    if (r.freq==="weekend") return "土・日";
    if (r.freq==="once")    return `${r.onceDate} 1回`;
    if (r.freq==="custom")  return (r.customDays||[]).map(d=>DAYS_JA[d]).join("・")+"曜";
    if (r.freq==="free")    return `フリー(${(r.freeDates||[]).length}日)`;
    return "-";
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>タスク管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>ルーティン設定・手動追加・スケジュール管理</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>setShowSingle(true)} color="#1a3a5a" style={{border:"1px solid #0077B644"}}>＋ 1件追加</Btn>
          <Btn onClick={openNew} color="#E85D04">＋ ルーティン登録</Btn>
        </div>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {[["routines","ルーティン一覧"],["schedule","スケジュール確認"],["cats","⚙ カテゴリー"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:tab===id?"#E85D04":"#1a1a2a",color:tab===id?"#fff":"#8b95a1"}}>{label}</button>
        ))}
      </div>

      {/* ── ルーティン登録フォーム ── */}
      {showForm && (
        <Modal onClose={()=>setShowForm(false)} width={520}>
          <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:20}}>{editRoutine?"✏ ルーティン編集":"＋ ルーティン登録"}</div>
          <Input label="タスク名 *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="例: 醤油ダレ仕込み"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Select label="カテゴリー" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}
              options={[{value:"prep",label:"🔪 仕込み"},{value:"clean",label:"✦ クリーン"},...taskCats.filter(c=>c.id!=="prep"&&c.id!=="clean").map(c=>({value:c.id,label:(c.icon||"📋")+" "+c.label}))]}/>
            <Select label="店舗" value={String(form.store)} onChange={e=>setForm(p=>({...p,store:Number(e.target.value)}))}
              options={INITIAL_STORES.map(s=>({value:String(s.id),label:s.name}))}/>
          </div>
          <Input label="締切時刻" type="time" value={form.deadline} onChange={e=>setForm(p=>({...p,deadline:e.target.value}))}/>

          {/* 頻度設定 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:8}}>繰り返し設定</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {FREQ_OPTS.map(o=>(
                <button key={o.value} onClick={()=>setForm(p=>({...p,freq:o.value}))}
                  style={{padding:"5px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,background:form.freq===o.value?"#E85D04":"#1a1a2a",color:form.freq===o.value?"#fff":"#9ca3af"}}>
                  {o.label}
                </button>
              ))}
            </div>
            {form.freq==="custom" && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {DAYS_JA.map((d,i)=>(
                  <button key={i} onClick={()=>setForm(p=>({...p,customDays:p.customDays.includes(i)?p.customDays.filter(x=>x!==i):[...p.customDays,i]}))}
                    style={{width:34,height:34,borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:form.customDays.includes(i)?"#E85D04":"#1a1a2a",color:form.customDays.includes(i)?"#fff":"#8b95a1"}}>
                    {d}
                  </button>
                ))}
              </div>
            )}
            {form.freq==="once" && (
              <input type="date" value={form.onceDate} onChange={e=>setForm(p=>({...p,onceDate:e.target.value}))}
                style={{width:"100%",padding:"9px",background:"#0c0c18",border:"1px solid #2a2a3a",color:"#eee",borderRadius:8,fontSize:13}}/>
            )}
            {form.freq==="free" && (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <input type="date" id="freeDatePicker"
                    style={{flex:1,padding:"9px",background:"#0c0c18",border:"1px solid #2a2a3a",color:"#eee",borderRadius:8,fontSize:13}}/>
                  <Btn onClick={()=>{
                    const el=document.getElementById("freeDatePicker");
                    if(!el.value) return;
                    if(!form.freeDates.includes(el.value)) setForm(p=>({...p,freeDates:[...p.freeDates,el.value].sort()}));
                    el.value="";
                  }} color="#E85D04" style={{padding:"9px 14px",flexShrink:0}}>追加</Btn>
                </div>
                {form.freeDates.length===0
                  ? <div style={{fontSize:11,color:"#6b7280",padding:"6px 0"}}>日付を選んで「追加」してください</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {form.freeDates.map(d=>(
                      <div key={d} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"#0a1a2a",border:"1px solid #1a3a5a",borderRadius:8}}>
                        <span style={{fontSize:12,color:"#38bdf8"}}>{d}</span>
                        <button onClick={()=>setForm(p=>({...p,freeDates:p.freeDates.filter(x=>x!==d)}))}
                          style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:14,lineHeight:1,padding:"0 2px"}}>×</button>
                      </div>
                    ))}
                  </div>
                }
              </div>
            )}
          </div>

          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:5}}>担当者</div>
            <StaffPicker value={form.assignedTo} onChange={id=>setForm(p=>({...p,assignedTo:id}))} storeFilter={form.store}/>
          </div>

          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setShowForm(false)} color="#1a1a2e" style={{color:"#8b95a1"}}>キャンセル</Btn>
            <Btn onClick={saveRoutine} color="#E85D04">{editRoutine?"更新する":"登録する"}</Btn>
          </div>
        </Modal>
      )}

      {/* ── 手動タスク追加 ── */}
      {showSingle && (
        <Modal onClose={()=>setShowSingle(false)}>
          <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:20}}>＋ タスクを1件追加</div>
          <Input label="タスク名 *" value={singleForm.name} onChange={e=>setSingleForm(p=>({...p,name:e.target.value}))} placeholder="例: 特別仕込み"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Select label="カテゴリー" value={singleForm.category} onChange={e=>setSingleForm(p=>({...p,category:e.target.value}))}
              options={taskCats.map(c=>({value:c.id,label:c.icon+" "+c.label}))}/>
            <Select label="店舗" value={String(singleForm.store)} onChange={e=>setSingleForm(p=>({...p,store:Number(e.target.value)}))}
              options={INITIAL_STORES.map(s=>({value:String(s.id),label:s.name}))}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Input label="実施日" type="date" value={singleForm.date} onChange={e=>setSingleForm(p=>({...p,date:e.target.value}))}/>
            <Input label="締切時刻" type="time" value={singleForm.deadline} onChange={e=>setSingleForm(p=>({...p,deadline:e.target.value}))}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:5}}>担当者</div>
            <StaffPicker value={singleForm.assignedTo} onChange={id=>setSingleForm(p=>({...p,assignedTo:id}))} storeFilter={singleForm.store}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setShowSingle(false)} color="#1a1a2e" style={{color:"#8b95a1"}}>キャンセル</Btn>
            <Btn onClick={addSingleTask} color="#E85D04">追加する</Btn>
          </div>
        </Modal>
      )}

      {/* ── ルーティン一覧（ドラッグ対応） ── */}
      {tab==="routines" && (
        <div>
          <div style={{background:"#0a0816",border:"1px solid #1a1a2e",borderRadius:12,padding:12,marginBottom:16,fontSize:12,color:"#8b95a1"}}>
            🖱 ドラッグして表示順を変更できます
          </div>
          {myRoutines.length===0 && <div style={{color:"#6b7280",fontSize:13,padding:24,textAlign:"center"}}>ルーティンがまだ登録されていません</div>}
          {myRoutines.map(r=>(
            <div key={r.id}
              draggable
              onDragStart={e=>handleDragStart(e,r.id)}
              onDragOver={e=>handleDragOver(e,r.id)}
              onDrop={e=>handleDrop(e,r.id)}
              onDragEnd={()=>{setDragId(null);setDragOver(null);}}
              style={{background:dragOver===r.id?"#1a1a3a":r.active?"#0c0c18":"#0a0a12",border:`1px solid ${dragOver===r.id?"#E85D04":r.active?"#1e1e2e":"#141420"}`,borderRadius:14,padding:16,marginBottom:8,cursor:"grab",opacity:r.active?1:.5,transition:"all .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:18,cursor:"grab",color:"#6b7280"}}>⠿</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:700,color:r.active?"#eee":"#7c8794"}}>{r.name}</span>
                    {(()=>{const FIXED={prep:{icon:"🔪",label:"仕込み",color:"#E85D04"},clean:{icon:"✦",label:"クリーン",color:"#C9184A"}};const cat=taskCats.find(c=>c.id===r.category)||FIXED[r.category]||{icon:"📋",label:r.category||"その他",color:"#6b7280"};return <Chip label={cat.icon+" "+cat.label} color={cat.color} bg={cat.color+"11"}/>;})()}
                    <Chip label={freqLabel(r)} color="#38bdf8" bg="#0a1a2a"/>
                    <Chip label={INITIAL_STORES.find(s=>s.id===r.store)?.name||""} color="#8b95a1" bg="#1a1a2a"/>
                  </div>
                  <div style={{fontSize:11,color:"#7c8794"}}>締切: {r.deadline}{r.assignedTo?` · ${INITIAL_USERS.find(u=>u.id===r.assignedTo)?.name}`:""}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>toggleRoutine(r.id)} style={{padding:"5px 10px",background:r.active?"#052e16":"#1a1a2a",border:`1px solid ${r.active?"#14532d":"#2a2a3a"}`,color:r.active?"#4ade80":"#8b95a1",borderRadius:7,cursor:"pointer",fontSize:11}}>
                    {r.active?"✓ 有効":"停止中"}
                  </button>
                  <button onClick={()=>openEdit(r)} style={{padding:"5px 10px",background:"#1a1a2a",border:"1px solid #2a2a3a",color:"#aaa",borderRadius:7,cursor:"pointer",fontSize:11}}>編集</button>
                  <button onClick={()=>deleteRoutine(r.id)} style={{padding:"5px 10px",background:"#1a0808",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:7,cursor:"pointer",fontSize:11}}>削除</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}


      {/* ── カテゴリー設定 ── */}
      {tab==="cats" && (
        <div>
          {catEditForm && (
            <Modal onClose={()=>setCatEditForm(null)} width={400}>
              <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:16}}>
                {catEditForm._isNew ? "＋ カテゴリーを追加" : "✏ カテゴリーを編集"}
              </div>
              <Input label="カテゴリー名 *" value={catEditForm.label}
                onChange={e=>setCatEditForm(p=>({...p,label:e.target.value}))} placeholder="例: 設備メンテ"/>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>アイコン</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {["🔪","✦","📮","💬","🔧","📋","🧹","🌡","💴","🔒","📦","⚡","🗂","🎯","🏪","🧴","🍳","🛒","📝","🔍"].map(ic=>(
                    <button key={ic} onClick={()=>setCatEditForm(p=>({...p,icon:ic}))}
                      style={{width:36,height:36,borderRadius:8,border:`2px solid ${catEditForm.icon===ic?"#E85D04":"#1e1e2e"}`,
                        background:catEditForm.icon===ic?"#1a0a00":"#0c0c18",fontSize:18,cursor:"pointer"}}>
                      {ic}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>カラー</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {["#E85D04","#C9184A","#0077B6","#6D28D9","#16a34a","#d97706","#0891b2","#be185d","#0f766e","#7c3aed"].map(c=>(
                    <button key={c} onClick={()=>setCatEditForm(p=>({...p,color:c}))}
                      style={{width:30,height:30,borderRadius:"50%",background:c,
                        border:`3px solid ${catEditForm.color===c?"#fff":"transparent"}`,cursor:"pointer"}}/>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <Btn onClick={()=>setCatEditForm(null)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
                <Btn onClick={()=>{
                  if(!catEditForm.label.trim()){notify("カテゴリー名を入力してください","warn");return;}
                  if(catEditForm._isNew){
                    saveTaskCats([...taskCats,{id:"cat_"+Date.now(),label:catEditForm.label,icon:catEditForm.icon||"📋",color:catEditForm.color||"#E85D04"}]);
                  } else {
                    saveTaskCats(taskCats.map(c=>c.id===catEditForm.id?{...catEditForm,_isNew:undefined}:c));
                  }
                  notify("✓ カテゴリーを保存しました");
                  setCatEditForm(null);
                }} color="#E85D04" style={{flex:1}}>保存する</Btn>
              </div>
            </Modal>
          )}

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:12,color:"#8b95a1"}}>ルーティン・タスクで使うカテゴリーを管理</div>
            <Btn onClick={()=>setCatEditForm({_isNew:true,label:"",icon:"📋",color:"#E85D04"})} color="#E85D04">＋ 追加</Btn>
          </div>

          {taskCats.map((cat,idx)=>(
            <div key={cat.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
              background:"#0c0c18",border:`1px solid ${cat.color}33`,borderLeft:`4px solid ${cat.color}`,
              borderRadius:12,marginBottom:8}}>
              <span style={{fontSize:20}}>{cat.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#eee"}}>{cat.label}</div>
                <div style={{fontSize:11,color:"#8b95a1"}}>ID: {cat.id}</div>
              </div>
              <button onClick={()=>setCatEditForm({...cat})}
                style={{padding:"5px 12px",background:"#1a1a2a",border:"1px solid #2a2a3a",color:"#aaa",borderRadius:7,cursor:"pointer",fontSize:11}}>
                編集
              </button>
              {!["prep","clean"].includes(cat.id) && (
                <button onClick={()=>{
                  if(window.confirm(`「${cat.label}」を削除しますか？`))
                    saveTaskCats(taskCats.filter(c=>c.id!==cat.id));
                }}
                  style={{padding:"5px 12px",background:"#1a0808",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:7,cursor:"pointer",fontSize:11}}>
                  削除
                </button>
              )}
              {["prep","clean"].includes(cat.id) && (
                <span style={{fontSize:10,color:"#445",padding:"4px 8px"}}>固定</span>
              )}
            </div>
          ))}
          <div style={{fontSize:11,color:"#8b95a1",marginTop:12,padding:"10px 14px",background:"#0a0a12",borderRadius:8}}>
            💡 「仕込み」「クリーン」は固定カテゴリーです。追加カテゴリーはルーティン登録・タスク追加時に選択できます。
          </div>
        </div>
      )}

      {/* ── スケジュール確認（週表示） ── */}
      {tab==="schedule" && (
        <div>
          <div style={{overflowX:"auto"}}>
            <div style={{display:"grid",gridTemplateColumns:`140px repeat(7,1fr)`,gap:1,minWidth:700}}>
              <div style={{padding:"10px 12px",fontSize:11,color:"#7c8794"}}>タスク名</div>
              {Array.from({length:7},(_,i)=>{
                const d=new Date(today); d.setDate(d.getDate()-d.getDay()+i);
                const ds=d.toISOString().slice(0,10);
                const isToday=ds===todayStr;
                return <div key={i} style={{padding:"10px 8px",textAlign:"center",fontSize:11,color:isToday?"#E85D04":"#7c8794",fontWeight:isToday?700:400,background:isToday?"#1a0a00":"transparent",borderRadius:6}}>
                  {DAYS_JA[i]}<br/><span style={{fontSize:10}}>{d.getMonth()+1}/{d.getDate()}</span>
                </div>;
              })}
              {myRoutines.filter(r=>r.active).map(r=>(
                <React.Fragment key={r.id}>
                  <div style={{padding:"8px 12px",fontSize:12,color:"#ccc",borderTop:"1px solid #1a1a2a",display:"flex",alignItems:"center",gap:6}}>
                    <span>{r.name}</span>
                  </div>
                  {Array.from({length:7},(_,i)=>{
                    const d=new Date(today); d.setDate(d.getDate()-d.getDay()+i);
                    const dow=d.getDay();
                    const active =
                      r.freq==="daily"   ? true :
                      r.freq==="weekday" ? dow>=1&&dow<=5 :
                      r.freq==="weekend" ? dow===0||dow===6 :
                      r.freq==="custom"  ? (r.customDays||[]).includes(dow) :
                      r.freq==="once"    ? r.onceDate===d.toISOString().slice(0,10) :
                      r.freq==="free"    ? (r.freeDates||[]).includes(d.toISOString().slice(0,10)) : false;
                    return <div key={i} style={{borderTop:"1px solid #1a1a2a",display:"flex",alignItems:"center",justifyContent:"center",padding:4}}>
                      {active
                        ? <div style={{width:28,height:28,borderRadius:8,background:r.category==="prep"?"#E85D0422":"#C9184A22",border:`1px solid ${r.category==="prep"?"#E85D04":"#C9184A"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                            {r.category==="prep"?"🔪":"✦"}
                          </div>
                        : <div style={{width:8,height:8,borderRadius:"50%",background:"#1a1a2a"}}/>
                      }
                    </div>;
                  })}
                </React.Fragment>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ─────────────────────────────────────────────────────────────────────────
// TOP VIEW  直感的なメイン操作画面
// ─────────────────────────────────────────────────────────────────────────
function TopView({allPrepTasks, setAllPrepTasks, cleanTasks, setCleanTasks, inventory, setInventory, recipes, currentUserId, notify, storeFilter, routines=[], paletteDrag, setPaletteDrag, extDragTask, setExtDragTask, extDragOver, setExtDragOver, onDayChange, onStoreChange}) {
  const [activeDay, setActiveDay_]   = useState(0); // 0=今日, 1=明日, 2=明後日, 3=3日後
  const [activeStore, setActiveStore_] = useState(storeFilter || 1);
  const setActiveDay = (v) => { setActiveDay_(v); if(onDayChange) onDayChange(v); };
  const setActiveStore = (v) => { setActiveStore_(v); if(onStoreChange) onStoreChange(v); };
  const [showAdd, setShowAdd]       = useState(false);
  const [addCategory, setAddCategory] = useState("prep");
  const [addName, setAddName]       = useState("");
  const [addDeadline, setAddDeadline] = useState("10:00");
  const [addAssign, setAddAssign]   = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [staffPick, setStaffPick] = useState(null); // {task} 完了時の担当者選択
  const [verifyTask, setVerifyTask] = useState(null); // {task, recipe, staffId} 分量チェック
  // dragTask/dragOver は AppInner からリフトアップ（サイドバーと共有）
  const dragTask = extDragTask;
  const setDragTask = setExtDragTask;
  const dragOver = extDragOver;
  const setDragOver = setExtDragOver;

  const isMobile = useIsMobile();
  const DAY_LABELS = ["今日","明日","明後日","3日後"];
  const dates = [0,1,2,3].map(i => dateStr(-i)); // 今日〜3日後
  const viewDate = dates[activeDay];
  const viewStore = storeFilter || activeStore;

  // 全日程で編集可能（ログイン中のみ）
  const isEditable = currentUserId !== null;

  // その日のタスクを全部取得
  const prepToday  = allPrepTasks.filter(t => t.store===viewStore && t.date===viewDate);
  const cleanToday = cleanTasks.filter(t => t.store===viewStore);
  // cleanTasksには日付がないので今日のみ表示
  const allToday = [
    ...prepToday.map(t=>({...t,_cat:"prep"})),
    ...(activeDay===0 ? cleanToday.map(t=>({...t,_cat:"clean"})) : []),
  ];
  const todo = allToday.filter(t=>!t.completedAt);
  const done = allToday.filter(t=>!!t.completedAt);

  // 進捗
  const progress = allToday.length ? Math.round(done.length/allToday.length*100) : 0;

  // 在庫不足
  const lowStock = inventory.filter(i=>i.stock<=i.minStock);

  // ── 今日(表示日)の仕込みタスクをルーティンから自動生成 ──
  useEffect(() => {
    if (!routines || routines.length === 0) return;
    const dow = new Date(viewDate + "T00:00:00").getDay();
    const matchToday = (r) =>
      r.freq==="daily"   ? true :
      r.freq==="weekday" ? dow>=1&&dow<=5 :
      r.freq==="weekend" ? dow===0||dow===6 :
      r.freq==="custom"  ? (r.customDays||[]).includes(dow) :
      r.freq==="once"    ? r.onceDate===viewDate :
      r.freq==="free"    ? (r.freeDates||[]).includes(viewDate) : false;
    const matches = routines.filter(r => r.active && r.category==="prep" && r.store===viewStore && matchToday(r));
    const toAdd = matches.filter(r => !allPrepTasks.some(t => t.routineId===r.id && t.date===viewDate && t.store===viewStore));
    if (toAdd.length === 0) return;
    setAllPrepTasks(p => [...p, ...toAdd.map(r => ({
      id: "pt_" + r.id + "_" + viewDate,
      routineId: r.id, name: r.name, recipeId: r.recipeId || null,
      deadline: r.deadline || "10:00", store: viewStore, assignedTo: r.assignedTo || null,
      date: viewDate, completedAt: null, completedBy: null, amountVerified: false, amountLog: [],
    }))]);
  }, [routines, viewDate, viewStore, allPrepTasks]);

  // タスク完了トグル
  const toggleDone = (task) => {
    if (task.completedAt) {
      // 完了→未完了: 即時
      if (task._cat==="prep") setAllPrepTasks(p=>p.map(t=>t.id===task.id?{...t,completedAt:null,completedBy:null}:t));
      else setCleanTasks(p=>p.map(t=>t.id===task.id?{...t,completedAt:null,completedBy:null}:t));
    } else {
      // 未完了→完了: 担当者選択モーダルを出す
      setStaffPick({task});
    }
  };
  const confirmDone = (task, userIds) => {
    setStaffPick(null);
    if (task._cat==="prep") {
      const recipe = recipes.find(r=>r.id===task.recipeId);
      setVerifyTask({task, recipe, staffIds:userIds});
    } else {
      const now = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
      setCleanTasks(p=>p.map(t=>t.id===task.id?{...t,completedAt:now,completedBy:userIds}:t));
      notify("✓ クリーン完了！"+(userIds.length>1?"（"+userIds.length+"名）":""));
    }
  };
  const confirmVerify = (task, amountLog, staffIds) => {
    const now = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const ids = (staffIds && staffIds.length>0) ? staffIds : [];
    setAllPrepTasks(p=>p.map(t=>t.id===task.id?{...t,completedAt:now,completedBy:ids,amountVerified:true,amountLog}:t));
    if (task.recipeId) {
      const rec = recipes.find(r=>r.id===task.recipeId);
      if (rec) setInventory(prev=>prev.map(item=>{
        const ing = rec.ingredients.find(i=>i.itemId===item.id);
        return ing ? {...item, stock:Math.max(0,item.stock-ing.amount)} : item;
      }));
    }
    setVerifyTask(null);
    const hasWarn = amountLog.some(l=>!l.ok);
    notify(hasWarn ? "⚠ 差異あり。完了記録しました" : "✓ 仕込み完了！在庫を更新しました", hasWarn?"warn":"success");
  };

  // タスク削除
  const deleteTask = (task) => {
    if (task._cat==="prep") setAllPrepTasks(p=>p.filter(t=>t.id!==task.id));
    else setCleanTasks(p=>p.filter(t=>t.id!==task.id));
    notify("タスクを削除しました","warn");
    setDeleteConfirm(null);
  };

  // タスク追加
  const addTask = () => {
    if (!addName.trim()) { notify("タスク名を入力してください","warn"); return; }
    if (addCategory==="prep") {
      setAllPrepTasks(p=>[...p,{
        id:"pt"+Date.now(), name:addName, recipeId:null,
        deadline:addDeadline, store:viewStore, assignedTo:addAssign,
        date:viewDate, completedAt:null, completedBy:null,
        amountVerified:false, amountLog:[]
      }]);
    } else {
      setCleanTasks(p=>[...p,{
        id:"ct"+Date.now(), name:addName, area:"その他",
        deadline:addDeadline, store:viewStore, assignedTo:addAssign,
        completedAt:null, completedBy:null, points:2
      }]);
    }
    setAddName(""); setAddDeadline("10:00"); setAddAssign(null);
    setShowAdd(false);
    notify("✓ タスクを追加しました");
  };

  // ドラッグ完了（todo→done / done→todo / palette→todo）
  const handleDropZone = (zone, task) => {
    // パレットからのドロップ
    if (!task && paletteDrag && zone==="todo") {
      const item = paletteDrag;
      if (item.id==="_new_prep" || item.id==="_new_clean") {
        // カスタム：名前入力モーダルを開く
        setAddCategory(item.category);
        setShowAdd(true);
      } else {
        // ルーティンをそのままタスクに追加
        const prepAlready = item.category==="prep" && allPrepTasks.some(t=>t.name===item.name&&t.date===viewDate&&t.store===viewStore);
        const cleanAlready = item.category==="clean" && cleanTasks.some(t=>t.name===item.name&&t.store===viewStore&&!t.completedAt);
        if (prepAlready || cleanAlready) { notify("すでに追加済みです","warn"); setPaletteDrag(null); return; }
        if (item.category==="prep") {
          setAllPrepTasks(p=>[...p,{id:"pt"+Date.now(),name:item.name,recipeId:null,deadline:item.deadline,store:viewStore,assignedTo:null,date:viewDate,completedAt:null,completedBy:null,amountVerified:false,amountLog:[]}]);
        } else {
          setCleanTasks(p=>[...p,{id:"ct"+Date.now(),name:item.name,area:"その他",deadline:item.deadline,store:viewStore,assignedTo:null,completedAt:null,completedBy:null,points:2}]);
        }
        notify(`✓ 「${item.name}」を追加しました`);
      }
      setPaletteDrag(null); setDragOver(null);
      return;
    }
    if (!task) return;
    const shouldComplete = zone==="done" && !task.completedAt;
    const shouldUndo     = zone==="todo" && task.completedAt;
    if (shouldComplete || shouldUndo) toggleDone(task);
    else { setDragTask(null); setDragOver(null); }
    if (shouldComplete) return;
    setDragTask(null); setDragOver(null);
  };

  // 未完了ゾーン内でのタスク並び替え
  const [dragOverTask, setDragOverTask] = useState(null);
  const handleReorder = (draggedTask, targetTask) => {
    if (!draggedTask || !targetTask || draggedTask.id === targetTask.id) return;
    if (draggedTask._cat === "prep") {
      setAllPrepTasks(p => {
        const arr = [...p];
        const fi = arr.findIndex(t=>t.id===draggedTask.id);
        const ti = arr.findIndex(t=>t.id===targetTask.id);
        if (fi<0||ti<0) return p;
        const [m] = arr.splice(fi,1); arr.splice(ti,0,m);
        return arr;
      });
    } else {
      setCleanTasks(p => {
        const arr = [...p];
        const fi = arr.findIndex(t=>t.id===draggedTask.id);
        const ti = arr.findIndex(t=>t.id===targetTask.id);
        if (fi<0||ti<0) return p;
        const [m] = arr.splice(fi,1); arr.splice(ti,0,m);
        return arr;
      });
    }
    setDragOverTask(null);
  };

  // パレットへ戻すドロップ（タスク削除）
  const handleDropToPalette = (task) => {
    if (!task) return;
    if (task._cat==="prep") setAllPrepTasks(p=>p.filter(t=>t.id!==task.id));
    else setCleanTasks(p=>p.filter(t=>t.id!==task.id));
    notify(`「${task.name}」を削除しました`,"warn");
    setDragTask(null); setDragOver(null);
  };

  // カラー
  const catColor = {prep:"#E85D04", clean:"#C9184A"};
  const catIcon  = {prep:"🔪", clean:"✦"};
  const catLabel = {prep:"仕込み", clean:"クリーン"};

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>

      {/* 削除確認モーダル */}
      {deleteConfirm && (
        <Modal onClose={()=>setDeleteConfirm(null)} width={360}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:8}}>🗑 タスクを削除</div>
          <div style={{fontSize:13,color:"#aaa",marginBottom:20}}>「{deleteConfirm.name}」を削除しますか？</div>
