          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setDeleteConfirm(null)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={()=>deleteTask(deleteConfirm)} color="#dc2626" style={{flex:1}}>削除する</Btn>
          </div>
        </Modal>
      )}

      {/* 担当者選択モーダル（完了時） */}
      {staffPick && (
        <StaffMultiPickModal
          title="✓ 担当者を選択（複数可）"
          subtitle={"「"+staffPick.task.name+"」"}
          storeId={viewStore}
          onClose={()=>{setStaffPick(null);setDragTask(null);setDragOver(null);}}
          onConfirm={ids=>confirmDone(staffPick.task, ids)}
        />
      )}

      {/* 分量チェックモーダル（仕込み） */}
      {verifyTask && (
        <AmountVerifyModal
          task={verifyTask.task}
          recipe={verifyTask.recipe}
          onConfirm={log=>confirmVerify(verifyTask.task, log, verifyTask.staffIds)}
          onCancel={()=>setVerifyTask(null)}
        />
      )}

      {/* タスク追加モーダル */}
      {showAdd && (
        <Modal onClose={()=>setShowAdd(false)} width={400}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:16}}>＋ タスクを追加</div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["prep","clean"].map(cat=>(
              <button key={cat} onClick={()=>setAddCategory(cat)}
                style={{flex:1,padding:"10px",borderRadius:10,border:`2px solid ${addCategory===cat?catColor[cat]:"#1e1e2e"}`,background:addCategory===cat?catColor[cat]+"22":"transparent",color:addCategory===cat?catColor[cat]:"#7c8794",cursor:"pointer",fontSize:13,fontWeight:700}}>
                {catIcon[cat]} {catLabel[cat]}
              </button>
            ))}
          </div>
          <Input label="タスク名" value={addName} onChange={e=>setAddName(e.target.value)} placeholder="例: 特製ダレ仕込み"/>
          <Input label="締切時刻" type="time" value={addDeadline} onChange={e=>setAddDeadline(e.target.value)}/>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>担当者</div>
            <StaffPicker value={addAssign} onChange={setAddAssign} storeFilter={viewStore}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setShowAdd(false)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={addTask} color="#E85D04" style={{flex:1}}>追加する</Btn>
          </div>
        </Modal>
      )}

      {/* ヘッダーエリア */}
      <div style={{marginBottom:20}}>

        {/* 日付タブ */}
        <div style={{display:"flex",gap:6,marginBottom:16}}>
          {DAY_LABELS.map((label,i)=>(
            <button key={i} onClick={()=>setActiveDay(i)}
              style={{flex:1,padding:"10px 8px",borderRadius:12,border:`2px solid ${activeDay===i?"#E85D04":"#1e1e2e"}`,background:activeDay===i?"#1a0a00":"#0c0c18",color:activeDay===i?"#E85D04":"#7c8794",cursor:"pointer",fontSize:12,fontWeight:activeDay===i?800:400,transition:"all .15s"}}>
              <div style={{fontSize:10,color:activeDay===i?"#E85D0488":"#6b7280",marginBottom:2}}>{dates[i].slice(5).replace("-","/")}</div>
              {label}
            </button>
          ))}
        </div>

        {/* 店舗切替（本部のみ） */}
        {!storeFilter && currentUserId !== null && (
          <div style={{display:"flex",gap:6,marginBottom:14}}>
            {INITIAL_STORES.map(s=>(
              <button key={s.id} onClick={()=>setActiveStore(s.id)}
                style={{padding:"6px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,background:activeStore===s.id?"#E85D04":"#1a1a2a",color:activeStore===s.id?"#fff":"#8b95a1"}}>
                {s.name}
              </button>
            ))}
          </div>
        )}

        {/* 進捗バー */}
        <div style={{background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:14,padding:"14px 18px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:13,fontWeight:700,color:"#aaa"}}>
              {DAY_LABELS[activeDay]}の進捗
            </span>
            <span style={{fontSize:22,fontWeight:800,color:"#E85D04",fontFamily:"monospace"}}>{progress}<span style={{fontSize:13}}>%</span></span>
          </div>
          <div style={{width:"100%",height:10,background:"#1a1a2a",borderRadius:5,overflow:"hidden"}}>
            <div style={{width:`${progress}%`,height:"100%",background:`linear-gradient(90deg,#E85D04,#F48C06)`,borderRadius:5,transition:"width .6s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:11,color:"#6b7280"}}>完了 {done.length} / 全 {allToday.length} タスク</span>
            {progress===100 && <span style={{fontSize:11,color:"#4ade80",fontWeight:700}}>🎉 全完了！</span>}
          </div>
        </div>

        {/* 在庫アラート */}
        {lowStock.length>0 && (
          <div style={{background:"#130808",border:"1px solid #7f1d1d",borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#f87171",fontWeight:700,flexShrink:0}}>⚠ 在庫不足 {lowStock.length}品</span>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",flex:1}}>
              {lowStock.map(i=>(
                <span key={i.id} style={{fontSize:11,padding:"2px 8px",background:"#1a0808",border:"1px solid #7f1d1d",borderRadius:6,color:"#fca5a5"}}>
                  {i.name}
                </span>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* カンバンエリア（モバイルは1列） */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:16}}>

        {/* 未完了ゾーン */}
        <div
          onDragOver={e=>{e.preventDefault();setDragOver("todo");}}
          onDrop={e=>{e.preventDefault();handleDropZone("todo",paletteDrag?null:dragTask);}}
          style={{minHeight:300,transition:"background .2s",background:dragOver==="todo"?"#1a1a0a":"transparent",borderRadius:16,padding:2,border:dragOver==="todo"&&paletteDrag?"2px dashed #E85D04":"2px solid transparent"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"0 4px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:"#fb923c"}}/>
              <span style={{fontSize:13,fontWeight:700,color:"#aaa"}}>未完了 {todo.length}</span>
            </div>
            {isEditable && (
              <button onClick={()=>setShowAdd(true)}
                style={{width:28,height:28,borderRadius:8,background:"#E85D0422",border:"1px solid #E85D0444",color:"#E85D04",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
                +
              </button>
            )}
          </div>

          {todo.length===0 && (
            <div style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"40px 20px",border:"2px dashed #1e1e2e",borderRadius:12}}>
              {isEditable ? "＋ボタンでタスクを追加" : "タスクなし"}
            </div>
          )}

          {["prep","clean"].map(cat=>{
            const items = todo.filter(t=>t._cat===cat);
            if (items.length===0) return null;
            return (
              <div key={cat} style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 6px",marginBottom:4,color:catColor[cat],fontSize:12,fontWeight:700}}>
                  <span>{catIcon[cat]} {catLabel[cat]}</span>
                  <span style={{fontSize:10,background:catColor[cat]+"22",padding:"1px 6px",borderRadius:5}}>{items.length}</span>
                </div>
                {items.map(task=>(
                  <div key={task.id}
                    onDragOver={e=>{e.preventDefault(); if(dragTask&&dragTask.id!==task.id&&!paletteDrag) setDragOverTask(task.id);}}
                    onDragLeave={()=>setDragOverTask(null)}
                    onDrop={e=>{e.preventDefault(); if(dragTask&&!paletteDrag){handleReorder(dragTask,task);}}}
                    style={{outline:dragOverTask===task.id?"2px dashed #E85D04":"2px solid transparent",borderRadius:12,transition:"outline .1s"}}>
                    <TaskCard task={task} onToggle={()=>toggleDone(task)}
                      onDelete={isEditable?()=>setDeleteConfirm(task):null}
                      onDragStart={()=>setDragTask(task)}
                      onDragEnd={()=>{setDragTask(null);setDragOver(null);setDragOverTask(null);}}
                      catColor={catColor[task._cat]} catIcon={catIcon[task._cat]} catLabel={catLabel[task._cat]}
                      currentUserId={currentUserId}/>
                  </div>
                ))}
              </div>
            );
          })}
        </div>

        {/* 完了ゾーン */}
        <div
          onDragOver={e=>{e.preventDefault();setDragOver("done");}}
          onDrop={e=>{e.preventDefault();handleDropZone("done",dragTask);}}
          style={{minHeight:300,transition:"background .2s",background:dragOver==="done"?"#0a1a0d":"transparent",borderRadius:16,padding:2}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"0 4px"}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:"#4ade80"}}/>
            <span style={{fontSize:13,fontWeight:700,color:"#aaa"}}>完了 {done.length}</span>
          </div>

          {done.length===0 && (
            <div style={{color:"#6b7280",fontSize:13,textAlign:"center",padding:"40px 20px",border:"2px dashed #1a1a2a",borderRadius:12}}>
              完了したタスクがここに入ります
            </div>
          )}

          {done.map(task=>(
            <TaskCard key={task.id} task={task} onToggle={()=>toggleDone(task)}
              onDelete={isEditable?()=>setDeleteConfirm(task):null}
              onDragStart={()=>setDragTask(task)}
              onDragEnd={()=>{setDragTask(null);setDragOver(null);}}
              catColor={catColor[task._cat]} catIcon={catIcon[task._cat]} catLabel={catLabel[task._cat]}
              currentUserId={currentUserId} isDone/>
          ))}
        </div>
      </div>

      {/* 操作ヒント */}
      <div style={{marginTop:16,fontSize:11,color:"#6b7280",textAlign:"center"}}>
        タップで完了 ／ ＋ボタンまたは左メニューから追加 ／ 🗑 で削除
      </div>
    </div>
  );
}

// ── タスクカード ──────────────────────────────────────────────────────────
function TaskCard({task, onToggle, onDelete, onDragStart, onDragEnd, catColor, catIcon, catLabel, currentUserId, isDone}) {
  const [pressed, setPressed] = useState(false);
  const assignedUser = INITIAL_USERS.find(u=>u.id===task.assignedTo);
  const completedUser = INITIAL_USERS.find(u=>u.id===task.completedBy);
  const isUrgent = !isDone && task.deadline && task.deadline<="10:00";

  return (
    <div
      draggable
      onDragStart={e=>{e.dataTransfer.effectAllowed="move";onDragStart();}}
      onDragEnd={onDragEnd}
      onMouseDown={()=>setPressed(true)}
      onMouseUp={()=>setPressed(false)}
      onMouseLeave={()=>setPressed(false)}
      style={{
        background:isDone?"#080f0a":"#0c0c18",
        border:`1px solid ${isDone?"#14532d":isUrgent?"#78350f":"#1e1e2e"}`,
        borderLeft:`4px solid ${isDone?"#16a34a":catColor}`,
        borderRadius:12,padding:"14px 16px",marginBottom:10,
        cursor:"grab",userSelect:"none",
        transform:pressed?"scale(.98)":"scale(1)",
        transition:"transform .1s, box-shadow .1s",
        boxShadow:pressed?"none":"0 2px 8px #0004",
        opacity:isDone?.75:1,
      }}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        {/* 完了チェックボタン */}
        <button onClick={onToggle}
          style={{width:26,height:26,borderRadius:8,border:`2px solid ${isDone?"#16a34a":catColor}`,background:isDone?"#16a34a":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
          {isDone && <span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>}
        </button>

        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700,color:isDone?"#4ade80":"#eee",textDecoration:isDone?"line-through":"none"}}>{task.name}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:catColor+"22",color:catColor}}>{catIcon} {catLabel}</span>
            {isUrgent && <span style={{fontSize:10,color:"#fb923c"}}>⚡ 急</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            {task.deadline && <span style={{fontSize:11,color:isDone?"#6b7280":"#E85D04"}}>〆 {task.deadline}</span>}
            {assignedUser && !isDone && (
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <Av u={assignedUser} size={16}/>
                <span style={{fontSize:10,color:"#7c8794"}}>{(assignedUser?.name||"").split(" ")[0]}</span>
              </div>
            )}
            {isDone && completedUser && (
              <span style={{fontSize:10,color:"#4ade80"}}>{task.completedAt} · {(completedUser?.name||"").split(" ")[0]}</span>
            )}
          </div>
        </div>

        {/* 削除ボタン */}
        {onDelete && (
          <button onClick={e=>{e.stopPropagation();onDelete();}}
            style={{width:24,height:24,borderRadius:6,border:"none",background:"transparent",color:"#7c8794",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}
            onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
            onMouseLeave={e=>e.currentTarget.style.color="#2a2a3a"}>
            🗑
          </button>
        )}
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════
// 開閉店オペレーション
// ═══════════════════════════════════════════════════════════════════════
const OPS_OPEN = [];

const OPS_CLOSE = [];

function OpsView({currentUserId, storeFilter, notify, openItems, setOpenItems, closeItems, setCloseItems}) {
  const [mode, setMode]           = useState("open");   // "open" | "close"
  const [checks, setChecks]       = useState({});       // {id: {done, by, value, flag, flagNote, time}}
  const [flagModal, setFlagModal] = useState(null);     // item
  const [flagNote, setFlagNote]   = useState("");
  const [finalSign, setFinalSign] = useState(null);     // userId of final approver
  const [showApprove, setShowApprove] = useState(false);
  const [staffPickOps, setStaffPickOps] = useState(null);
  const [normalConfirm, setNormalConfirm] = useState(null); // {item} 正常確認モーダル
  const [history, setHistory]     = useState([]);       // past completed sessions
  const [valueInput, setValueInput] = useState({});
  const [editMode, setEditMode]   = useState(false);
  const [editForm, setEditForm]   = useState(null); // item being edited
  const [dragEditId, setDragEditId] = useState(null);
  const [dragEditOver, setDragEditOver] = useState(null);
  const ICON_OPTS = ["🔒","💡","🔥","🌡","❄","🧼","🫧","💴","📋","🪑","🚪","🧹","🍳","🪣","🏦","📦","🗝","⚡","🧊","🔍","📝","✅"];
  const GROUP_OPTS_OPEN  = ["キッチン","ホール","安全確認","温度確認","衛生確認","レジ・売上","オープン準備"];
  const GROUP_OPTS_CLOSE = ["キッチン","ホール","温度確認","レジ・売上","安全確認","衛生確認"];
  const [timers, setTimers]           = useState({});  // {id: {start, elapsed, running}}
  const [tick, setTick]               = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),1000); return()=>clearInterval(t); },[]);

  const allItems = mode==="open" ? openItems : closeItems;
  const items    = allItems.filter(i=>!i.hidden);
  const setItems  = mode==="open" ? setOpenItems : setCloseItems;
  const done    = items.filter(i=>checks[i.id]?.done);
  const total   = items.length;
  const pct     = Math.round(done.length/total*100);
  const allDone = done.length===total;
  const viewStore = storeFilter || 1;
  const storeUsers = INITIAL_USERS.filter(u=>u.store===viewStore);
  const currentUser = INITIAL_USERS.find(u=>u.id===currentUserId);
  const groups  = [...new Set(items.map(i=>i.group))];

  // タイマー操作
  const startTimer = (id) => {
    setTimers(p=>({...p,[id]:{start:Date.now() - (p[id]?.elapsed||0)*1000, elapsed:p[id]?.elapsed||0, running:true}}));
  };
  const stopTimer = (id) => {
    setTimers(p=>{
      if(!p[id]?.running) return p;
      const elapsed = Math.round((Date.now()-p[id].start)/1000);
      return {...p,[id]:{...p[id],elapsed,running:false}};
    });
  };
  const fmtTime = (sec) => sec>=60 ? `${Math.floor(sec/60)}分${sec%60}秒` : `${sec}秒`;

  const checkItem = (item) => {
    if (checks[item.id]?.done) {
      setChecks(p=>({...p,[item.id]:{...p[item.id],done:false,by:null,time:null}}));
      return;
    }
    stopTimer(item.id);
    if (item.needsValue && item.normalRange) {
      // 正常範囲あり → 「正常でしたか？」確認モーダルへ
      setNormalConfirm({item});
    } else if (item.needsValue && !item.normalRange) {
      // 正常範囲なし（売上など）→ 数値入力必須
      const val = valueInput[item.id];
      if (!val && val!==0) { notify("数値を入力してください","warn"); return; }
      setStaffPickOps({item, valueVal: val});
    } else {
      setStaffPickOps({item, valueVal: null});
    }
  };
  const execCheckItem = (item, valueVal, staffId, autoNormal) => {
    const now = new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    if (item.needsValue) {
      const numVal = Number(valueVal);
      const isAbnormal = !autoNormal && item.normalRange && (numVal < item.normalRange[0] || numVal > item.normalRange[1]);
      setChecks(p=>({...p,[item.id]:{done:true,by:staffId,time:now,value:autoNormal?null:numVal,abnormal:isAbnormal,autoNormal}}));
      if (isAbnormal) notify("⚠ 「"+item.label+"」が基準範囲外！本部へ報告されます", "warn");
      else if (autoNormal) notify("✓ 「"+item.label+"」正常確認");
    } else {
      setChecks(p=>({...p,[item.id]:{done:true,by:staffId,time:now}}));
    }
    setStaffPickOps(null);
  };

  const addFlag = (item) => {
    setChecks(p=>({...p,[item.id]:{...p[item.id], flag:true, flagNote}}));
    setFlagModal(null); setFlagNote("");
    notify("⚠ 異常を記録しました","warn");
  };

  const doApprove = (userId) => {
    setFinalSign(userId);
    setShowApprove(false);
    const session = {
      id:"ops"+Date.now(), mode, date:todayStr,
      time:new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}),
      store:viewStore, approvedBy:userId, checks:{...checks},
      flags:items.filter(i=>checks[i.id]?.flag).map(i=>({label:i.label,note:checks[i.id]?.flagNote})),
    };
    setHistory(p=>[session,...p]);
    notify(`✓ ${mode==="open"?"開店":"閉店"}チェック完了・記録しました！`);
  };

  const resetChecks = () => { setChecks({}); setFinalSign(null); setValueInput({}); };

  const flagCount = items.filter(i=>checks[i.id]?.flag).length;
  const abnormalCount = items.filter(i=>checks[i.id]?.abnormal).length;

  return (
    <div style={{maxWidth:720,margin:"0 auto"}}>

            {/* ── 正常確認モーダル ── */}
      {normalConfirm && (
        <NormalConfirmModal
          item={normalConfirm.item}
          onClose={()=>setNormalConfirm(null)}
          onNormal={()=>{
            // 正常→中央値を自動セットしてスタッフ選択へ
            const [mn,mx] = normalConfirm.item.normalRange;
            const midVal = String(((mn+mx)/2).toFixed(1));
            setNormalConfirm(null);
            setStaffPickOps({item:normalConfirm.item, valueVal:midVal, autoNormal:true});
          }}
          onAbnormal={val=>{
            setNormalConfirm(null);
            setStaffPickOps({item:normalConfirm.item, valueVal:val, autoNormal:false});
          }}
        />
      )}

            {/* ── スタッフ選択モーダル ── */}
      {staffPickOps && (()=>{
        const item = staffPickOps.item;
        const storeUsers = INITIAL_USERS.filter(u=>u.store===viewStore && u.role!=="本部");
        return (
          <Modal onClose={()=>setStaffPickOps(null)} width={360}>
            <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:4}}>
              {item.icon} {item.label}
            </div>
            <div style={{fontSize:12,color:"#aaa",marginBottom:16}}>チェックを実施したスタッフを選択</div>
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
              {storeUsers.map(u=>(
                <button key={u.id} onClick={()=>execCheckItem(item, staffPickOps.valueVal, u.id, staffPickOps.autoNormal)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#0c0c18",border:"1px solid "+u.color+"33",borderRadius:12,cursor:"pointer"}}
                  onMouseEnter={e=>{e.currentTarget.style.background=u.color+"22";}}
                  onMouseLeave={e=>{e.currentTarget.style.background="#0c0c18";}}>
                  <Av u={u} size={32}/>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#eee"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#7c8794"}}>{u.role}</div>
                  </div>
                </button>
              ))}
              <button onClick={()=>execCheckItem(item, staffPickOps.valueVal, null, staffPickOps.autoNormal)}
                style={{padding:"10px",background:"#0a0a16",border:"1px solid #1e1e2e",borderRadius:10,cursor:"pointer",color:"#6b7280",fontSize:12}}>
                担当者不明のまま完了
              </button>
            </div>
          </Modal>
        );
      })()}

      {/* ── 項目編集モーダル ── */}
      {editForm && (
        <Modal onClose={()=>setEditForm(null)} width={460}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:16}}>
            {editForm.id?"✏ 項目を編集":"＋ 項目を追加"}
          </div>
          {/* アイコン選択 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>アイコン</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {ICON_OPTS.map(ic=>(
                <button key={ic} onClick={()=>setEditForm(p=>({...p,icon:ic}))}
                  style={{width:34,height:34,borderRadius:8,border:`2px solid ${editForm.icon===ic?"#E85D04":"#1e1e2e"}`,background:editForm.icon===ic?"#1a0a00":"#0c0c18",fontSize:18,cursor:"pointer"}}>
                  {ic}
                </button>
              ))}
            </div>
          </div>
          <Input label="項目名 *" value={editForm.label} onChange={e=>setEditForm(p=>({...p,label:e.target.value}))} placeholder="例：冷蔵庫温度チェック"/>
          <Input label="メモ・補足" value={editForm.note} onChange={e=>setEditForm(p=>({...p,note:e.target.value}))} placeholder="例：目標0〜5℃"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Select label="グループ" value={editForm.group}
              onChange={e=>setEditForm(p=>({...p,group:e.target.value}))}
              options={(mode==="open"?GROUP_OPTS_OPEN:GROUP_OPTS_CLOSE).map(g=>({value:g,label:g}))}/>
            <Input label="目安時間（分）" type="number" value={String(editForm.estMin||"")} onChange={e=>setEditForm(p=>({...p,estMin:Number(e.target.value)||null}))} placeholder="例: 5"/>
          </div>
          {/* 数値入力設定 */}
          <div style={{background:"#0a0a16",border:"1px solid #1e1e2e",borderRadius:10,padding:12,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <button onClick={()=>setEditForm(p=>({...p,needsValue:!p.needsValue}))}
                style={{width:36,height:20,borderRadius:10,border:"none",cursor:"pointer",background:editForm.needsValue?"#16a34a":"#2a2a3a",position:"relative",transition:"background .2s"}}>
                <div style={{width:16,height:16,borderRadius:8,background:"#fff",position:"absolute",top:2,left:editForm.needsValue?18:2,transition:"left .2s"}}/>
              </button>
              <span style={{fontSize:12,color:"#aaa"}}>数値入力あり（温度・金額など）</span>
            </div>
            {editForm.needsValue && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                <Input label="単位" value={editForm.unit||""} onChange={e=>setEditForm(p=>({...p,unit:e.target.value}))} placeholder="℃ / 円"/>
                <Input label="正常範囲（最小）" type="number" value={String(editForm.normalRange?.[0]??"")} onChange={e=>setEditForm(p=>({...p,normalRange:[Number(e.target.value),p.normalRange?.[1]??9999]}))} placeholder="例: 0"/>
                <Input label="正常範囲（最大）" type="number" value={String(editForm.normalRange?.[1]??"")} onChange={e=>setEditForm(p=>({...p,normalRange:[p.normalRange?.[0]??-9999,Number(e.target.value)]}))} placeholder="例: 5"/>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setEditForm(null)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={()=>{
              if(!editForm.label.trim()){notify("項目名を入力してください","warn");return;}
              if(editForm._isNew){
                setItems(p=>[...p,{...editForm,id:(mode==="open"?"o":"c")+Date.now(),_isNew:undefined}]);
              } else {
                setItems(p=>p.map(i=>i.id===editForm.id?{...editForm,_isNew:undefined}:i));
              }
              notify("✓ 項目を保存しました");
              setEditForm(null);
            }} color="#E85D04" style={{flex:1}}>保存する</Btn>
          </div>
        </Modal>
      )}

      {/* 異常フラグ入力モーダル */}
      {flagModal && (
        <Modal onClose={()=>setFlagModal(null)} width={400}>
          <div style={{fontSize:17,fontWeight:800,color:"#fbbf24",marginBottom:8}}>⚠ 異常報告</div>
          <div style={{fontSize:13,color:"#aaa",marginBottom:14}}>「{flagModal.label}」の異常内容を記録します</div>
          <textarea value={flagNote} onChange={e=>setFlagNote(e.target.value)}
            placeholder="例：冷蔵庫のドアパッキンが破損、温度が8℃あった"
            style={{width:"100%",height:80,padding:10,background:"#0c0c18",border:"1px solid #78350f",color:"#eee",borderRadius:8,fontSize:13,resize:"none"}}/>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            <Btn onClick={()=>setFlagModal(null)} color="#1a1a2e" style={{color:"#8b95a1",flex:1}}>キャンセル</Btn>
            <Btn onClick={()=>addFlag(flagModal)} color="#d97706" style={{flex:1}}>記録する</Btn>
          </div>
        </Modal>
      )}

      {/* 最終承認モーダル */}
      {showApprove && (
        <Modal onClose={()=>setShowApprove(false)} width={380}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}}>
            {mode==="open"?"🌅 開店承認":"🌙 閉店承認"}
          </div>
          <div style={{fontSize:12,color:"#aaa",marginBottom:6}}>全{total}項目チェック完了</div>
          {flagCount>0 && <div style={{background:"#120e08",border:"1px solid #78350f",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#fbbf24"}}>⚠ 異常報告 {flagCount}件あり・本部に通知されます</div>}
          <div style={{fontSize:13,color:"#aaa",marginBottom:14}}>承認者を選択してください</div>
          {storeUsers.filter(u=>u.role==="店長"||u.role==="本部").map(u=>(
            <button key={u.id} onClick={()=>doApprove(u.id)}
              style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#0c0c18",border:`1px solid ${u.color}33`,borderRadius:12,cursor:"pointer",marginBottom:8,transition:"all .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background=u.color+"22";}}
              onMouseLeave={e=>{e.currentTarget.style.background="#0c0c18";}}>
              <Av u={u} size={36}/>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:14,fontWeight:700,color:"#eee"}}>{u.name}</div>
                <div style={{fontSize:11,color:"#7c8794"}}>{u.role}</div>
              </div>
              <span style={{marginLeft:"auto",fontSize:18}}>→</span>
            </button>
          ))}
        </Modal>
      )}

      {/* ヘッダー */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
          <div style={{flex:1,display:"flex",gap:0,background:"#0c0c18",borderRadius:14,padding:4,border:"1px solid #1e1e2e"}}>
            {[["open","🌅 開店チェック","#F48C06"],["close","🌙 閉店チェック","#6D28D9"]].map(([id,label,color])=>(
              <button key={id} onClick={()=>{setMode(id);resetChecks();setEditMode(false);}}
                style={{flex:1,padding:"12px 8px",borderRadius:10,border:"none",cursor:"pointer",fontSize:13,fontWeight:800,
                  background:mode===id?color:"transparent",color:mode===id?"#fff":"#7c8794",transition:"all .2s"}}>
                {label}
              </button>
            ))}
          </div>
          <button onClick={()=>setEditMode(p=>!p)}
            style={{padding:"10px 14px",borderRadius:12,border:`1px solid ${editMode?"#E85D04":"#2a2a3a"}`,background:editMode?"#1a0a00":"#0c0c18",color:editMode?"#E85D04":"#7c8794",cursor:"pointer",fontSize:12,fontWeight:700,flexShrink:0}}>
            {editMode?"✓ 完了":"⚙ 編集"}
          </button>
        </div>

        {/* 進捗バー */}
        <div style={{background:"#0c0c18",border:`1px solid ${mode==="open"?"#78350f":"#4c1d95"}`,borderRadius:14,padding:"16px 20px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:13,color:"#aaa"}}>進捗</span>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {flagCount>0&&<span style={{fontSize:11,color:"#fbbf24"}}>⚠ 異常 {flagCount}件</span>}
              {abnormalCount>0&&<span style={{fontSize:11,color:"#f87171"}}>🌡 数値異常 {abnormalCount}件</span>}
              <span style={{fontSize:28,fontWeight:800,color:mode==="open"?"#F48C06":"#a78bfa",fontFamily:"monospace"}}>{pct}<span style={{fontSize:13}}>%</span></span>
            </div>
          </div>
          <div style={{width:"100%",height:12,background:"#1a1a2a",borderRadius:6,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${mode==="open"?"#E85D04,#F48C06":"#6D28D9,#a78bfa"})`,borderRadius:6,transition:"width .5s ease"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
            <span style={{fontSize:11,color:"#6b7280"}}>{done.length} / {total} 完了</span>
            {finalSign && <span style={{fontSize:11,color:"#4ade80"}}>✓ {INITIAL_USERS.find(u=>u.id===finalSign)?.name} 承認済</span>}
          </div>
        </div>

        {/* 完了・承認ボタン */}
        {allDone && !finalSign && (
          <button onClick={()=>setShowApprove(true)}
            style={{width:"100%",padding:"16px",borderRadius:14,border:"none",cursor:"pointer",fontSize:15,fontWeight:800,
              background:`linear-gradient(135deg,${mode==="open"?"#E85D04,#F48C06":"#6D28D9,#7c3aed"})`,
              color:"#fff",boxShadow:`0 4px 20px ${mode==="open"?"#E85D0444":"#6D28D944"}`,
              animation:"pulse 2s infinite"}}>
            {mode==="open"?"🌅 開店チェック完了！店長承認へ →":"🌙 閉店チェック完了！店長承認へ →"}
          </button>
        )}
        {finalSign && (
          <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"center",padding:"12px",background:"#052e16",border:"1px solid #14532d",borderRadius:12}}>
            <span style={{fontSize:16}}>✅</span>
            <span style={{fontSize:13,color:"#4ade80",fontWeight:700}}>{mode==="open"?"開店":"閉店"}完了・承認済み</span>
            <button onClick={resetChecks} style={{marginLeft:"auto",padding:"5px 12px",background:"transparent",border:"1px solid #2a2a3a",color:"#7c8794",borderRadius:8,cursor:"pointer",fontSize:11}}>リセット</button>
          </div>
        )}
      </div>

      {/* ── 編集モード ── */}
      {editMode && (
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:12,color:"#aaa"}}>⠿ ドラッグで順番変更 ／ 編集・削除可</div>
            <Btn onClick={()=>setEditForm({_isNew:true,icon:"📋",label:"",note:"",group:(mode==="open"?GROUP_OPTS_OPEN:GROUP_OPTS_CLOSE)[0],estMin:5,needsValue:false,unit:"",normalRange:null})} color="#E85D04">＋ 項目追加</Btn>
          </div>
          {allItems.map((item,idx)=>(
            <div key={item.id}
              draggable
              onDragStart={e=>{e.dataTransfer.effectAllowed="move";setDragEditId(item.id);}}
              onDragOver={e=>{e.preventDefault();setDragEditOver(item.id);}}
              onDrop={e=>{
                e.preventDefault();
                if(dragEditId===item.id){setDragEditId(null);setDragEditOver(null);return;}
                setItems(prev=>{
                  const arr=[...prev];
                  const fi=arr.findIndex(r=>r.id===dragEditId);
                  const ti=arr.findIndex(r=>r.id===item.id);
                  const [m]=arr.splice(fi,1); arr.splice(ti,0,m);
                  return arr;
                });
                setDragEditId(null);setDragEditOver(null);
              }}
              onDragEnd={()=>{setDragEditId(null);setDragEditOver(null);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",marginBottom:6,background:dragEditOver===item.id?"#1a1a3a":"#0c0c18",border:`1px solid ${dragEditOver===item.id?"#E85D04":"#1e1e2e"}`,borderRadius:12,cursor:"grab",transition:"all .15s",opacity:item.hidden?.45:1}}>
              <span style={{color:"#6b7280",fontSize:16,flexShrink:0}}>⠿</span>
              <span style={{fontSize:16,flexShrink:0}}>{item.icon}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,color:"#eee",fontWeight:600}}>{item.label}</div>
                <div style={{fontSize:10,color:"#6b7280"}}>{item.group} {item.estMin?`· ${item.estMin}分`:""} {item.needsValue?`· ${item.unit}入力`:""}</div>
              </div>
              {/* 表示/非表示スイッチ */}
              <button onClick={()=>setItems(p=>p.map(i=>i.id===item.id?{...i,hidden:!i.hidden}:i))}
                title={item.hidden?"表示する":"非表示にする"}
                style={{width:44,height:24,borderRadius:12,border:"none",cursor:"pointer",background:item.hidden?"#2a2a3a":"#16a34a",position:"relative",transition:"background .2s",flexShrink:0}}>
                <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:3,left:item.hidden?3:23,transition:"left .2s"}}/>
              </button>
              <button onClick={()=>setEditForm({...item})}
                style={{padding:"5px 10px",background:"#1a1a2a",border:"1px solid #2a2a3a",color:"#aaa",borderRadius:7,cursor:"pointer",fontSize:11,flexShrink:0}}>編集</button>
              <button onClick={()=>{setItems(p=>p.filter(i=>i.id!==item.id));notify("項目を削除しました","warn");}}
                style={{padding:"5px 10px",background:"#1a0808",border:"1px solid #7f1d1d",color:"#f87171",borderRadius:7,cursor:"pointer",fontSize:11,flexShrink:0}}>削除</button>
            </div>
          ))}
        </div>
      )}

      {/* チェックリスト グループ別 */}
      {!editMode && groups.map(group=>(
        <div key={group} style={{marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <span style={{fontSize:11,fontWeight:700,color:"#7c8794",letterSpacing:".1em"}}>{group}</span>
            <div style={{flex:1,height:1,background:"#1a1a2a"}}/>
            <span style={{fontSize:10,color:items.filter(i=>i.group===group&&checks[i.id]?.done).length===items.filter(i=>i.group===group).length?"#4ade80":"#6b7280"}}>
              {items.filter(i=>i.group===group&&checks[i.id]?.done).length}/{items.filter(i=>i.group===group).length}
            </span>
          </div>

          {items.filter(i=>i.group===group).map((item,idx)=>{
            const c = checks[item.id];
            const isDone = !!c?.done;
            const byUser = INITIAL_USERS.find(u=>u.id===c?.by);
            const isAbnormal = c?.abnormal;
            const hasFlag = c?.flag;

            return (
              <div key={item.id} style={{
                background:hasFlag?"#130a02":isAbnormal?"#130808":isDone?"#05100a":"#0c0c18",
                border:`1px solid ${hasFlag?"#d97706":isAbnormal?"#7f1d1d":isDone?"#14532d":"#1e1e2e"}`,
                borderLeft:`4px solid ${hasFlag?"#d97706":isAbnormal?"#ef4444":isDone?(mode==="open"?"#F48C06":"#a78bfa"):"#1e1e2e"}`,
                borderRadius:12,padding:"14px 16px",marginBottom:8,
                transition:"all .2s",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  {/* ステップ番号 */}
                  <div style={{width:28,height:28,borderRadius:8,background:isDone?(mode==="open"?"#E85D04":"#7c3aed"):"#1a1a2a",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {isDone
                      ? <span style={{color:"#fff",fontSize:14,fontWeight:800}}>✓</span>
                      : <span style={{color:"#6b7280",fontSize:11,fontWeight:700}}>{idx+1}</span>}
                  </div>

                  {/* アイコン・ラベル */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:16}}>{item.icon}</span>
                      <span style={{fontSize:13,fontWeight:700,color:isDone?"#aaa":"#eee",textDecoration:isDone?"line-through":"none"}}>{item.label}</span>
                      {isAbnormal&&<Chip label="数値異常" color="#f87171" bg="#1a0808"/>}
                      {hasFlag&&<Chip label={`⚠ ${c.flagNote?.slice(0,12)}…`} color="#fbbf24" bg="#120e08"/>}
                    </div>
                    <div style={{fontSize:11,color:"#6b7280"}}>{item.note}</div>
                    {isDone&&byUser&&(
                      <div style={{display:"flex",alignItems:"center",gap:5,marginTop:4}}>
                        <Av u={byUser} size={14}/>
                        <span style={{fontSize:10,color:"#7c8794"}}>{(byUser?.name||"").split(" ")[0]} · {c.time}</span>
                        {c.autoNormal ? <span style={{fontSize:10,color:"#4ade80",fontWeight:700,marginLeft:4}}>✓ 正常</span> : c.value!=null&&<span style={{fontSize:10,color:isAbnormal?"#f87171":"#38bdf8",fontWeight:700,marginLeft:4}}>{c.value}{item.unit}</span>}
                      </div>
                    )}
                  </div>

                  {/* 数値入力 */}
                  {item.needsValue && !item.normalRange && !isDone && (
                    <input type="number" placeholder={item.unit}
                      value={valueInput[item.id]||""}
                      onChange={e=>setValueInput(p=>({...p,[item.id]:e.target.value}))}
                      style={{width:80,padding:"7px",background:"#0a0a16",border:"1px solid #2a2a3a",color:"#eee",borderRadius:8,fontSize:13,textAlign:"center"}}/>
                  )}

                  {/* 異常フラグボタン */}
                  {!isDone && (
                    <button onClick={()=>{setFlagModal(item);setFlagNote("");}}
                      style={{padding:"5px 8px",background:"transparent",border:"1px solid #78350f44",color:"#d9770688",borderRadius:7,cursor:"pointer",fontSize:11,flexShrink:0}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor="#d97706";e.currentTarget.style.color="#d97706";}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor="#78350f44";e.currentTarget.style.color="#d9770688";}}>
                      ⚠
                    </button>
                  )}

                  {/* タイマー */}
                  {!isDone && !finalSign && (()=>{
                    const tm = timers[item.id];
                    const elapsed = tm?.running ? Math.round((Date.now()-tm.start)/1000) : (tm?.elapsed||0);
                    const isRunning = !!tm?.running;
                    return (
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,flexShrink:0}}>
                        {elapsed>0 && <span style={{fontSize:10,color:elapsed>(item.estMin||99)*60?"#f87171":"#38bdf8",fontFamily:"monospace"}}>{fmtTime(elapsed)}</span>}
                        {item.estMin && <span style={{fontSize:9,color:"#6b7280"}}>目安{item.estMin}分</span>}
                        <button onClick={isRunning?()=>stopTimer(item.id):()=>startTimer(item.id)}
                          style={{padding:"4px 8px",background:isRunning?"#1a3a1a":"#1a1a2a",border:`1px solid ${isRunning?"#16a34a":"#2a2a3a"}`,color:isRunning?"#4ade80":"#7c8794",borderRadius:6,cursor:"pointer",fontSize:10}}>
                          {isRunning?"⏸ 停止":"⏱ 開始"}
                        </button>
                      </div>
                    );
                  })()}

                  {/* チェックボタン */}
                  <button onClick={()=>checkItem(item)}
                    disabled={!!finalSign}
                    style={{padding:"8px 16px",borderRadius:10,border:"none",cursor:finalSign?"default":"pointer",fontSize:12,fontWeight:700,flexShrink:0,
                      background:isDone?"#1a2a1a":"linear-gradient(135deg,"+(mode==="open"?"#E85D04,#F48C06":"#6D28D9,#7c3aed")+")",
                      color:isDone?"#4ade80":"#fff",opacity:finalSign?.6:1,transition:"all .15s"}}>
                    {isDone?"✓ 完了":"チェック"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      ))}

      {/* 履歴 */}
      {history.length>0 && (
        <div style={{marginTop:24,borderTop:"1px solid #14141f",paddingTop:16}}>
          <div style={{fontSize:12,color:"#6b7280",marginBottom:12,fontWeight:700,letterSpacing:".1em"}}>過去の記録</div>
          {history.slice(0,5).map(h=>{
            const approver = INITIAL_USERS.find(u=>u.id===h.approvedBy);
            return (
              <div key={h.id} style={{background:"#0a0a12",border:"1px solid #1a1a2a",borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <span style={{fontSize:14}}>{h.mode==="open"?"🌅":"🌙"}</span>
                <span style={{fontSize:12,color:"#aaa"}}>{h.date} {h.time}</span>
                <span style={{fontSize:11,color:"#7c8794"}}>{INITIAL_STORES.find(s=>s.id===h.store)?.name}</span>
                {h.flags.length>0&&<Chip label={`⚠ 異常 ${h.flags.length}件`} color="#fbbf24" bg="#120e08"/>}
                {approver&&<div style={{display:"flex",alignItems:"center",gap:5,marginLeft:"auto"}}><Av u={approver} size={16}/><span style={{fontSize:11,color:"#4ade80"}}>{(approver?.name||"").split(" ")[0]} 承認</span></div>}
              </div>
            );
          })}
        </div>
      )}

      <style>{`@keyframes pulse{0%,100%{box-shadow:0 4px 20px #E85D0444}50%{box-shadow:0 4px 32px #E85D0488}}`}</style>
    </div>
  );
}

function PwChangeForm({verifyHonbuPassword, updateAdminPassword, onClose, notify}) {
  const [step, setStep] = useState("current");
  const [cur,  setCur]  = useState("");
  const [nw,   setNw]   = useState("");
  const [cf,   setCf]   = useState("");
  const [err,  setErr]  = useState("");
  const [saving, setSaving] = useState(false);
  return (
    <div>
      {step==="current" && (
        <>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>現在のパスワード</div>
          <input type="password" value={cur} onChange={e=>{setCur(e.target.value);setErr("");}}
            placeholder="現在のパスワード" autoFocus
            style={{width:"100%",padding:"12px",background:"#0c0c18",border:`1px solid ${err?"#ef4444":"#2a2a3a"}`,color:"#fff",borderRadius:10,fontSize:14,marginBottom:6,outline:"none"}}/>
          {err && <div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>{err}</div>}
          <Btn onClick={async ()=>{
              const ok = await verifyHonbuPassword(cur);
              if(ok) setStep("new");
              else setErr("パスワードが違います");
            }}
            color="#6D28D9" style={{width:"100%"}}>次へ →</Btn>
        </>
      )}
      {step==="new" && (
        <>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>新しいパスワード（4文字以上）</div>
          <input type="password" value={nw} onChange={e=>{setNw(e.target.value);setErr("");}}
            placeholder="新しいパスワード" autoFocus
            style={{width:"100%",padding:"12px",background:"#0c0c18",border:`1px solid ${err?"#ef4444":"#2a2a3a"}`,color:"#fff",borderRadius:10,fontSize:14,marginBottom:6,outline:"none"}}/>
          {err && <div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>{err}</div>}
          <Btn onClick={()=>{ if(nw.length<4) setErr("4文字以上で設定してください"); else setStep("confirm"); }}
            color="#6D28D9" style={{width:"100%"}}>次へ →</Btn>
        </>
      )}
      {step==="confirm" && (
        <>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:8}}>新しいパスワード（確認）</div>
          <input type="password" value={cf} onChange={e=>{setCf(e.target.value);setErr("");}}
            placeholder="もう一度入力" autoFocus
            style={{width:"100%",padding:"12px",background:"#0c0c18",border:`1px solid ${err?"#ef4444":"#2a2a3a"}`,color:"#fff",borderRadius:10,fontSize:14,marginBottom:6,outline:"none"}}/>
          {err && <div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>{err}</div>}
          <Btn onClick={async ()=>{
            if(cf!==nw){setErr("パスワードが一致しません");return;}
            try {
              setSaving(true);
              await updateAdminPassword(cur, nw);
              onClose();
              notify("✓ パスワードを変更しました");
            } catch (e) {
              setErr(e?.message || "パスワード変更に失敗しました");
            } finally {
              setSaving(false);
            }
          }} disabled={saving} color="#16a34a" style={{width:"100%"}}>{saving ? "変更中..." : "変更する"}</Btn>
        </>
      )}
    </div>
  );
}

// ██  LOGIN SCREEN — 店舗コード + PIN認証
// ═══════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin, stores, users }) {
  const [step, setStep] = useState("store"); // "store" | "honbu" | "user" | "pin"
  const [storeCode, setStoreCode] = useState("");
  const [selectedStore, setSelectedStore] = useState(null);
  const [selectedUser, setSelectedUser] = useState(null);
  const [pin, setPin] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleStoreCode = async () => {
    setError("");
    if (storeCode.toUpperCase() === "HONBU") {
      setStep("honbu"); // 本部はメール+パスワード
      return;
    }
    try {
      const result = await api.auth.loginByStoreCode(storeCode);
      if (result) {
        setSelectedStore(result);
        setStep("user");
      }
    } catch (e) {
      setError("店舗コードが見つかりません");
    }
  };

  const handleHonbu = async () => {
    setError("");
    try {
      const result = await api.auth.loginHonbu(email, password);
      if (result?.token) onLogin(result.userId, null, result.token);
    } catch (e) {
      setError("メールまたはパスワードが違います");
    }
  };

  const handlePin = async () => {
    setError("");
    try {
      const result = await api.auth.loginByPin(selectedStore.tenantId, selectedStore.id, selectedUser.id, pin);
      if (result?.token) onLogin(result.userId, selectedStore.id, result.token);
    } catch (e) {
      setError("PINが正しくありません");
    }
  };

            </button>

        )}

        {/* Step 3: PIN Input */}
        {step === "pin" && (
          <div>
            <div style={{textAlign:"center",marginBottom:20}}>
              <Av u={selectedUser} size={56}/>
              <div style={{fontSize:16,fontWeight:700,color:"#fff",marginTop:10}}>{selectedUser.name}</div>

            </div>
            <div style={{fontSize:13,color:"#8b95a1",marginBottom:10,textAlign:"center"}}>PINを入力</div>
            <input
              type="password"
              value={pin}
              onChange={e => { setPin(e.target.value.replace(/\D/g, "").slice(0, 4)); setError(""); }}
              onKeyDown={e => e.key === "Enter" && pin.length === 4 && handlePin()}
              maxLength={4}
              autoFocus
              placeholder="••••"
              style={{width:"100%",padding:"16px",background:"#0c0c18",border:"1px solid " + (error ? "#ef4444" : "#2a2a3a"),color:"#fff",borderRadius:12,fontSize:28,textAlign:"center",letterSpacing:".5em",outline:"none"}}
            />
            {error && <div style={{color:"#ef4444",fontSize:12,textAlign:"center",marginTop:8}}>{error}</div>}

    </div>
  );
}

function useRemoteStateSync(enabled, resource, data, notify) {
  const timerRef = useRef(null);

  useEffect(() => {
    if (!enabled) return undefined;

    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => {
      api.app.saveState(resource, data).catch((error) => {
        console.error(`Failed to persist ${resource}:`, error);
        notify(`「${resource}」の保存に失敗しました`, "warn");
      });
    }, 400);

    return () => {
      if (timerRef.current) clearTimeout(timerRef.current);
    };
  }, [enabled, resource, data]);
}

function AppInner() {
  // ── ログイン状態 ──
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [currentUserId, setCurrentUserId] = useState(null);
  const [isBootstrapping, setIsBootstrapping] = useState(false);
  const [bootstrapError, setBootstrapError] = useState("");

  // ── ログインハンドラ ──
  const handleLogin = (userId, storeId, token) => {
    if (token) api.setAuthToken(token);
    setCurrentUserId(userId);
    if (storeId) setSelectedStoreId(storeId);
    setIsLoggedIn(true);
    try { localStorage.setItem("mise_auth", JSON.stringify({token, userId, storeId: storeId||null})); } catch {}
    loadAppData(); // ログイン後にトークン付きで bootstrap
  };

  const handleLogout = () => {
    api.setAuthToken(null);
    try { localStorage.removeItem("mise_auth"); } catch {}
    setCurrentUserId(null);
    setSelectedStoreId(null);
    setIsLoggedIn(false);
  };
  const [pwModal, setPwModal] = useState(null); // "login" | "change"
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [pendingUserId, setPendingUserId] = useState(null);
  const [view, setView] = useState("top");
  const isMobile = useIsMobile();
  const [sideOpen, setSideOpen] = useState(typeof window !== "undefined" ? window.innerWidth >= 900 : true);
  const [routines, setRoutines] = useState([]);
  const [allPrepTasks, setAllPrepTasks] = useState([]);
  const [cleanTasks, setCleanTasks] = useState([]);
  const [hqTasks, setHqTasks] = useState([]);
  const [users, setUsers] = useState(INITIAL_USERS);
  const [stores, setStores] = useState(INITIAL_STORES);
  const [recipes, setRecipes] = useState(INITIAL_RECIPES);
  const [inventory, setInventory] = useState(INITIAL_INVENTORY);
  const [suppliers, setSuppliers] = useState(INITIAL_SUPPLIERS);
  const [orders, setOrders] = useState(INITIAL_ORDERS);
  const [priceHistory, setPriceHistory] = useState(INITIAL_PRICE_HISTORY);
  const [notification, setNotification] = useState(null);
  const [taskCats, setTaskCats] = useState(DEFAULT_TASK_CATS);
  const saveTaskCats = cats => { setTaskCats(cats); };
  const [pointConfig, setPointConfig] = useState(DEFAULT_POINT_CONFIG);
  const [openItems,  setOpenItems]  = useState(OPS_OPEN);
  const [closeItems, setCloseItems] = useState(OPS_CLOSE);
  const [paletteDrag, setPaletteDrag] = useState(null);
  const [paletteOpen, setPaletteOpen] = useState({routine:true, prep:false, clean:false, custom:false});
  const [topDragTask, setTopDragTask] = useState(null);
  const [topDragOver, setTopDragOver] = useState(null);
  const [topActiveDay, setTopActiveDay] = useState(0);   // パレット➕用にリフトアップ
  const [topActiveStore, setTopActiveStore] = useState(1); // パレット➕用にリフトアップ

  const currentUser = INITIAL_USERS.find(u=>u.id===currentUserId) || null;
  const isHonbu = currentUser?.role === "本部";
  // 本部は店舗を手動選択できる（null=全店舗）、スタッフは自分の店舗固定
  const [selectedStoreId, setSelectedStoreId] = useState(null);
  const [storeChangePending, setStoreChangePending] = useState(null); // 切り替え待ち店舗ID
  const [storePwInput, setStorePwInput] = useState("");
  const [storePwError, setStorePwError] = useState(false);
  const storeFilter = isHonbu ? selectedStoreId : (currentUser?.store ?? null);

  const notify = (msg, type="success") => {
    setNotification({msg,type});
    setTimeout(()=>setNotification(null), 3500);
  };

  const verifyHonbuPassword = async (password) => {
    // 本部は既にメール+パスワードで認証済みのため、店舗切替時の再認証はMVPでは省略
    return true;
  };

  const applyStoreChange = async () => {
    const ok = await verifyHonbuPassword(storePwInput);
    if (!ok) {
      setStorePwError(true);
      return;
    }
    setSelectedStoreId(storeChangePending);
    setStoreChangePending(null);
    setStorePwInput("");
    notify("✓ 店舗を切り替えました");
  };

  const confirmHonbuSwitch = async () => {
    const ok = await verifyHonbuPassword(pwInput);
    if (!ok) {
      setPwError(true);
      return;
    }
    setCurrentUserId(pendingUserId);
    setPwModal(null);
    setPwInput("");
  };

  const hydrateAppData = (data) => {
    // 既存コンポーネントが参照するモジュール変数を実データに差し替え
    INITIAL_USERS = data?.users || [];
    INITIAL_STORES = data?.stores || [];
    INITIAL_SUPPLIERS = data?.suppliers || [];
    INITIAL_INVENTORY = data?.inventory || [];
    INITIAL_ORDERS = data?.orders || [];
    INITIAL_RECIPES = data?.recipes || [];
    INITIAL_PRICE_HISTORY = data?.priceHistory || [];

    setUsers(data?.users || []);
    setSuppliers(data?.suppliers || []);
    setInventory(data?.inventory || []);
    setPriceHistory(data?.priceHistory || []);
    setOrders(data?.orders || []);
    setRecipes(data?.recipes || []);
    setRoutines(data?.routines || []);
    setAllPrepTasks(data?.prepTasks || []);
    setCleanTasks(data?.cleanTasks || []);
    setOpenItems(data?.openItems || []);
    setCloseItems(data?.closeItems || []);
    setTaskCats(data?.taskCats || []);
    setHqTasks(data?.hqTasks || []);
    setPointConfig(data?.pointConfig || DEFAULT_POINT_CONFIG);
    setLastCarryDate(data?.lastCarryDate || null);
  };

  const loadAppData = async () => {
    setIsBootstrapping(true);
    setBootstrapError("");
    try {
      const data = await api.app.bootstrap();
      syncEnabledRef.current = false;
      hydrateAppData(data);
      syncEnabledRef.current = true;
    } catch (e) {
      console.error("Failed to bootstrap app data:", e);
      if (String(e?.message||e).includes("401")) {
        // トークン期限切れ → ログイン画面へ
        api.setAuthToken(null);
        try { localStorage.removeItem("mise_auth"); } catch {}
        setCurrentUserId(null); setSelectedStoreId(null); setIsLoggedIn(false);
      } else {
        setBootstrapError("バックエンドから初期データを取得できませんでした");
      }
    } finally {
      setIsBootstrapping(false);
    }
  };

  // ─── データリセット ───
  const resetAllData = async () => {
    if (!window.confirm("全データを初期状態に戻しますか？\n\n※ 登録した業者・発注履歴・スタッフ情報がすべて消えます")) return;
    try {
      const result = await api.app.reset();
      syncEnabledRef.current = false;
      hydrateAppData(result?.data || {});
      setCurrentUserId(null);
      setSelectedStoreId(null);
      setIsLoggedIn(false);
      setPwModal(null);
      setBootstrapError("");
      syncEnabledRef.current = true;
      notify("✓ 初期データに戻しました");
    } catch (e) {
      console.error("Failed to reset app data:", e);
      notify("データの初期化に失敗しました", "warn");
    }
  };

  // 起動時: 保存済みトークンがあればログイン状態を復元（更新してもログイン維持）
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("mise_auth") || "null");
      if (saved && saved.token) {
        api.setAuthToken(saved.token);
        setCurrentUserId(saved.userId);
        if (saved.storeId) setSelectedStoreId(saved.storeId);
        setIsLoggedIn(true);
        loadAppData();
      }
    } catch {}
  }, []);

  const syncEnabled = !isBootstrapping && syncEnabledRef.current;
  useRemoteStateSync(syncEnabled, "stores", stores, notify);
  useRemoteStateSync(syncEnabled, "users", users, notify);
  useRemoteStateSync(syncEnabled, "suppliers", suppliers, notify);
  useRemoteStateSync(syncEnabled, "inventory", inventory, notify);
  useRemoteStateSync(syncEnabled, "priceHistory", priceHistory, notify);
  useRemoteStateSync(syncEnabled, "orders", orders, notify);
  useRemoteStateSync(syncEnabled, "recipes", recipes, notify);
  useRemoteStateSync(syncEnabled, "routines", routines, notify);
  useRemoteStateSync(syncEnabled, "prepTasks", allPrepTasks, notify);
  useRemoteStateSync(syncEnabled, "cleanTasks", cleanTasks, notify);
  useRemoteStateSync(syncEnabled, "taskCats", taskCats, notify);
  useRemoteStateSync(syncEnabled, "openItems", openItems, notify);
  useRemoteStateSync(syncEnabled, "closeItems", closeItems, notify);
  useRemoteStateSync(syncEnabled, "hqTasks", hqTasks, notify);
  useRemoteStateSync(syncEnabled, "pointConfig", pointConfig, notify);
  useRemoteStateSync(syncEnabled && lastCarryDate !== undefined, "lastCarryDate", lastCarryDate, notify);

  INITIAL_USERS = users;
  INITIAL_STORES = stores; // 全コンポーネントのUSERS参照を最新stateに同期
  INITIAL_SUPPLIERS = suppliers;
  INITIAL_INVENTORY = inventory;
  INITIAL_ORDERS = orders;
  INITIAL_RECIPES = recipes;
  INITIAL_PRICE_HISTORY = priceHistory;

  // ── 未完了タスクの自動繰り越し ──────────────────────────────────────
  useEffect(() => {
    if (isBootstrapping) return;
    const lastDate = lastCarryDate;
    if (lastDate === todayStr) return; // 今日すでに実行済み

    const yesterday = dateStr(1); // 昨日

    // 仕込み：昨日の未完了を今日に繰り越し
    setAllPrepTasks(prev => {
      const yesterdayIncomplete = prev.filter(t => t.date === yesterday && !t.completedAt);
      if (yesterdayIncomplete.length === 0) return prev;
      const alreadyCarried = new Set(prev.filter(t=>t.date===todayStr&&t.carriedFrom).map(t=>t.carriedFrom));
      const newTasks = yesterdayIncomplete
        .filter(t => !alreadyCarried.has(t.id))
        .map(t => ({
          ...t,
          id: "carry_" + t.id + "_" + todayStr,
          date: todayStr,
          completedAt: null,
          completedBy: null,
          amountVerified: false,
          amountLog: [],
          carriedFrom: t.id,
          carriedDate: yesterday,
        }));
      return newTasks.length > 0 ? [...prev, ...newTasks] : prev;
    });

    // クリーン：未完了に carriedOver フラグを付ける（日付なしなので目印だけ）
    setCleanTasks(prev => prev.map(t =>
      !t.completedAt ? {...t, carriedOver: true} : t
    ));

    setLastCarryDate(todayStr);
  }, [isBootstrapping, lastCarryDate]);


  const lowStockCount = inventory.filter(i=>i.stock<=i.minStock).length;
  const warnCount = allPrepTasks.filter(t=>t.date===todayStr&&t.amountLog?.some(l=>!l.ok)).length;
  const pendingOrderCount = orders.filter(o=>!o.inspected&&o.status==="sent"&&(storeFilter?o.storeId===storeFilter:true)).length;

  const tabs = [
    {id:"top",        label:"TOP",               icon:"🏠"},
    {id:"dashboard",  label:"ダッシュボード",     icon:"⬡"},
    {id:"prep",       label:"仕込み管理",         icon:"🔪"},
    {id:"clean",      label:"クリーン管理",       icon:"✦"},
    {id:"tasks",      label:"タスク管理",         icon:"📅"},
    {id:"inventory",  label:"在庫管理",           icon:"📦"},
    {id:"order",      label:"発注管理",           icon:"📮"},
    {id:"ops",        label:"開閉店チェック",       icon:"🏪"},
    {id:"commission", label:"評価・コミッション",  icon:"◈"},
    {id:"ai_input",   label:"AI自動入力",          icon:"🤖"},
    {id:"billing",    label:"プラン・請求",        icon:"💳"},
    {id:"staff",      label:"スタッフ管理",          icon:"👥"},
    {id:"ai_support", label:"AIサポート",             icon:"💬"},
  ];

  const getBadge = id => {
    if (id==="inventory" && lowStockCount>0) return lowStockCount;
    if (id==="order" && (pendingOrderCount>0||lowStockCount>0)) return pendingOrderCount+lowStockCount;
    if (id==="prep" && warnCount>0) return warnCount;
    return null;
  };

  if (isBootstrapping) {
    return (
      <div style={{minHeight:"100vh",background:"#07070f",color:"#e8e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:24,fontWeight:800,marginBottom:10}}>MISE TASK</div>
          <div style={{fontSize:13,color:"#8b95a1"}}>初期データを読み込んでいます...</div>
        </div>
      </div>
    );
  }

  if (bootstrapError) {
    return (
      <div style={{minHeight:"100vh",background:"#07070f",color:"#e8e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",padding:24}}>
        <div style={{maxWidth:420,width:"100%",background:"#0c0c18",border:"1px solid #2a2a3a",borderRadius:16,padding:24,textAlign:"center"}}>
          <div style={{fontSize:18,fontWeight:800,marginBottom:10}}>API接続エラー</div>
          <div style={{fontSize:13,color:"#8b95a1",lineHeight:1.7,marginBottom:18}}>{bootstrapError}</div>
          <Btn onClick={loadAppData}>再読み込み</Btn>
        </div>
      </div>
    );
  }

  // ログイン画面
  if (!isLoggedIn) {
    return <LoginScreen onLogin={handleLogin} stores={stores} users={users} />;
  }

  return (
    <div style={{minHeight:"100vh",background:"#07070f",color:"#e8e8f0",fontFamily:"'Noto Sans JP',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-track{background:#07070f;}
        ::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px;}
        select option{background:#0f0f1e;}
        input:focus,select:focus{outline:1px solid #E85D0444;}
      `}</style>

      {notification && (
        <div style={{position:"fixed",top:20,right:20,zIndex:9999,background:notification.type==="warn"?"#120e08":"#060f08",border:`1px solid ${notification.type==="warn"?"#78350f":"#14532d"}`,color:notification.type==="warn"?"#fbbf24":"#4ade80",padding:"12px 20px",borderRadius:10,fontSize:13,boxShadow:"0 8px 32px #0009",maxWidth:340}}>
          {notification.msg}
        </div>
      )}

      {/* Header */}
      {/* ── 管理者パスワードモーダル ── */}
      {/* 店舗切り替えパスワード確認モーダル */}
      {storeChangePending !== null && (
        <Modal onClose={()=>{setStoreChangePending(null);setStorePwInput("");setStorePwError(false);}} width={340}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:6}}>
            🏪 店舗を切り替える
          </div>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:6}}>
            切り替え先：<strong style={{color:"#fff"}}>
              {storeChangePending===null ? "全店舗" : (INITIAL_STORES.find(s=>s.id===storeChangePending)?.name||"")}
            </strong>
          </div>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:18}}>
            管理者パスワードを入力してください
          </div>
          <div style={{marginBottom:6}}>
            <input
              type="password"
              value={storePwInput}
              onChange={e=>{setStorePwInput(e.target.value);setStorePwError(false);}}
              onKeyDown={e=>{
                if(e.key==="Enter"){
                  applyStoreChange();
                }
              }}
              placeholder="管理者パスワード"
              autoFocus
              style={{width:"100%",padding:"12px 16px",background:"#0c0c18",border:`1px solid ${storePwError?"#ef4444":"#2a2a3a"}`,color:"#fff",borderRadius:10,fontSize:15,outline:"none"}}
            />
          </div>
          {storePwError && <div style={{fontSize:12,color:"#ef4444",marginBottom:8}}>パスワードが違います</div>}
          <div style={{display:"flex",gap:10,marginTop:12}}>
            <button onClick={()=>{setStoreChangePending(null);setStorePwInput("");setStorePwError(false);}}
              style={{flex:1,padding:10,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>
              キャンセル
            </button>
            <button onClick={applyStoreChange}
              style={{flex:2,padding:10,background:"linear-gradient(90deg,#6D28D9,#7c3aed)",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:800,cursor:"pointer"}}>
              切り替える
            </button>
          </div>
        </Modal>
      )}

      {pwModal && (
        <Modal onClose={()=>{setPwModal(null);setPwInput("");setPwError(false);}} width={360}>
          <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:6}}>
            {pwModal==="login" ? "🔒 管理者ログイン" : "🔑 パスワード変更"}
          </div>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>
            {pwModal==="login" ? "管理者パスワードを入力してください" : "新しいパスワードを設定します"}
          </div>

          {pwModal==="login" && (
            <>
              <div style={{position:"relative",marginBottom:6}}>
                <input
                  type="password"
                  value={pwInput}
                  onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
                  onKeyDown={e=>{
                    if(e.key==="Enter"){
                      confirmHonbuSwitch();
                    }
                  }}
                  placeholder="パスワード"
                  autoFocus
                  style={{width:"100%",padding:"12px 16px",background:"#0c0c18",border:`1px solid ${pwError?"#ef4444":"#2a2a3a"}`,color:"#fff",borderRadius:10,fontSize:15,outline:"none"}}
                />
              </div>
              {pwError && <div style={{fontSize:12,color:"#ef4444",marginBottom:10}}>パスワードが違います</div>}
              <Btn onClick={confirmHonbuSwitch} color="#6D28D9" style={{width:"100%",marginTop:4}}>ログイン</Btn>
            </>
          )}

          {pwModal==="change" && (
            <PwChangeForm
              verifyHonbuPassword={verifyHonbuPassword}
              updateAdminPassword={api.settings.updateAdminPassword}
              onClose={()=>setPwModal(null)}
              notify={notify}
            />
          )}
        </Modal>
      )}

      <div style={{borderBottom:"1px solid #14141f",padding:"6px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap",minHeight:56,position:"sticky",top:0,zIndex:100,background:"#07070f"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setSideOpen(p=>!p)}
            style={{width:34,height:34,borderRadius:8,background:"transparent",border:"1px solid #1e1e2e",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16,color:"#aaa",transition:"all .2s"}}>
            {sideOpen ? "❌" : "☰"}
          </button>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#E85D04,#F48C06)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#fff",fontWeight:800}}>⬡</div>
          <div>
            <div style={{fontSize:13,fontWeight:800,letterSpacing:".1em",color:"#fff"}}>MISE TASK</div>
            <div style={{fontSize:9,color:"#E85D04",letterSpacing:".2em"}}>ラーメン店舗管理システム</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {isHonbu && <div style={{padding:"3px 10px",background:"#1a0a28",border:"1px solid #6D28D944",borderRadius:8,fontSize:11,color:"#c084fc"}}>{selectedStoreId ? "🏪 "+( INITIAL_STORES.find(s=>s.id===selectedStoreId)?.name||"") : "👁 全店舗"}</div>}
          {warnCount > 0 && <div style={{padding:"3px 10px",background:"#120e08",border:"1px solid #78350f",borderRadius:8,fontSize:11,color:"#fbbf24"}}>⚠ 差異 {warnCount}件</div>}
          {/* スタッフ選択 */}
          <select value={currentUserId ?? ""} onChange={e=>{
              const uid = e.target.value ? Number(e.target.value) : null;
              const user = INITIAL_USERS.find(u=>u.id===uid);
              if (user?.role==="本部") {
                setPendingUserId(uid); setPwInput(""); setPwError(false); setPwModal("login");
              } else {
                setCurrentUserId(uid);
                setSelectedStoreId(null); // スタッフ切替時は店舗リセット
              }
            }}
            style={{background:"#12121f",border:"1px solid #2a2a3a",color:currentUser?currentUser.color:"#aaa",padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:currentUser?700:400}}>
            <option value="">スタッフを選択</option>
            {INITIAL_USERS.map(u=><option key={u.id} value={u.id}>{u.name}（{u.role}）</option>)}
          </select>

          {/* 店舗選択（本部ログイン時のみ） */}
          {isHonbu && (
            <select
              value={selectedStoreId ?? "all"}
              onChange={e=>{
                const val = e.target.value === "all" ? null : Number(e.target.value);
                if (val === storeFilter) return; // 変更なし
                // パスワード確認
                setStoreChangePending(val);
                setStorePwInput("");
                setStorePwError(false);
              }}
              style={{background:"#0c0c18",border:"1px solid #6D28D944",color:"#c084fc",padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontWeight:700}}>
              <option value="all">🏠 全店舗</option>
              {INITIAL_STORES.map(s=><option key={s.id} value={s.id}>🏪 {s.name}</option>)}
            </select>
          )}

          {isHonbu && (
            <button onClick={()=>{setPwInput("");setPwError(false);setPwModal("change");}}
              style={{padding:"6px 10px",background:"#1a0a28",border:"1px solid #6D28D944",borderRadius:8,fontSize:11,color:"#c084fc",cursor:"pointer"}}>
              🔑 PW変更
            </button>
          )}

          <button onClick={handleLogout}
            style={{padding:"6px 10px",background:"#1a0808",border:"1px solid #7f1d1d44",borderRadius:8,fontSize:11,color:"#f87171",cursor:"pointer"}}>
            ログアウト
          </button>
        </div>
      </div>

      <div style={{display:"flex",height:"calc(100vh - 56px)",position:"relative"}}>
        {/* モバイル: サイドバー背景（タップで閉じる） */}
        {isMobile && sideOpen && (
          <div onClick={()=>setSideOpen(false)} style={{position:"fixed",inset:"56px 0 0 0",background:"#0009",zIndex:150}}/>
        )}
        {/* Sidebar */}
        <div style={isMobile ? {
            position:"fixed",left:0,top:56,height:"calc(100vh - 56px)",zIndex:160,
            width:sideOpen?220:0,borderRight:sideOpen?"1px solid #14141f":"none",
            padding:sideOpen?"14px 0":0,overflowY:sideOpen?"auto":"hidden",overflowX:"hidden",
            background:"#07070f",transition:"width .25s ease",boxShadow:sideOpen?"4px 0 28px #000b":"none"
          } : {
            width:sideOpen?190:0,minWidth:sideOpen?190:0,borderRight:sideOpen?"1px solid #14141f":"none",
            padding:sideOpen?"14px 0":0,overflowY:sideOpen?"auto":"hidden",overflowX:"hidden",
            background:"#07070f",flexShrink:0,transition:"width .25s ease"
          }}>
          {tabs.map(t=>{
            const badge = getBadge(t.id);
            return (
              <button key={t.id} onClick={()=>{setView(t.id); if(window.innerWidth<900)setSideOpen(false);}}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:t.id==="ai_support"?"10px 18px 10px 15px":"10px 18px",background:t.id==="ai_support"?(view===t.id?"#1a0a00":"rgba(232,93,4,.08)"):view===t.id?"#12121f":"transparent",border:"none",cursor:"pointer",color:t.id==="ai_support"?(view===t.id?"#FAA307":"#E85D04"):(view===t.id?"#fff":"#7c8794"),borderLeft:`3px solid ${t.id==="ai_support"?(view===t.id?"#FAA307":"#E85D0488"):view===t.id?"#E85D04":"transparent"}`,fontSize:12,textAlign:"left",marginTop:t.id==="ai_support"?"auto":"0"}}>
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>{t.icon}</span>{t.label}
                </span>
                {badge != null && <span style={{background:"#ef4444",color:"#fff",fontSize:9,fontWeight:700,borderRadius:10,padding:"1px 6px"}}>{badge}</span>}
              </button>
            );
          })}

          {/* ── タスク追加カード（TOP用・仕込み/クリーン/カスタム） ── */}
          {view==="top" && (()=>{
            const viewStore = topActiveStore || storeFilter || 1;
            const ritems = (routines||[]).filter(r=>r.active && r.store===viewStore);
            const prepItems  = ritems.filter(r=>r.category==="prep").map(r=>({id:r.id,name:r.name,category:"prep",deadline:r.deadline,recipeId:r.recipeId}));
            const cleanItems = ritems.filter(r=>r.category==="clean").map(r=>({id:r.id,name:r.name,category:"clean",deadline:r.deadline}));
            const customItems = [{id:"_cp",name:"カスタム仕込み",category:"prep",deadline:"10:00"},{id:"_cc",name:"カスタムクリーン",category:"clean",deadline:"12:00"}];
            const dateS = [0,1,2,3].map(i=>dateStr(-i))[topActiveDay] || dateStr(0);
            const toggle = k => setPaletteOpen(p=>({...p,[k]:!p[k]}));
            const addItem = (item) => {
              if (item.category==="prep") {
                setAllPrepTasks(p=>[...p,{id:"pt"+Date.now(),name:item.name,recipeId:item.recipeId||null,deadline:item.deadline,store:viewStore,assignedTo:null,date:dateS,completedAt:null,completedBy:null,amountVerified:false,amountLog:[]}]);
              } else {
                setCleanTasks(p=>[...p,{id:"ct"+Date.now(),name:item.name,area:"その他",deadline:item.deadline,store:viewStore,assignedTo:null,completedAt:null,completedBy:null,points:2}]);
              }
              notify("✓ 「"+item.name+"」を追加しました");
            };
            const Item = ({item}) => (
              <div onClick={()=>addItem(item)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 10px",margin:"0 6px 4px",background:item.category==="prep"?"#1a0a0022":"#1a081822",border:"1px solid "+(item.category==="prep"?"#E85D0433":"#C9184A33"),borderRadius:8,cursor:"pointer",fontSize:11,color:"#a0aab4"}}>
                <span>{item.category==="prep"?"🔪":"✦"}</span>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{item.name}</span>
                <span style={{flexShrink:0,width:18,height:18,borderRadius:"50%",background:"#E85D04",color:"#fff",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>＋</span>
              </div>
            );
            const Sec = ({skey,label,color,items}) => (
              <div style={{marginBottom:4}}>
                <button onClick={()=>toggle(skey)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 10px",background:"transparent",border:"none",cursor:"pointer",color:paletteOpen[skey]?color:"#7c8794"}}>
                  <span style={{fontSize:10,fontWeight:700}}>{label}</span>
                  <span style={{display:"flex",gap:5,alignItems:"center"}}>{items.length>0&&<span style={{fontSize:9,background:color+"33",color,padding:"1px 5px",borderRadius:5}}>{items.length}</span>}<span style={{fontSize:10,color:"#6b7280",display:"inline-block",transform:paletteOpen[skey]?"rotate(90deg)":"none"}}>▶</span></span>
                </button>
                {paletteOpen[skey] && <div style={{paddingTop:2}}>{items.length===0?<div style={{fontSize:10,color:"#6b7280",padding:"4px 12px"}}>なし</div>:items.map(it=><Item key={it.id} item={it}/>)}</div>}
              </div>
            );
            return (
              <div style={{borderTop:"1px solid #14141f",marginTop:10,paddingTop:10}}>
                <div style={{fontSize:9,color:"#6b7280",padding:"0 10px 6px",letterSpacing:".05em"}}>＋ タスクを追加（TOP）</div>
                <Sec skey="prep"   label="🔪 仕込み"   color="#E85D04" items={prepItems}/>
                <Sec skey="clean"  label="✦ クリーン"  color="#C9184A" items={cleanItems}/>
                <Sec skey="custom" label="＋ カスタム" color="#0077B6" items={customItems}/>
              </div>
            );
          })()}

        </div>

        {/* Main content */}
        <div style={{flex:1,padding:"24px 28px",overflowY:"auto"}}>
          {view==="top"       && <TopView allPrepTasks={allPrepTasks} setAllPrepTasks={setAllPrepTasks} cleanTasks={cleanTasks} setCleanTasks={setCleanTasks} inventory={inventory} setInventory={setInventory} recipes={recipes} currentUserId={currentUserId} notify={notify} storeFilter={storeFilter} routines={routines} paletteDrag={paletteDrag} setPaletteDrag={setPaletteDrag} extDragTask={topDragTask} setExtDragTask={setTopDragTask} extDragOver={topDragOver} setExtDragOver={setTopDragOver} onDayChange={setTopActiveDay} onStoreChange={setTopActiveStore}/>}
          {view==="dashboard" && <Dashboard allPrepTasks={allPrepTasks} cleanTasks={cleanTasks} hqTasks={hqTasks} currentUserId={currentUserId} inventory={inventory} orders={orders} storeFilter={storeFilter}/>}
          {view==="prep"      && <PrepView allTasks={allPrepTasks} setAllTasks={setAllPrepTasks} currentUserId={currentUserId} recipes={recipes} notify={notify} setInventory={setInventory} storeFilter={storeFilter}/>}
          {view==="clean"     && <CleanView tasks={cleanTasks} setTasks={setCleanTasks} currentUserId={currentUserId} notify={notify} storeFilter={storeFilter}/>}
        {view==="inventory" && <InventoryView inventory={inventory} setInventory={setInventory} notify={notify} storeFilter={storeFilter} currentUserId={currentUserId} stores={stores}/>}
          {view==="order"     && <OrderView inventory={inventory} setInventory={setInventory} suppliers={suppliers} setSuppliers={setSuppliers} orders={orders} setOrders={setOrders} priceHistory={priceHistory} setPriceHistory={setPriceHistory} currentUserId={currentUserId} notify={notify} storeFilter={storeFilter}/>}
          {view==="tasks"     && <TaskManagerView routines={routines} setRoutines={setRoutines} allPrepTasks={allPrepTasks} setAllPrepTasks={setAllPrepTasks} cleanTasks={cleanTasks} setCleanTasks={setCleanTasks} notify={notify} storeFilter={storeFilter} taskCats={taskCats} saveTaskCats={saveTaskCats}/>}
          {view==="ops"       && <OpsView currentUserId={currentUserId} storeFilter={storeFilter} notify={notify} openItems={openItems} setOpenItems={setOpenItems} closeItems={closeItems} setCloseItems={setCloseItems}/>}
          {view==="commission"&& <CommissionView allPrepTasks={allPrepTasks} cleanTasks={cleanTasks} pointConfig={pointConfig} setPointConfig={setPointConfig} currentUserId={currentUserId}/>}
          {view==="ai_input"   && <AIInputView recipes={recipes} setRecipes={setRecipes} inventory={inventory} setInventory={setInventory} suppliers={suppliers} notify={notify}/>}
          {view==="billing"    && <BillingView notify={notify}/>}
          {view==="ai_support" && <AISupportView/>}
          {view==="staff"      && <StaffView users={users} setUsers={setUsers} stores={stores} setStores={setStores} storeFilter={storeFilter} notify={notify} resetAllData={resetAllData}/>}
        </div>
      </div>
    </div>
  );
}

const App = () => <ErrorBoundary><AppInner /></ErrorBoundary>;
ReactDOM.render(<App/>, document.getElementById("root"));

  </script>
</body>
</html>
