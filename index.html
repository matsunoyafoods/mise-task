// 画面幅でモバイル判定（スマホ/iPad縦向け）
function useIsMobile(bp = 900) {
  const [m, setM] = useState(typeof window !== "undefined" && window.innerWidth < bp);
  useEffect(() => {
    const f = () => setM(window.innerWidth < bp);
    window.addEventListener("resize", f);
    return () => window.removeEventListener("resize", f);
  }, [bp]);
  return m;
}

let AUTH_TOKEN = null;

  _fetch: async (endpoint, options = {}) => {
    const url = CONFIG.API_BASE + endpoint;
    const authHeader = AUTH_TOKEN ? { Authorization: "Bearer " + AUTH_TOKEN } : {};
    const res = await fetch(url, {
      headers: { "Content-Type": "application/json", ...authHeader, ...options.headers },
      ...options,
    });
    if (!res.ok) {
      let message = `API Error: ${res.status}`;
      try {
        const payload = await res.json();
        if (payload?.error) message = payload.error.message || payload.error;
      } catch {}
      throw new Error(message);
    }
    if (res.status === 204) return null;
    return res.json();
  },

  // ── 認証 ──
  auth: {
    // 店舗コードでログイン → {storeId, storeName, users: [{id,name,role,avatar,color}]}

// ─── ERROR BOUNDARY ───
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: "" }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e.message }; }
  componentDidCatch(e, info) { console.error(e, info); }
  render() {
    if (this.state.hasError) return (
      <div style={{padding:40,color:"#f87171",background:"#07070f",minHeight:"100vh",fontFamily:"monospace"}}>
        <h2>⚠ エラー</h2>
        <pre style={{marginTop:16,color:"#fb923c",whiteSpace:"pre-wrap",fontSize:12}}>{this.state.error}</pre>
      </div>
    );
    return this.props.children;
  }
}

// 表示用：在庫単位 + 袋数換算 helper
const fmtStock = (item) => {
  if (!item.bagSize || !item.bagUnit) return `${item.stock.toLocaleString()}${item.unit}`;
  const bags = Math.floor(item.stock / item.bagSize);
  const rem  = item.stock % item.bagSize;
  return rem > 0
    ? `${bags}${item.bagUnit}${rem}${item.unit}`
    : `${bags}${item.bagUnit}`;
};

async function callAI(messages, systemPrompt) {
  // API プロキシ経由（サーバーサイドでAPIキーを管理）
  if (!CONFIG.AI_API_URL) {
    console.warn("AI_API_URL が未設定です。AI機能を利用するにはCONFIG.AI_API_URLを設定してください。");
    throw new Error("AI機能は現在利用できません。管理者にお問い合わせください。");
  }
  const res = await fetch(CONFIG.AI_API_URL + "/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json", ...(AUTH_TOKEN ? { Authorization: "Bearer " + AUTH_TOKEN } : {}) },
    body: JSON.stringify({ messages, system: systemPrompt })
  });
  if (!res.ok) throw new Error("AI API Error: " + res.status);
  const data = await res.json();
  // サーバー側で AI を呼び出し、{content:[{text}]} を返す想定
  let text = (data.content || []).map(c => c.text || "").join("");
  // コードフェンス除去 → JSON本体（最初の { or [ から対応する閉じまで）を抽出
  text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const firstObj = text.indexOf("{"), firstArr = text.indexOf("[");
  let start = -1;
  if (firstObj >= 0 && firstArr >= 0) start = Math.min(firstObj, firstArr);
  else start = Math.max(firstObj, firstArr);
  if (start > 0) text = text.slice(start);
  const lastObj = text.lastIndexOf("}"), lastArr = text.lastIndexOf("]");
  const end = Math.max(lastObj, lastArr);
  if (end >= 0) text = text.slice(0, end + 1);
  return JSON.parse(text);
}

function AmountVerifyModal({task, recipe, onConfirm, onCancel}) {
  const [mode, setMode] = useState("confirm"); // "confirm" | "detail"
  const [inputs, setInputs] = useState(
    recipe ? recipe.ingredients.reduce((a,ing)=>({...a,[ing.name]:String(ing.amount ?? "")}),{}) : {}
  );

  // レシピなし → ワンタップ完了
  if (!recipe) return (
    <Modal onClose={onCancel}>
      <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:12}}>🔪 仕込み完了確認</div>
      <p style={{fontSize:13,color:"#889",marginBottom:20}}>レシピが紐づいていません。完了しますか？</p>
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={onCancel} color="#1a1a2e" style={{color:"#8b95a1"}}>戻る</Btn>
        <Btn onClick={()=>onConfirm([])}>完了する</Btn>
      </div>
    </Modal>
  );

  // ── 最初の画面: 「規定通り？」ワンタップ確認 ──
  if (mode === "confirm") {
    return (
      <Modal onClose={onCancel} width={360}>
        <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}}>🔪 {task.name}</div>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:14}}>仕込みはいかがでしたか？</p>
        <div style={{background:"#0d0d1a",border:"1px solid #1e1e2e",borderRadius:10,padding:12,marginBottom:18}}>
          {recipe.ingredients.map((ing,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:i<recipe.ingredients.length-1?"1px solid #1e1e2e":"none"}}>
              <span style={{fontSize:12,color:"#ccc"}}>{ing.name}</span>
              <span style={{fontSize:12,color:"#E85D04",fontWeight:700}}>{ing.amount}{ing.unit}</span>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{
            const okLog = recipe.ingredients.map(ing=>({...ing,actual:ing.amount,ok:true,warn:false}));
            onConfirm(okLog);
          }} style={{flex:1,padding:16,background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",lineHeight:1.4}}>
            ✅ 規定通り<br/><span style={{fontSize:10,fontWeight:400,opacity:.8}}>ワンタップで完了</span>
          </button>
          <button onClick={()=>setMode("detail")}
            style={{flex:1,padding:16,background:"linear-gradient(135deg,#92400e,#d97706)",color:"#fff",border:"none",borderRadius:12,fontSize:14,fontWeight:800,cursor:"pointer",lineHeight:1.4}}>
            📏 差異あり<br/><span style={{fontSize:10,fontWeight:400,opacity:.8}}>数値を入力</span>
          </button>
        </div>
      </Modal>
    );
  }

  // ── 詳細入力画面 ──
  const checks = recipe.ingredients.map(ing => {
    const actual = Number(inputs[ing.name]);
    const ok = actual > 0 && Math.abs(actual - ing.amount) / ing.amount <= 0.05;
    return {...ing, actual, ok, warn: actual > 0 && !ok};
  });
  const allFilled = checks.every(c=>c.actual>0);
  const hasWarn = checks.some(c=>c.warn);
  return (
    <Modal onClose={onCancel}>
      <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}}>📏 使用量を入力</div>
      <p style={{fontSize:12,color:"#9ca3af",marginBottom:18}}>実際に計量した数値を入力。規定値±5%超で記録されます。</p>
      {checks.map((ing,i) => {
        const dp = ing.actual > 0 ? Math.round(((ing.actual-ing.amount)/ing.amount)*100) : null;
        return (
          <div key={i} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:13,color:"#ccc",fontWeight:600}}>{ing.name}</span>
              <span style={{fontSize:12,color:"#E85D04"}}>規定: {ing.amount}{ing.unit}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="number" placeholder="実際の使用量" value={inputs[ing.name]}
                onChange={e=>setInputs(p=>({...p,[ing.name]:e.target.value}))}
                style={{flex:1,padding:"9px",background:ing.warn?"#1a0808":ing.ok?"#051a0a":"#0c0c18",border:"1px solid "+(ing.warn?"#9a3412":ing.ok?"#14532d":"#2a2a3a"),color:"#eee",borderRadius:8,fontSize:13}}/>
              <span style={{fontSize:11,color:"#8b95a1"}}>{ing.unit}</span>
              {ing.actual > 0 && <Chip label={ing.ok?"✓ OK":`${dp>0?"+":""}${dp}%`} color={ing.ok?"#4ade80":"#f87171"} bg={ing.ok?"#052e16":"#1a0808"}/>}
            </div>
          </div>
        );
      })}
      {hasWarn && <div style={{background:"#1a0808",border:"1px solid #7f1d1d",borderRadius:8,padding:10,marginBottom:14,fontSize:11,color:"#f87171"}}>⚠ 差異が5%以上あります。記録して完了できます。</div>}
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={()=>setMode("confirm")} color="#1a1a2e" style={{color:"#8b95a1"}}>戻る</Btn>
        <Btn onClick={()=>allFilled&&onConfirm(checks)} disabled={!allFilled} color={hasWarn?"#dc2626":"#E85D04"}>
          {hasWarn?"⚠ 差異記録して完了":"✓ 完了する"}
        </Btn>
      </div>
    </Modal>
  );
}

// ─── INSPECTION MODAL ───
function InspectionModal({order, suppliers, onComplete, onClose}) {
  const sup = suppliers.find(s=>s.id===order.supplierId);
  const [log, setLog] = useState(order.items.map(i=>({itemId:i.itemId,name:i.name,ordered:i.qty,received:i.qty,unit:i.unit,ok:true})));
  const update = (idx, received) => {
    setLog(p=>p.map((l,i)=>i===idx?{...l,received:Number(received),ok:Math.abs(Number(received)-l.ordered)/l.ordered<=0.05}:l));
  };
  const hasIssue = log.some(l=>!l.ok);
  return (
    <Modal onClose={onClose}>
      <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:4}}>📦 検品チェック</div>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>{sup?.name} · 発注日: {order.sentAt?.slice(0,10)}</div>
      {log.map((l,idx) => (
        <div key={idx} style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:13,color:"#ccc",fontWeight:600}}>{l.name}</span>
            <span style={{fontSize:12,color:"#E85D04"}}>発注: {l.ordered.toLocaleString()}{l.unit}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input type="number" value={l.received} onChange={e=>update(idx,e.target.value)}
              style={{flex:1,padding:"9px",background:l.ok?"#051a0a":"#1a0808",border:`1px solid ${l.ok?"#14532d":"#9a3412"}`,color:"#eee",borderRadius:8,fontSize:13}}/>
            <span style={{fontSize:11,color:"#8b95a1"}}>{l.unit}</span>
            {l.received > 0 && <Chip label={l.ok?"✓ OK":`差異: ${l.received-l.ordered}`} color={l.ok?"#4ade80":"#f87171"} bg={l.ok?"#052e16":"#1a0808"}/>}
          </div>
        </div>
      ))}
      {hasIssue && <div style={{background:"#130808",border:"1px solid #7f1d1d",borderRadius:8,padding:10,marginBottom:14,fontSize:11,color:"#f87171"}}>⚠ 数量差異があります。</div>}
      <div style={{display:"flex",gap:10}}>
        <Btn onClick={onClose} color="#1a1a2e" style={{color:"#8b95a1"}}>キャンセル</Btn>
        <Btn onClick={()=>onComplete(order.id,log)} color={hasIssue?"#dc2626":"#16a34a"}>
          {hasIssue?"⚠ 差異を記録して完了":"✓ 検品完了"}
        </Btn>
      </div>
    </Modal>
  );
}

function QRDisplay({url}) {
  const ref = React.useRef(null);
  React.useEffect(()=>{
    if(!ref.current || !window.QRCode) return;
    ref.current.innerHTML = "";
    new window.QRCode(ref.current, {text:url,width:160,height:160,colorDark:"#000",colorLight:"#fff",correctLevel:window.QRCode?.CorrectLevel?.M});
  },[url]);
  return <div ref={ref} style={{display:"inline-block"}}/>;
}

    otherDesc: sup?.otherDesc||"",
  });

  const set = (k,v) => setForm(p=>({...p,[k]:v}));
  const toggleMethod = m => setForm(p=>({...p,methods:p.methods.includes(m)?p.methods.filter(x=>x!==m):[...p.methods,m]}));

  const save = () => {
    setSuppliers(p=>p.map(s=>s.token===token ? {
      ...s, name:form.companyName, contactName:form.contactName, tel:form.tel,
      orderMethods:form.methods, contact:form.email, lineId:form.lineId,
      instagramId:form.instagramId, twitterId:form.twitterId, otherDesc:form.otherDesc,
      selfRegistered:true, registeredAt:new Date().toLocaleDateString("ja-JP"),
    } : s));
    setStep(4);
  };

  // ステップ3: 選択した方法を1つずつ設定
  const currentMethod = form.methods[methodStep];
  const currentCfg = currentMethod ? METHODS[currentMethod] : null;
  const isLastMethod = methodStep >= form.methods.length - 1;

  const nextMethodOrSave = () => {
    if (isLastMethod) { save(); }
    else { setMethodStep(p=>p+1); }
  };

  // プログレスバー
  const Progress = () => (
    <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:24}}>
      {["会社情報","受注方法","連携設定"].map((label,i)=>{
        const n = i+1;
        const done = step>n, active = step===n;
        return (
          <React.Fragment key={n}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,
                background:done?"#6D28D9":active?"#a78bfa":"#1a1a2a",color:"#fff",border:active?"2px solid #a78bfa":"2px solid transparent"}}>
                {done?"✓":n}
              </div>
              <span style={{fontSize:9,color:active?"#a78bfa":done?"#6D28D9":"#6b7280",whiteSpace:"nowrap"}}>{label}</span>
            </div>
            {i<2 && <div style={{flex:1,height:2,background:step>n?"#6D28D9":"#1a1a2a",margin:"0 4px",marginBottom:16}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );

  return (
    <Modal onClose={onClose} width={500}>
      <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:4}}>🏢 業者情報の登録</div>
      <div style={{fontSize:11,color:"#8b95a1",marginBottom:20}}>発注書の受け取り方法を登録します。3ステップで完了します。</div>

      {step < 4 && <Progress/>}

      {/* ── Step1: 会社情報（最小限） ── */}
      {step===1 && (
        <div>
          <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:20}}>
            {[
              {label:"会社名 ＊", key:"companyName", placeholder:"例: 田中青果株式会社", required:true},
              {label:"担当者名", key:"contactName", placeholder:"例: 田中 一郎"},
              {label:"電話番号", key:"tel", placeholder:"例: 090-1234-5678"},
            ].map(f=>(
              <div key={f.key}>
                <div style={{fontSize:11,color:"#8b95a1",marginBottom:5}}>{f.label}</div>
                <input value={form[f.key]} onChange={e=>set(f.key,e.target.value)} placeholder={f.placeholder}
                  style={{width:"100%",padding:"12px",background:"#0c0c18",border:"1px solid "+(f.required&&!form[f.key]?"#7f1d1d":"#2a2a3a"),color:"#eee",borderRadius:8,fontSize:14,outline:"none"}}/>
              </div>
            ))}
          </div>
          <button onClick={()=>form.companyName.trim()&&setStep(2)}
            style={{width:"100%",padding:13,background:form.companyName.trim()?"linear-gradient(90deg,#6D28D9,#7c3aed)":"#1a1a2a",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:form.companyName.trim()?"pointer":"default"}}>
            次へ →
          </button>
        </div>
      )}

      {/* ── Step2: 受注方法を選ぶだけ ── */}
      {step===2 && (
        <div>
          <div style={{fontSize:12,color:"#9ca3af",marginBottom:14}}>発注書をどの方法で受け取りますか？（複数選択OK）</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {Object.entries(METHODS).map(([key,cfg])=>{
              const sel = form.methods.includes(key);
              return (
                <button key={key} onClick={()=>toggleMethod(key)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
                    background:sel?cfg.color+"22":"#0c0c18",
                    border:"2px solid "+(sel?cfg.color:"#1e1e2e"),
                    borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:cfg.color+"33",border:"1px solid "+cfg.color+"66",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                    {cfg.icon}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:sel?"#fff":"#ccc"}}>{cfg.label}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{cfg.inputLabel}</div>
                  </div>
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                    background:sel?cfg.color:"transparent",border:"2px solid "+(sel?cfg.color:"#2a2a3a"),
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {sel&&<span style={{color:"#fff",fontSize:12,fontWeight:800}}>✓</span>}
                  </div>
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setStep(1)} style={{flex:1,padding:11,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}}>← 戻る</button>
            <button onClick={()=>{if(form.methods.length>0){setMethodStep(0);setStep(3);}}}
              style={{flex:2,padding:11,background:form.methods.length>0?"linear-gradient(90deg,#6D28D9,#7c3aed)":"#1a1a2a",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:form.methods.length>0?"pointer":"default"}}>
              次へ →（{form.methods.length}件選択）
            </button>
          </div>
        </div>
      )}

      {/* ── Step3: 方法ごとに1つずつ入力 ── */}
      {step===3 && currentCfg && (
        <div>
          {/* 進捗インジケーター（複数選択時） */}
          {form.methods.length>1 && (
            <div style={{display:"flex",gap:4,marginBottom:16}}>
              {form.methods.map((m,i)=>(
                <div key={m} style={{flex:1,height:4,borderRadius:2,background:i<=methodStep?METHODS[m].color:"#1a1a2a",transition:"background .2s"}}/>
              ))}
            </div>
          )}

          {/* 方法アイコン＋ラベル */}
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:currentCfg.color+"11",border:"1px solid "+currentCfg.color+"44",borderRadius:12,marginBottom:18}}>
            <div style={{width:44,height:44,borderRadius:12,background:currentCfg.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
              {currentCfg.icon}
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{currentCfg.label}</div>
              <div style={{fontSize:11,color:"#8b95a1",marginTop:2}}>{form.methods.length>1?`${methodStep+1}/${form.methods.length}番目の設定`:""}</div>
            </div>
          </div>

          {/* 取得ガイド */}
          <div style={{background:"#0a0a16",border:"1px solid #1e1e2e",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
            <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:10}}>📋 {currentCfg.inputLabel}の確認方法</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {currentCfg.guide.map((g,i)=>(
                <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:g.step==="💡"?"#1a1a2a":"#6D28D9",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:g.step==="💡"?13:11,fontWeight:700,color:"#fff",flexShrink:0,marginTop:1}}>
                    {g.step}
                  </div>
                  <div style={{fontSize:12,color:g.step==="💡"?"#fb923c":"#ccc",lineHeight:1.6,flex:1}}>{g.text}</div>
                </div>
              ))}
            </div>
          </div>

          {/* LINEの場合: 友だち追加ボタン */}
          {currentCfg.addFriendButton && (
            <a
              href={`https://line.me/R/ti/p/${process.env.REACT_APP_LINE_BOT_ID||"@your-line-bot"}`}
              target="_blank" rel="noreferrer"
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,
                padding:"13px",marginBottom:14,
                background:"#06C755",color:"#fff",borderRadius:12,
                fontWeight:800,fontSize:14,textDecoration:"none"}}>
              💬 友だち追加する（タップ）
            </a>
          )}

          {/* 入力欄（1つだけ） */}
          <div style={{marginBottom:20}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>{currentCfg.inputLabel} ＊</div>
            <input
              autoFocus
              value={form[currentCfg.field]}
              onChange={e=>set(currentCfg.field,e.target.value)}
              placeholder={currentCfg.placeholder}
              style={{width:"100%",padding:"14px",background:"#0c0c18",
                border:"2px solid "+(form[currentCfg.field]?currentCfg.color:"#2a2a3a"),
                color:"#eee",borderRadius:10,fontSize:14,outline:"none",transition:"border .2s"}}/>
            {form[currentCfg.field] && (
              <div style={{marginTop:8,fontSize:11,color:"#4ade80",display:"flex",alignItems:"center",gap:6}}>
                ✓ 入力されました
              </div>
            )}
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>methodStep===0?setStep(2):setMethodStep(p=>p-1)}
              style={{flex:1,padding:11,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,cursor:"pointer",fontSize:13}}>
              ← 戻る
            </button>
            <button onClick={nextMethodOrSave}
              style={{flex:2,padding:12,
                background:isLastMethod?"linear-gradient(90deg,#059669,#10b981)":"linear-gradient(90deg,#6D28D9,#7c3aed)",
                color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
              {isLastMethod?"✓ 登録を完了する":"次の設定へ →"}
            </button>
          </div>
        </div>
      )}

      {/* ── Step4: 完了 ── */}
      {step===4 && (
        <div style={{textAlign:"center",padding:"10px 0 20px"}}>
          <div style={{fontSize:52,marginBottom:10}}>🎉</div>
          <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:6}}>登録が完了しました！</div>
          <div style={{fontSize:13,color:"#9ca3af",marginBottom:24,lineHeight:1.8}}>
            {form.companyName} 様<br/>
            発注が届いたら以下の方法で通知されます
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24,textAlign:"left"}}>
            {form.methods.map(m=>{
              const cfg = METHODS[m];
              const val = form[cfg.field];
              return (
                <div key={m} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",
                  background:cfg.color+"11",border:"1px solid "+cfg.color+"33",borderRadius:10}}>
                  <span style={{fontSize:20}}>{cfg.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#eee"}}>{cfg.label}</div>
                    <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{val||"（未入力）"}</div>
                  </div>
                  <span style={{fontSize:10,color:"#4ade80"}}>✓</span>
                </div>
              );
            })}
          </div>
          <button onClick={onClose}
            style={{width:"100%",padding:13,background:"linear-gradient(90deg,#6D28D9,#7c3aed)",color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:800,cursor:"pointer"}}>
            閉じる
          </button>
        </div>
      )}
    </Modal>
  );
}


// ─── DASHBOARD ───
function Dashboard({allPrepTasks, cleanTasks, hqTasks, currentUserId, inventory, orders, storeFilter}) {
  const todayPrep = allPrepTasks.filter(t=>t.date===todayStr && (storeFilter ? t.store===storeFilter : true));
  const todayClean = cleanTasks.filter(t=>storeFilter ? t.store===storeFilter : true);
  const lowStock = inventory.filter(i=>i.stock<=i.minStock);
  const pendingOrders = orders.filter(o=>!o.inspected && o.status==="sent" && (storeFilter ? o.storeId===storeFilter : true));
  const warns = allPrepTasks.filter(t=>t.amountLog?.some(l=>!l.ok) && t.date===todayStr);
  const myPending = currentUserId != null ? [...todayPrep,...todayClean,...hqTasks].filter(t=>t.assignedTo===currentUserId&&!t.completedAt) : [];
  const urgent = hqTasks.filter(t=>t.priority==="high"&&!t.completedAt);
  const currentUserData = INITIAL_USERS.find(u=>u.id===currentUserId);

  const Stat = ({label,value,color,icon,sub}) => (
    <div style={{background:"#0c0c18",border:`1px solid ${color}22`,borderRadius:14,padding:18}}>
      <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>{icon} {label}</div>
      <div style={{fontSize:26,fontWeight:800,color,fontFamily:"monospace"}}>{value}</div>
      {sub && <div style={{fontSize:10,color:"#7c8794",marginTop:4}}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <div style={{marginBottom:24}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>ダッシュボード</h2>
        <p style={{fontSize:12,color:"#8b95a1"}}>{storeFilter ? INITIAL_STORES.find(s=>s.id===storeFilter)?.name : "全店舗"} · 本日の状況</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        <Stat label="仕込み" value={`${todayPrep.filter(t=>t.completedAt).length}/${todayPrep.length}`} color="#E85D04" icon="🔪"/>
        <Stat label="クリーン" value={`${todayClean.filter(t=>t.completedAt).length}/${todayClean.length}`} color="#C9184A" icon="✦"/>
        <Stat label="在庫不足" value={lowStock.length} color={lowStock.length>0?"#f87171":"#4ade80"} icon="📦" sub={lowStock.length>0?"発注候補あり":"在庫OK"}/>
        <Stat label="検品待ち" value={pendingOrders.length} color={pendingOrders.length>0?"#fb923c":"#4ade80"} icon="📮" sub={pendingOrders.length>0?"要確認":"なし"}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {currentUserData != null && (
          <div style={{background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:14,padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <Av u={currentUserData} size={28}/>
              <span style={{fontSize:13,fontWeight:700,color:"#aaa"}}>{currentUserData.name} の本日タスク</span>
            </div>
            {myPending.length===0
              ? <div style={{color:"#6b7280",fontSize:13}}>全タスク完了 🎉</div>
              : myPending.map(t=>(
                <div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a2a"}}>
                  <span style={{fontSize:13,color:"#ccc"}}>{t.name}</span>
                  <span style={{fontSize:11,color:"#E85D04"}}>〆{t.deadline}</span>
                </div>
              ))
            }
          </div>
        )}

        <div style={{background:urgent.length>0?"#130808":"#0c0c18",border:`1px solid ${urgent.length>0?"#9a3412":"#1e1e2e"}`,borderRadius:14,padding:20}}>
          <div style={{fontSize:13,fontWeight:700,color:urgent.length>0?"#fb923c":"#7c8794",marginBottom:14}}>
            {urgent.length>0?"⚠ 緊急本部タスク":"本部タスク"}
          </div>
          {urgent.length===0
            ? <div style={{color:"#6b7280",fontSize:13}}>緊急タスクなし</div>
            : urgent.map(t=>(
              <div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1e1010"}}>
                <span style={{fontSize:13,color:"#eee"}}>{t.name}</span>
                <span style={{fontSize:11,color:"#fb923c"}}>〆{t.deadline}</span>
              </div>
            ))
          }
        </div>

        {warns.length > 0 && (
          <div style={{background:"#120e08",border:"1px solid #78350f",borderRadius:14,padding:20,gridColumn:"1 / -1"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:12}}>📏 本日の分量差異レポート</div>
            {warns.map(t => {
              const u = INITIAL_USERS.find(x=>x.id===t.completedBy);
              return (
                <div key={t.id} style={{display:"flex",gap:12,padding:"7px 0",borderBottom:"1px solid #1e1208",flexWrap:"wrap"}}>
                  <span style={{fontSize:12,color:"#eee"}}>{t.name}</span>
                  <span style={{fontSize:11,color:"#aaa"}}>{u?.name}</span>
                  {t.amountLog.filter(l=>!l.ok).map((l,i)=>(
                    <span key={i} style={{fontSize:11,color:"#fbbf24"}}>{l.name}: 規定{l.expected}g → 実{l.actual}g</span>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {!storeFilter && currentUserId !== null && (
          <div style={{background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:14,padding:20,gridColumn:"1 / -1"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#aaa",marginBottom:16}}>店舗別 進捗</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              {INITIAL_STORES.map(store => {
                const st = [...allPrepTasks.filter(t=>t.date===todayStr&&t.store===store.id),...cleanTasks.filter(t=>t.store===store.id)];
                const sd = st.filter(t=>t.completedAt).length;
                return (
                  <div key={store.id} style={{background:"#0a0a16",borderRadius:10,padding:16}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#eee",marginBottom:10}}>{store.name}</div>
                    <div style={{fontSize:22,fontWeight:800,color:"#E85D04",fontFamily:"monospace",marginBottom:8}}>{sd}/{st.length}</div>
                    <Bar v={sd} max={Math.max(st.length,1)} color="#E85D04" h={6}/>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── PREP VIEW ───
// ─── AI INPUT PANELS ─────────────────────────────────────────────────────────
function RecipeAIPanel({ recipes, setRecipes, notify }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [results, setResults] = useState(null); // 複数レシピ読み取り時
  const [error, setError] = useState(null);
  const fileRef = useRef();

  const handleFile = f => {
    setFile(f); setResult(null); setResults(null); setError(null);
    setPreview(f.type.startsWith("image/") ? URL.createObjectURL(f) : null);
  };

  const analyze = async () => {
    if (!file) return;
    setLoading(true); setError(null);
    try {
      const b64 = await fileToBase64(file);
      const isImg = file.type.startsWith("image/");
      const messages = [{ role:"user", content:[
        { type: isImg ? "image" : "document", source:{ type:"base64", media_type:file.type, data:b64 }},
        { type:"text", text:"この資料からレシピ情報を全て抽出してください。JSONのみ返してください。"}
      ]}];
      const sys = "ラーメン店舗管理システム用レシピ読み取りAI。資料内に複数のレシピがあれば全て抽出する。\n以下のJSON形式のみ返答。preamble不要。\n{\"recipes\":[{\"name\":\"名前\",\"category\":\"タレ/スープ/トッピング/麺/その他\",\"yield\":\"出来高\",\"description\":\"保存方法や備考\",\"ingredients\":[{\"name\":\"材料\",\"amount\":数値,\"unit\":\"単位\"}],\"steps\":[\"手順1\",\"手順2\"]}]}";
      const parsed = await callAI(messages, sys);
      // 単一/配列/{recipes:[...]} のいずれでも配列に正規化
      let list = Array.isArray(parsed) ? parsed : (parsed.recipes || [parsed]);
      list = list.filter(r => r && r.name).map(r => ({
        ...r,
        ingredients: r.ingredients || [],
        steps: r.steps || [],
        allergens: detectAllergens((r.ingredients||[]).map(i => i.name)),
        image: "📋",
      }));
      if (list.length === 0) { setError("レシピを抽出できませんでした"); }
      else if (list.length === 1) { setResult(list[0]); setResults(null); }
      else { setResults(list); setResult(null); }
    } catch(e) { setError("読み取りに失敗しました"); }
    setLoading(false);
  };

  const save = () => {
    if (!result) return;
    setRecipes(p => [...p, { ...result, id:"r"+Date.now() }]);
    notify("✅ レシピを登録しました");
    setResult(null); setFile(null); setPreview(null);
  };

  const saveAll = () => {
    if (!results || results.length === 0) return;
    setRecipes(p => [...p, ...results.map((r,i) => ({ ...r, id:"r"+Date.now()+"_"+i }))]);
    notify("✅ "+results.length+"件のレシピを登録しました");
    setResults(null); setFile(null); setPreview(null);
  };

  const toggleA = id => setResult(p => ({...p, allergens: p.allergens.includes(id) ? p.allergens.filter(a=>a!==id) : [...p.allergens,id]}));

  const S = {
    drop: (on) => ({ border:"2px dashed "+(on?"#E85D04":"#2a2a3a"), borderRadius:10, padding:28, textAlign:"center", cursor:"pointer", background:on?"rgba(232,93,4,0.05)":"transparent", marginBottom:12 }),
    input: { background:"#12121f", border:"1px solid #2a2a3a", borderRadius:6, padding:"7px 10px", color:"#e8e8f0", fontSize:12, outline:"none", width:"100%", boxSizing:"border-box" },
    label: { fontSize:11, color:"#8b95a1", fontWeight:700, marginBottom:4, display:"block" },

        {preview ? <img src={preview} alt="" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,objectFit:"contain"}}/> :

        {loading ? "🔄 AI解析中..." : "🤖 AIで読み取る"}

                <span style={{fontSize:11,color:"#8b95a1",flexShrink:0}}>材料{(r.ingredients||[]).length}・手順{(r.steps||[]).length}</span>
                <button style={S.del} onClick={()=>setResults(results.filter((_,j)=>j!==i))}>✕</button>

          <button onClick={()=>{setResults(null);setFile(null);setPreview(null);}} style={{width:"100%",marginTop:8,padding:9,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,fontSize:12,cursor:"pointer"}}>やり直す</button>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>

            <div><label style={S.label}>カテゴリ</label>
              <select style={S.input} value={result.category||""} onChange={e=>setResult({...result,category:e.target.value})}>
                {["スープ","タレ","トッピング","麺","その他"].map(c=><option key={c}>{c}</option>)}

            <div><label style={S.label}>説明</label><input style={S.input} value={result.description||""} onChange={e=>setResult({...result,description:e.target.value})}/></div>
          </div>
          <div style={{marginBottom:10}}>
            <label style={S.label}>材料</label>
            {(result.ingredients||[]).map((ing,i)=>(
              <div key={i} style={S.row}>

}

function SupplierAIPanel({ inventory, setInventory, suppliers, notify }) {
  const [file, setFile] = useState(null);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const fileRef = useRef();

  const handleFile = f => {
    setFile(f); setResult(null); setError(null);
    setPreview(f.type.startsWith("image/") ? URL.createObjectURL(f) : null);
  };

  const analyze = async () => {
    if (!file) return;
    setLoading(true); setError(null);
    try {
      const b64 = await fileToBase64(file);
      const isImg = file.type.startsWith("image/");
      const messages = [{ role:"user", content:[
        { type: isImg ? "image" : "document", source:{ type:"base64", media_type:file.type, data:b64 }},
        { type:"text", text:"この書類から仕入れ情報を抽出してください。JSONのみ返してください。"}
      ]}];
      const supNames = suppliers.map(s=>s.name).join("、");
      const sys = "ラーメン店舗管理システム用 仕入れ商品読み取りAI。書類から仕入れ商品を抽出し、商品マスタとして登録する。\n重要: 同じ商品名が複数行（複数日付）ある場合は必ず1つにまとめる（重複させない）。数量や合計金額は不要。単価は最新のものを採用。\n以下のJSON形式のみ返答。既知業者: "+supNames+"\n{\"supplierName\":\"業者名\",\"supplierId\":\"\",\"documentDate\":\"YYYY-MM-DD\",\"items\":[{\"name\":\"商品名\",\"unit\":\"単位\",\"unitPrice\":数値}]}";
      const parsed = await callAI(messages, sys);
      const matched = suppliers.find(s => parsed.supplierName && parsed.supplierName.includes(s.name));
      parsed.supplierId = matched ? matched.id : "";
      setResult(parsed);
    } catch(e) { setError("読み取りに失敗しました"); }
    setLoading(false);
  };

  const save = () => {
    if (!result?.items?.length) return;
    // 商品名で重複をまとめる（同名は1つ＝最後の単価を採用）
    const map = new Map();
    result.items.forEach(item => {
      const name = (item.name||"").trim();
      if (name) map.set(name, item);
    });
    let added=0, updated=0, skipped=0;
    const newItems = [];
    [...map.entries()].forEach(([name,item]) => {
      const existing = inventory.find(inv => inv.name === name);
      const price = Number(item.unitPrice||0);
      if (existing) {
        if (price && price !== existing.unitPrice) {
          // 既存商品で単価が変わった → 単価のみ更新（在庫数は変更しない）
          setInventory(p => p.map(inv => inv.id===existing.id ? {...inv, unitPrice:price} : inv));
          updated++;
        } else {
          skipped++; // 登録済・変更なし
        }
      } else {
        // 新規商品マスタ（数量・合計は登録しない。在庫数は0）
        newItems.push({ id:"inv"+Date.now()+Math.random().toString(36).slice(2,7), name, category:"その他", storageGroup:"未設定", unit:item.unit||"個", stock:0, minStock:0, orderQty:0, supplierId:result.supplierId, unitPrice:price });
        added++;
      }
    });
    if (newItems.length) setInventory(p => [...p, ...newItems]);
    notify("✅ 新規"+added+"件・単価更新"+updated+"件"+(skipped>0?"（変更なし"+skipped+"件はスキップ）":""));
    setResult(null); setFile(null); setPreview(null);
  };

  const S = {
    drop: (on) => ({ border:"2px dashed "+(on?"#0077B6":"#2a2a3a"), borderRadius:10, padding:28, textAlign:"center", cursor:"pointer", background:on?"rgba(0,119,182,0.05)":"transparent", marginBottom:12 }),
    input: { background:"#12121f", border:"1px solid #2a2a3a", borderRadius:6, padding:"7px 10px", color:"#e8e8f0", fontSize:12, outline:"none", width:"100%", boxSizing:"border-box" },
    th: { padding:"7px 5px", color:"#8b95a1", fontSize:11, fontWeight:700, borderBottom:"1px solid #1e1e2e", textAlign:"left", whiteSpace:"nowrap" },
    td: { padding:"3px 2px", borderBottom:"1px solid #0f0f1e" },
    del: { background:"rgba(239,68,68,0.15)", border:"1px solid #ef444444", color:"#f87171", borderRadius:5, padding:"3px 7px", cursor:"pointer", fontSize:11 },
    ti: { background:"#12121f", border:"1px solid #2a2a3a", borderRadius:4, padding:"5px 6px", color:"#e8e8f0", fontSize:11, outline:"none", width:"100%", boxSizing:"border-box" },
  };

  return (
    <div>
      <div style={S.drop(!!file)} onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)handleFile(f);}} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current.click()}>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
        {preview ? <img src={preview} alt="" style={{maxWidth:"100%",maxHeight:160,borderRadius:8,objectFit:"contain"}}/> :
          <><div style={{fontSize:32,marginBottom:6}}>{file?"📄":"☁️"}</div><div style={{fontSize:12,color:"#6b7280",whiteSpace:"pre-line"}}>{file?file.name:"取引業者から単価表を作成してもらい\nここに添付してください"}</div></>}
      </div>
      {file && <button onClick={analyze} disabled={loading} style={{width:"100%",padding:11,background:loading?"#2a2a3a":"linear-gradient(90deg,#0077B6,#00B4D8)",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:8}}>
        {loading ? "🔄 AI解析中..." : "🤖 AIで読み取る"}
      </button>}
      {error && <div style={{background:"rgba(239,68,68,0.1)",border:"1px solid #ef444444",color:"#f87171",padding:8,borderRadius:6,fontSize:11,marginBottom:8}}>{error}</div>}
      {result && (
        <div>
          <div style={{color:"#4ade80",fontSize:12,fontWeight:700,marginBottom:10}}>✅ 読み取り完了（修正可）</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
            <div><label style={{fontSize:11,color:"#8b95a1",fontWeight:700,marginBottom:4,display:"block"}}>業者</label>
              <select style={S.input} value={result.supplierId||""} onChange={e=>setResult({...result,supplierId:e.target.value})}>
                <option value="">-- 選択 --</option>
                {suppliers.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:11,color:"#8b95a1",fontWeight:700,marginBottom:4,display:"block"}}>種別</label>
              <select style={S.input} value={result.documentType||"納品書"} onChange={e=>setResult({...result,documentType:e.target.value})}>
                {["発注書","納品書","見積書"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div><label style={{fontSize:11,color:"#8b95a1",fontWeight:700,marginBottom:4,display:"block"}}>日付</label><input type="date" style={S.input} value={result.documentDate||""} onChange={e=>setResult({...result,documentDate:e.target.value})}/></div>
          </div>
          {(()=>{
            const annotated = (result.items||[]).map((item,idx)=>{
              const name=(item.name||"").trim();
              const existing = inventory.find(inv=>inv.name===name);
              const price = Number(item.unitPrice||0);
              let status="new";
              if (existing) status = (price && price!==existing.unitPrice) ? (price>existing.unitPrice?"up":"down") : "same";
              return {item, idx, existing, status, price};
            });
            const visible = annotated.filter(a=>a.status!=="same");
            const sameCount = annotated.length - visible.length;
            const badge = (a)=>{
              if(a.status==="new")  return <span style={{fontSize:10,color:"#4ade80",background:"#052e16",padding:"2px 7px",borderRadius:5,whiteSpace:"nowrap"}}>新規</span>;
              if(a.status==="up")   return <span style={{fontSize:10,color:"#f87171",background:"#1a0808",padding:"2px 7px",borderRadius:5,whiteSpace:"nowrap"}}>▲値上げ ¥{a.existing.unitPrice}→¥{a.price}</span>;
              if(a.status==="down") return <span style={{fontSize:10,color:"#60a5fa",background:"#08101a",padding:"2px 7px",borderRadius:5,whiteSpace:"nowrap"}}>▼値下げ ¥{a.existing.unitPrice}→¥{a.price}</span>;
              return null;
            };
            return (
              <div>
                {sameCount>0 && <div style={{fontSize:11,color:"#6b7280",marginBottom:6}}>登録済みで変更なし: {sameCount}件（非表示）</div>}
                <div style={{overflowX:"auto",marginBottom:8}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr>{["状態","商品名","単位","単価",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
                    <tbody>
                      {visible.length===0 && <tr><td colSpan={5} style={{...S.td,textAlign:"center",color:"#6b7280",padding:14}}>新規・変更のある商品はありません</td></tr>}
                      {visible.map((a,vi)=>(
                        <tr key={a.idx} style={{background:vi%2===0?"#0a0a14":"transparent"}}>
                          <td style={S.td}>{badge(a)}</td>
                          <td style={S.td}><input style={S.ti} value={a.item.name||""} onChange={e=>{const arr=[...result.items];arr[a.idx]={...arr[a.idx],name:e.target.value};setResult({...result,items:arr});}}/></td>
                          <td style={S.td}><input style={{...S.ti,width:60}} value={a.item.unit||""} onChange={e=>{const arr=[...result.items];arr[a.idx]={...arr[a.idx],unit:e.target.value};setResult({...result,items:arr});}}/></td>
                          <td style={S.td}><input style={{...S.ti,width:80}} value={a.item.unitPrice||""} onChange={e=>{const arr=[...result.items];arr[a.idx]={...arr[a.idx],unitPrice:e.target.value};setResult({...result,items:arr});}}/></td>
                          <td style={S.td}><button style={S.del} onClick={()=>setResult({...result,items:result.items.filter((_,j)=>j!==a.idx)})}>✕</button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })()}
          <button style={{background:"none",border:"1px dashed #2a2a3a",color:"#6b7280",borderRadius:6,padding:"6px",cursor:"pointer",fontSize:12,width:"100%",marginBottom:8}} onClick={()=>setResult({...result,items:[...(result.items||[]),{name:"",unit:"",unitPrice:""}]})}>＋ 商品を追加</button>
          <div style={{background:"rgba(0,119,182,0.08)",border:"1px solid #0077B644",borderRadius:6,padding:8,fontSize:11,color:"#93c5fd",marginBottom:8}}>
            💡 同じ商品は1つに統合。登録済みで単価変更なしは非表示。🟢新規＝追加 / 🔴値上げ・🔵値下げ＝単価更新（在庫数は変えません）。
          </div>
          <button onClick={save} style={{width:"100%",padding:11,background:"linear-gradient(90deg,#059669,#10b981)",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>💾 在庫管理に登録する</button>
        </div>
      )}
    </div>
  );
}

function StoreSection({stores, setStores, users, setUsers, notify}) {
  const [storeForm, setStoreForm] = useState(null);
  const [deleteStore, setDeleteStore] = useState(null);

  const openNewStore = () => setStoreForm({_isNew:true, name:""});
  const openEditStore = (s) => setStoreForm({...s});

  const [setupGuide, setSetupGuide] = useState(null); // {storeName, storeId}
  const saveStore = () => {
    if (!storeForm.name.trim()) { notify("店舗名を入力してください","warn"); return; }
    if (storeForm._isNew) {
      const newId = Math.max(...stores.map(s=>s.id)) + 1;
      setStores(p=>[...p, {id:newId, name:storeForm.name.trim()}]);
      notify("✓ 「"+storeForm.name+"」を追加しました");
      setStoreForm(null);
      setSetupGuide({storeName:storeForm.name.trim(), storeId:newId});
      return;
    } else {
      setStores(p=>p.map(s=>s.id===storeForm.id ? {...s, name:storeForm.name.trim()} : s));
      notify("✓ 店舗名を更新しました");
    }
    setStoreForm(null);
  };

  const confirmDeleteStore = (s) => {
    const staffCount = users.filter(u=>u.store===s.id).length;
    setDeleteStore({...s, staffCount});
  };

  const execDeleteStore = () => {
    // 所属スタッフのstoreをnullに
    setUsers(p=>p.map(u=>u.store===deleteStore.id ? {...u, store:null} : u));
    setStores(p=>p.filter(s=>s.id!==deleteStore.id));
    notify("店舗を削除しました","warn");
    setDeleteStore(null);
  };

  return (
    <div style={{marginBottom:28}}>
      {/* 新店舗セットアップガイド */}
      {setupGuide && (
        <Modal onClose={()=>setSetupGuide(null)} width={480}>
          <div style={{textAlign:"center",marginBottom:20}}>
            <div style={{fontSize:36,marginBottom:8}}>🎉</div>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:4}}>
              「{setupGuide.storeName}」を追加しました！
            </div>
            <div style={{fontSize:12,color:"#9ca3af"}}>新店舗の準備を進めましょう</div>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
            {[
              {step:"①",icon:"👥",title:"スタッフを登録",desc:"このページ下部の「スタッフを追加」から、新店舗のスタッフを登録してください",color:"#E85D04"},
              {step:"②",icon:"🏢",title:"取引業者にURLを送付",desc:"発注管理 →「＋ 業者登録QR発行」から業者名を入力してQR/URLを発行。業者に送ると業者が自分で商品・単価を登録できます",color:"#6D28D9"},
              {step:"③",icon:"📋",title:"ルーティンタスクを確認",desc:"タスク管理からルーティンを確認・追加してください。全機能はそのまま使えます",color:"#0077B6"},
            ].map(item=>(
              <div key={item.step} style={{display:"flex",gap:14,padding:"14px 16px",background:"#0c0c18",border:"1px solid "+item.color+"33",borderRadius:12,borderLeft:"3px solid "+item.color}}>
                <div style={{fontSize:22,flexShrink:0}}>{item.icon}</div>
                <div>

            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>店舗名 *</div>

              ⚠ 所属スタッフ{deleteStore.staffCount}名の担当店舗が未割り当てになります
            </div>
          )}
          <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>この操作は元に戻せません。</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setDeleteStore(null)}
              style={{flex:1,padding:10,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>
              キャンセル
            </button>
            <button onClick={execDeleteStore}
              style={{flex:1,padding:10,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>

        </div>

}

function StaffView({users, setUsers, stores, setStores, storeFilter, notify, resetAllData}) {
  const ROLES = ["本部","店長","スタッフ","アルバイト"];
  const COLORS = ["#E85D04","#C9184A","#0077B6","#2D6A4F","#9B2226","#6A0572","#6D28D9","#0f766e","#b45309","#1d4ed8"];
  const [editForm, setEditForm] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);

  const openNew = () => setEditForm({
    _isNew: true, name:"", role:"スタッフ", store: storeFilter||1,
    color: COLORS[users.length % COLORS.length], avatar:""
  });
  const openEdit = (u) => setEditForm({...u});

  const save = () => {
    if (!editForm.name.trim()) { notify("名前を入力してください","warn"); return; }
    if (editForm._isNew) {
      const newId = Math.max(...users.map(u=>u.id)) + 1;
      const avatar = editForm.name.trim()[0];
      setUsers(p=>[...p, {...editForm, id:newId, avatar, _isNew:undefined}]);
      notify("✓ スタッフを追加しました");
    } else {
      const avatar = editForm.name.trim()[0];
      setUsers(p=>p.map(u=>u.id===editForm.id ? {...editForm, avatar} : u));
      notify("✓ スタッフ情報を更新しました");
    }
    setEditForm(null);
  };

  const remove = (u) => {
    setUsers(p=>p.filter(x=>x.id!==u.id));
    setDeleteTarget(null);
    notify("スタッフを削除しました","warn");
  };

  const displayUsers = storeFilter
    ? users.filter(u=>u.store===storeFilter||u.role==="本部")
    : users;

  return (
    <div style={{maxWidth:700,margin:"0 auto"}}>

      {/* 編集モーダル */}
      {editForm && (
        <Modal onClose={()=>setEditForm(null)} width={420}>
          <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:20}}>
            {editForm._isNew ? "＋ スタッフを追加" : "✏ スタッフを編集"}
          </div>

          {/* 名前 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>名前 *</div>
            <input value={editForm.name} onChange={e=>setEditForm(p=>({...p,name:e.target.value}))}
              placeholder="例: 田中 健太"
              style={{width:"100%",padding:"10px 12px",background:"#0c0c18",border:"1px solid #2a2a3a",color:"#eee",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>

          {/* 役職 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>役職</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {ROLES.map(r=>(
                <button key={r} onClick={()=>setEditForm(p=>({...p,role:r}))}
                  style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,
                    background:editForm.role===r?"#E85D04":"#1a1a2a",color:editForm.role===r?"#fff":"#8b95a1"}}>
                  {r}
                </button>
              ))}
            </div>
          </div>

          {/* 店舗 */}
          {editForm.role!=="本部" && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"#8b95a1",marginBottom:6}}>担当店舗</div>
              <div style={{display:"flex",gap:8}}>
                {INITIAL_STORES.map(s=>(
                  <button key={s.id} onClick={()=>setEditForm(p=>({...p,store:s.id}))}
                    style={{padding:"7px 18px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,
                      background:editForm.store===s.id?"#0077B6":"#1a1a2a",color:editForm.store===s.id?"#fff":"#8b95a1"}}>
                    {s.name}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* カラー */}
          <div style={{marginBottom:22}}>
            <div style={{fontSize:11,color:"#8b95a1",marginBottom:8}}>アバターカラー</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {COLORS.map(c=>(
                <button key={c} onClick={()=>setEditForm(p=>({...p,color:c}))}
                  style={{width:28,height:28,borderRadius:"50%",background:c,border:editForm.color===c?"3px solid #fff":"3px solid transparent",cursor:"pointer"}}/>
              ))}
            </div>
            {/* プレビュー */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginTop:12,padding:"10px 14px",background:"#0c0c18",borderRadius:10}}>
              <div style={{width:38,height:38,borderRadius:"50%",background:editForm.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>
                {editForm.name?editForm.name[0]:"？"}
              </div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#eee"}}>{editForm.name||"名前未入力"}</div>
                <div style={{fontSize:11,color:"#7c8794"}}>{editForm.role}{editForm.role!=="本部"?" · "+(INITIAL_STORES.find(s=>s.id===editForm.store)?.name||""):"" }</div>
              </div>
            </div>
          </div>

          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setEditForm(null)}
              style={{flex:1,padding:11,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>
              キャンセル
            </button>
            <button onClick={save}
              style={{flex:2,padding:11,background:"linear-gradient(90deg,#E85D04,#F48C06)",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              {editForm._isNew?"追加する":"保存する"}
            </button>
          </div>
        </Modal>
      )}

      {/* 削除確認モーダル */}
      {deleteTarget && (
        <Modal onClose={()=>setDeleteTarget(null)} width={360}>
          <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:8}}>🗑 スタッフを削除</div>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:"#0c0c18",borderRadius:10,marginBottom:16}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:deleteTarget.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:"#fff"}}>
              {deleteTarget.avatar}
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:"#eee"}}>{deleteTarget.name}</div>
              <div style={{fontSize:11,color:"#7c8794"}}>{deleteTarget.role}</div>
            </div>
          </div>
          <div style={{fontSize:12,color:"#f87171",marginBottom:16}}>⚠ 削除すると元に戻せません。過去のタスク記録には影響しません。</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setDeleteTarget(null)}
              style={{flex:1,padding:10,background:"#1a1a2e",color:"#8b95a1",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>
              キャンセル
            </button>
            <button onClick={()=>remove(deleteTarget)}
              style={{flex:1,padding:10,background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer"}}>
              削除する
            </button>
          </div>
        </Modal>
      )}

      {/* ── 店舗管理セクション（本部のみ表示） ── */}
      {!storeFilter && (
        <StoreSection stores={stores} setStores={setStores} users={users} setUsers={setUsers} notify={notify}/>
      )}

      {/* ヘッダー */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24,marginTop:storeFilter?0:32,flexWrap:"wrap",gap:10}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:3}}>スタッフ管理</h2>
          <p style={{fontSize:12,color:"#8b95a1"}}>スタッフの追加・編集・削除ができます</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {!storeFilter && resetAllData && (
            <button onClick={resetAllData}
              style={{padding:"10px 16px",background:"transparent",color:"#f87171",border:"1px solid #7f1d1d44",borderRadius:10,fontSize:12,cursor:"pointer"}}>
              🗑 データ初期化
            </button>
          )}
          <button onClick={openNew}
            style={{display:"flex",alignItems:"center",gap:8,padding:"10px 20px",background:"linear-gradient(90deg,#E85D04,#F48C06)",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            ＋ スタッフを追加
          </button>
        </div>
      </div>

      {/* 店舗別グループ表示 */}
      {INITIAL_STORES.map(store=>{
        const storeStaff = displayUsers.filter(u=>u.store===store.id);
        if(storeStaff.length===0) return null;
        return (
          <div key={store.id} style={{marginBottom:28}}>
            <div style={{fontSize:12,fontWeight:700,color:"#E85D04",letterSpacing:".1em",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1e1e2e"}}>
              🏪 {store.name} · {storeStaff.length}名
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {storeStaff.map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:12,borderLeft:"3px solid "+u.color}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>
                    {u.avatar}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#eee"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#7c8794",marginTop:2}}>{u.role}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>openEdit(u)}
                      style={{padding:"6px 14px",background:"#1a1a2e",color:"#a0aab4",border:"1px solid #2a2a3a",borderRadius:8,cursor:"pointer",fontSize:12}}>
                      ✏ 編集
                    </button>
                    {u.role!=="本部" && (
                      <button onClick={()=>setDeleteTarget(u)}
                        style={{padding:"6px 14px",background:"#1a0808",color:"#f87171",border:"1px solid #7f1d1d44",borderRadius:8,cursor:"pointer",fontSize:12}}>
                        🗑
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}

      {/* 本部スタッフ */}
      {(() => {
        const honbu = displayUsers.filter(u=>u.role==="本部");
        if(honbu.length===0) return null;
        return (
          <div style={{marginBottom:28}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6D28D9",letterSpacing:".1em",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #1e1e2e"}}>
              👁 本部
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {honbu.map(u=>(
                <div key={u.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:"#0c0c18",border:"1px solid #1e1e2e",borderRadius:12,borderLeft:"3px solid "+u.color}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:u.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>
                    {u.avatar}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#eee"}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#7c8794",marginTop:2}}>{u.role}</div>
                  </div>
                  <button onClick={()=>openEdit(u)}
                    style={{padding:"6px 14px",background:"#1a1a2e",color:"#a0aab4",border:"1px solid #2a2a3a",borderRadius:8,cursor:"pointer",fontSize:12}}>
                    ✏ 編集
                  </button>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={{marginTop:8,padding:"12px 16px",background:"#0a0a16",borderRadius:10,fontSize:11,color:"#6b7280",textAlign:"center"}}>
        合計 {displayUsers.length} 名 登録中
      </div>
    </div>
  );
}

【AI自動入力】
- AI自動入力メニューには「レシピ追加」と「仕入れ商品」の2つのタブがある
- レシピ追加タブ: メニューの写真やレシピPDFをアップロード→AIがレシピ名・食材・分量を自動読み取りして登録
- 仕入れ商品タブ: 業者から届いた納品書・価格表の写真やPDFをアップロード→AIが商品名・単価・単位を自動読み取りして在庫に登録

【開閉店チェック】
- 開店チェック・閉店チェックそれぞれの項目を上から順にタップしてチェックを入れる
- チェックした項目は担当スタッフ名と時刻が自動記録される

【評価・コミッション】
- スタッフが仕込みタスクやクリーンタスクを完了するとポイントが加算される
- 評価・コミッション画面でスタッフごとのポイント・達成率が確認できる

【データ保存について】
- データはブラウザのローカルストレージに保存されます
- 同じブラウザ・同じ端末を使用してください。別のブラウザや端末ではデータが表示されません
- 「データが消えた」場合: 別のブラウザ・端末を使っていないか確認。スタッフ管理の「データ初期化」ボタンを押した可能性もある

【トラブル対応】
- スタッフが表示されない: 画面右上の店舗フィルターを確認。「全店舗」にすると全スタッフが表示される
- 発注が業者に届かない: 発注管理→業者タブで対象業者の連絡先・LINE IDを確認。業者側でLINEのブロックがないか確認
- 在庫アラートが出ない: 商品の発注点（最低在庫量）が正しく設定されているか在庫管理で確認
- タスクが表示されない: 日付フィルター・店舗フィルターを確認。別の日や別の店舗のタスクが選択されている可能性がある
- 画面が固まった: ブラウザをリロード（F5）。キャッシュをクリアしてみる

【回答ルール】
- 必ず日本語で回答
- 操作手順はSTEP 1: → STEP 2: の形式
- 丁寧かつ簡潔に
- 複雑な質問は箇条書きで整理
- わからない場合は info@misetask.jp を案内`;

function AISupportView() {
  const [msgs, setMsgs] = React.useState([
    { role: "ai", text: "こんにちは！MISE TASKのAIサポートです。\n操作方法・料金・トラブルなど、なんでもご質問ください。テキスト入力またはマイクボタンで音声入力もできます。" }
  ]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [isRecording, setIsRecording] = React.useState(false);
  const [recObj, setRecObj] = React.useState(null);
  const histRef = React.useRef([]);
  const bottomRef = React.useRef(null);
  const inpRef = React.useRef(null);

  React.useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [msgs, loading]);

  const QUICK = [
    "発注方法を教えて",
    "在庫を登録したい",
    "スタッフを招待したい",
    "料金プランの違いは？",
    "AIオプションの使い方",
    "ログインできない",
    "業者QRを発行したい",
    "CHAINとSOLOの違いは？",
  ];

  const send = async (text) => {
    const q = (text || input).trim();
    if (!q || loading) return;
    setInput("");
    setMsgs(p => [...p, { role: "user", text: q }]);
    histRef.current = [...histRef.current, { role: "user", content: q }];
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: CHAT_SYSTEM_PROMPT,
          messages: histRef.current,
        }),
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || "エラーが発生しました。もう一度お試しください。";
      histRef.current = [...histRef.current, { role: "assistant", content: reply }];
      setMsgs(p => [...p, { role: "ai", text: reply }]);
    } catch {
      setMsgs(p => [...p, { role: "ai", text: "通信エラーが発生しました。ネットワーク接続を確認してください。" }]);
    }
    setLoading(false);
    setTimeout(() => inpRef.current?.focus(), 100);
  };

  const onKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const toggleMic = () => {
    if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
      alert("音声入力はChrome / Edgeでご利用ください。");
      return;
    }
    if (isRecording) { recObj?.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR();
    r.lang = "ja-JP";
    r.interimResults = true;
    r.onstart = () => { setIsRecording(true); setRecObj(r); };
    r.onresult = (e) => {
      let final = "", interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      setInput(final || interim);
    };
    r.onend  = () => { setIsRecording(false); setRecObj(null); };
    r.onerror = () => { setIsRecording(false); setRecObj(null); };
    r.start();
  };

  // AIテキストをHTML装飾
  const fmtAI = (text) => {
    let r = text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\*\*(.+?)\*\*/g,"<strong style=\"color:#E85D04\">$1</strong>")
      .replace(/STEP\s*(\d+)[：:]\s*([^\n]+)/g,
        "<div style=\"display:flex;gap:8px;margin:5px 0;align-items:flex-start\"><span style=\"background:#E85D04;color:#000;border-radius:50%;width:18px;height:18px;min-width:18px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-top:2px\">$1</span><span>$2</span></div>")
      .replace(/\[TIP\]\s*([^\n]+)/g,
        "<div style=\"margin-top:8px;background:rgba(250,163,7,.1);border-left:3px solid #FAA307;padding:6px 10px;border-radius:0 6px 6px 0;font-size:12px;color:#FAA307\">💡 $1</div>")
      .replace(/※\s*([^\n]+)/g,
        "<div style=\"font-size:11px;color:#8b95a1;margin-top:4px\">※ $1</div>")
      .replace(/\n/g,"<br>");
    return r;
  };

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#07070f"}}>
      {/* ヘッダー */}
      <div style={{background:"#0d0d1a",borderBottom:"1.5px solid #E85D04",padding:"14px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{width:36,height:36,background:"linear-gradient(135deg,#E85D04,#FAA307)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#000",flexShrink:0}}>AI</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#f0ede8"}}>MISE TASK AIサポート</div>
          <div style={{fontSize:11,color:"#8b95a1",marginTop:1}}>操作方法・料金・トラブルを24時間サポート</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#4ade80"}}>
          <div style={{width:7,height:7,background:"#4ade80",borderRadius:"50%",animation:"pulse 2s infinite"}}></div>
          オンライン
        </div>
      </div>

      {/* クイック質問 */}
      <div style={{display:"flex",gap:7,padding:"9px 16px",overflowX:"auto",flexShrink:0,background:"#0c0c18",borderBottom:"1px solid #14141f",scrollbarWidth:"none"}}>
        {QUICK.map(q => (
          <button key={q} onClick={() => send(q)}
            style={{flexShrink:0,padding:"4px 11px",border:"1px solid #E85D04",borderRadius:14,fontSize:11,color:"#E85D04",cursor:"pointer",background:"none",whiteSpace:"nowrap",fontFamily:"inherit",transition:"all .15s"}}
            onMouseEnter={e=>{e.target.style.background="#E85D04";e.target.style.color="#000";}}
            onMouseLeave={e=>{e.target.style.background="none";e.target.style.color="#E85D04";}}>
            {q}
          </button>
        ))}
      </div>

      {/* メッセージエリア */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 16px",display:"flex",flexDirection:"column",gap:14}}>
        {msgs.map((m, i) => (
          <div key={i} style={{display:"flex",gap:9,alignItems:"flex-start",flexDirection:m.role==="user"?"row-reverse":"row"}}>
            <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:m.role==="ai"?"linear-gradient(135deg,#E85D04,#FAA307)":"#3a3a52",color:m.role==="ai"?"#000":"#f0ede8"}}>
              {m.role==="ai"?"AI":"あ"}
            </div>
            <div style={{maxWidth:"80%",padding:"11px 14px",borderRadius:12,fontSize:13,lineHeight:1.75,
              background:m.role==="ai"?"#12121f":"linear-gradient(135deg,#E85D04,#F48C06)",
              border:m.role==="ai"?"1px solid #3a3a52":"none",
              borderBottomLeftRadius:m.role==="ai"?3:12,
              borderBottomRightRadius:m.role==="user"?3:12,
              color:m.role==="ai"?"#f0ede8":"#000",
              fontWeight:m.role==="user"?600:400}}
              dangerouslySetInnerHTML={m.role==="ai" ? {__html: fmtAI(m.text)} : undefined}>
              {m.role==="user" ? m.text : undefined}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
            <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:"linear-gradient(135deg,#E85D04,#FAA307)",color:"#000"}}>AI</div>
            <div style={{background:"#12121f",border:"1px solid #3a3a52",borderRadius:"12px 12px 12px 3px",padding:"13px 16px",display:"flex",gap:5,alignItems:"center"}}>
              {[0,150,300].map(d => (
                <div key={d} style={{width:7,height:7,background:"#8b95a1",borderRadius:"50%",animation:`bounce 0.9s ${d}ms infinite`}}></div>
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      {/* 入力エリア */}
      <div style={{padding:"12px 16px",background:"#0d0d1a",borderTop:"1px solid #3a3a52",flexShrink:0}}>
        <div style={{display:"flex",gap:9,alignItems:"flex-end",background:"#07070f",border:"1.5px solid #3a3a52",borderRadius:22,padding:"7px 7px 7px 16px",transition:"border-color .2s"}}>
          <textarea
            ref={inpRef}
            rows={1}
            value={input}
            onChange={e => {
              setInput(e.target.value);
              e.target.style.height = "auto";
              e.target.style.height = Math.min(e.target.scrollHeight, 80) + "px";
            }}
            onKeyDown={onKey}
            placeholder="質問を入力してください…"
            style={{flex:1,background:"none",border:"none",outline:"none",color:"#f0ede8",fontSize:13,fontFamily:"inherit",resize:"none",maxHeight:80,lineHeight:1.5}}
          />
          <button onClick={toggleMic}
            title={isRecording ? "録音停止" : "音声入力"}
            style={{width:34,height:34,borderRadius:"50%",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,transition:"all .18s",
              background:isRecording?"#dc2626":"#3a3a52",
              color:"#fff",
              boxShadow:isRecording?"0 0 0 4px rgba(220,38,38,.3)":"none"}}>
            {isRecording ? "⏹" : "🎤"}
          </button>
          <button onClick={() => send()}
            disabled={loading || !input.trim()}
            style={{width:34,height:34,borderRadius:"50%",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,flexShrink:0,
              background:"linear-gradient(135deg,#E85D04,#FAA307)",color:"#000",opacity:(loading||!input.trim())?0.4:1}}>
            →
          </button>
        </div>
        <p style={{textAlign:"center",fontSize:10,color:"#8b95a1",marginTop:6}}>Enter送信　/　Shift+Enterで改行　/　🎤 で音声入力</p>
      </div>

      <style>{`
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
      `}</style>
    </div>
  );
}
